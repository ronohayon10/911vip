<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>911VIP · ממשק נהג</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Rubik:wght@500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --btn:#0E0F11;
  --ink:#0E0F11;--ink2:#3A3C40;--paper:#F2F2EE;--card:#FFFFFF;
  --line:#E4E4DE;--line2:#D6D6CE;--mut:#8A8D92;
  --lime:#E0892F;--lime-soft:#FBEFE2;
  --green:#1F9D55;--green-bg:#E5F3EB;--amber:#B97A0A;--amber-bg:#FBF3E1;
  --red:#C03A2B;--red-bg:#F9E9E6;--violet:#6D5BD0;--violet-bg:#EEEBFA;
  --mono:'IBM Plex Mono',monospace;
  --r:20px;
}
html[data-theme="dark"]{
  --paper:#101114;--card:#1A1C20;--ink:#F1F1EC;--ink2:#CFD1D5;
  --line:#262930;--line2:#34373E;--mut:#8E9197;
  --lime-soft:#2A2014;
  --green-bg:#11271B;--amber-bg:#2A2110;--red-bg:#2B1613;--violet-bg:#1F1B34;
  background:#101114;
}
html[data-theme="dark"] body{background:#101114;color:#F1F1EC}
html[data-theme="dark"] .app{background:#101114}
html[data-theme="dark"] .main{background:#101114}
html[data-theme="dark"] .nav{background:rgba(26,28,32,.94);border-color:rgba(255,255,255,.06)}
html[data-theme="dark"] .nav button.on{background:rgba(255,255,255,.1)}
html[data-theme="dark"] .hero{box-shadow:0 12px 34px rgba(0,0,0,.5)}
html[data-theme="dark"] .sheet,html[data-theme="dark"] .row,html[data-theme="dark"] .tcard,html[data-theme="dark"] .av-row,html[data-theme="dark"] .pay-row,html[data-theme="dark"] .fab-adm{box-shadow:none}
html[data-theme="dark"] .dchip,html[data-theme="dark"] .tile{background:#121316}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;touch-action:manipulation}
body{
  font-family:'Heebo',sans-serif;background:var(--paper);color:var(--ink);
  position:fixed;inset:0;overflow:hidden;
}
h1,h2,h3{font-family:'Rubik',sans-serif}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit}
.num{font-family:var(--mono)}

/* ================= shell ================= */
.app{height:100%;max-width:560px;margin:0 auto;display:flex;flex-direction:column;position:relative}

/* כותרת כהה שהתוכן צף עליה */
.hd{
  background:linear-gradient(160deg,#131417 0%,#0E0F11 60%);
  color:#fff;flex:none;
  padding:calc(14px + env(safe-area-inset-top)) 20px 52px;
  border-radius:0 0 30px 30px;
  position:relative;z-index:1;
}
.hd-row{display:flex;align-items:center;gap:9px}
.hd img{height:26px;opacity:.95;margin-inline-end:auto}
.hd .mgr{
  font-size:10.5px;color:#9DA0A6;text-decoration:none;
  border:1px solid #2A2C30;border-radius:999px;padding:5px 11px;font-weight:600;
}
.hd .hello{margin-top:16px}
.hd .hello b{display:block;font-size:21px;font-family:'Rubik';font-weight:700}
.hd .hello span{font-size:12px;color:#9DA0A6;font-weight:500}
.hd .ava{
  width:38px;height:38px;border-radius:50%;background:var(--lime);color:#0E0F11;
  display:grid;place-items:center;font-weight:800;font-size:14px;flex:none;font-family:'Rubik';
}

.main{
  flex:1;overflow:auto;-webkit-overflow-scrolling:touch;
  padding:0 16px calc(108px + env(safe-area-inset-bottom));
  margin-top:-34px;position:relative;z-index:2;
}

/* ================= hero ================= */
.hero{
  background:var(--card);border-radius:24px;padding:18px 18px 16px;
  box-shadow:0 12px 34px rgba(14,15,17,.12);
}
.h-status{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.h-status .pill{
  display:inline-flex;align-items:center;gap:6px;border-radius:999px;
  padding:5px 12px;font-size:11.5px;font-weight:800;
}
.pill.live{background:var(--green-bg);color:var(--green)}
.pill.next{background:var(--lime-soft);color:#A96012}
.pill.wait{background:var(--amber-bg);color:var(--amber)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.h-status .when{margin-inline-start:auto;font-size:11.5px;color:var(--mut);font-weight:700}
.hero h2{font-size:24px;letter-spacing:-.01em}
.h-title{display:flex;align-items:baseline;justify-content:space-between;gap:14px}
.h-title h2{flex:1;min-width:0}
.h-date{font-size:24px;font-weight:800;color:var(--ink);letter-spacing:-.01em;white-space:nowrap;line-height:1.1}
.tnote{margin-top:12px;border:1px solid var(--line);border-radius:12px;padding:9px 12px;font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.5}
.ti-sum{display:flex;gap:10px;margin-bottom:14px}
.ti-sum-c{flex:1;background:var(--paper);border-radius:13px;padding:11px 13px}
.ti-sum-c span{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;color:var(--mut);margin-bottom:5px}
.ti-sum-c b{font-size:20px;letter-spacing:-.01em}
.ti-tl{position:relative;padding-inline-start:18px;margin-top:2px}
.ti-tl::before{content:'';position:absolute;inset-inline-start:5px;top:8px;bottom:10px;width:2px;background:var(--line)}
.ti-tl-i{position:relative;padding:0 0 15px}
.ti-tl-i:last-child{padding-bottom:2px}
.ti-tl-i::before{content:'';position:absolute;inset-inline-start:-17px;top:4px;width:11px;height:11px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--card)}
.ti-tl-l{font-size:14px;font-weight:800;color:var(--ink)}
.ti-tl-d{font-size:12.5px;color:var(--mut);font-weight:600;margin-top:3px;line-height:1.6}
.ti-tl-d svg{vertical-align:-1px;margin-inline-end:2px;opacity:.8}
.ti-sep{margin:0 7px;opacity:.5}
.tnote-h{display:block;font-size:11px;font-weight:800;color:var(--mut);letter-spacing:.04em;margin-bottom:3px}
.ctc{margin-top:11px;border:1px solid var(--line);border-radius:12px;padding:9px 12px}
.ctc-h{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;color:var(--mut);letter-spacing:.02em;margin-bottom:5px}
.ctc-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.ctc-id{display:flex;align-items:baseline;gap:9px;min-width:0;flex-wrap:wrap}
.ctc-id b{font-size:14.5px}
.ctc-ph{font-size:13.5px;color:var(--mut);font-weight:700;direction:ltr}
.ctc-acts{display:flex;gap:8px;flex:none}
.ctc-ic{width:40px;height:40px;border-radius:11px;display:inline-grid;place-items:center;text-decoration:none}
.ctc-call{background:var(--lime);color:#fff}
.ctc-wa{background:#25D366;color:#fff}
.mkpri{align-self:center;background:var(--lime-soft);color:var(--lime);border:none;border-radius:999px;padding:8px 14px;font-size:12.5px;font-weight:800;white-space:nowrap;cursor:pointer;font-family:inherit}
.sec-hint{font-weight:600;color:var(--mut);letter-spacing:0}

.h-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:15px}
.tile{background:var(--paper);border-radius:15px;padding:11px 13px;min-width:0}
.tile.w{grid-column:1/-1}
.tile span{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mut);font-weight:700;letter-spacing:.02em}
.tile b{display:block;font-size:16px;font-weight:700;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tile svg{flex:none}

/* stepper */
.stepper{display:flex;align-items:flex-start;margin-top:17px;padding:0 4px}
.snode{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative}
.snode::before{
  content:'';position:absolute;top:11px;inset-inline-start:calc(50% + 14px);inset-inline-end:calc(-50% + 14px);
  height:2.5px;border-radius:99px;background:var(--line);
}
.snode:last-child::before{display:none}
.snode.done::before{background:var(--green)}
.sdot{
  width:23px;height:23px;border-radius:50%;background:var(--card);border:2.5px solid var(--line2);
  display:grid;place-items:center;color:#fff;position:relative;z-index:1;
}
.snode.done .sdot{background:var(--green);border-color:var(--green)}
.snode.cur .sdot{border-color:var(--lime);box-shadow:0 0 0 4px var(--lime-soft)}
.snode.cur .sdot::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--lime);animation:pulse 1.5s infinite}
.snode small{font-size:9.5px;font-weight:700;color:var(--mut);text-align:center;line-height:1.25}
.snode.cur small{color:var(--ink)}

.bigact{
  margin-top:16px;width:100%;border-radius:17px;padding:18px;font-size:18.5px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:9px;
  transition:transform .08s;
}
.bigact:active{transform:scale(.98)}
.ap-btn{
  width:100%;margin-top:13px;display:flex;align-items:center;justify-content:center;gap:8px;
  border:1.5px solid var(--green);color:var(--green);background:var(--green-bg);
  border-radius:14px;padding:12px;font-weight:800;font-size:14.5px;
}
.ap-btn:active{transform:scale(.985)}
.bigact.approve{background:var(--green);color:#fff;box-shadow:0 8px 22px rgba(31,157,85,.3)}
.bigact.start{background:var(--lime);color:#0E0F11;box-shadow:0 8px 22px rgba(224,137,47,.3)}
.bigact.rel{background:var(--lime);color:#0E0F11;box-shadow:0 8px 22px rgba(224,137,47,.32)}
.bigact.end{background:var(--lime);color:#0E0F11;box-shadow:0 8px 22px rgba(224,137,47,.3)}

/* ================= lists ================= */
.sec-t{font-size:12px;font-weight:800;color:var(--mut);letter-spacing:.05em;margin:22px 4px 10px}
.row{
  background:var(--card);border-radius:18px;padding:13px 14px;margin-bottom:9px;
  display:flex;align-items:center;gap:13px;box-shadow:0 1px 3px rgba(14,15,17,.05);
}
.dchip{
  width:46px;flex:none;background:var(--paper);border-radius:13px;text-align:center;padding:7px 0 6px;
}
.dchip b{display:block;font-size:17px;font-family:var(--mono);font-weight:700;line-height:1}
.dchip span{font-size:9.5px;color:var(--mut);font-weight:700}
.dchip.done{background:var(--green-bg)}
.dchip.done b{color:var(--green)}
.dchip.done span{color:var(--green)}
.row .bd{flex:1;min-width:0}
.row .bd h3{font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .bd p{font-size:11.5px;color:var(--mut);font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 10px;font-size:10.5px;font-weight:800;flex:none}
.c-green{background:var(--green-bg);color:var(--green)}
.c-amber{background:var(--amber-bg);color:var(--amber)}
.c-mut{background:#EDEDE8;color:var(--mut)}
.c-violet{background:var(--violet-bg);color:var(--violet)}
.row .ok{
  flex:none;border:1.5px solid var(--green);color:var(--green);border-radius:999px;
  padding:7px 13px;font-size:12px;font-weight:800;
}
.adm-ic{width:16px;height:16px;border-radius:5px;background:var(--violet);color:#fff;font-size:10px;font-weight:800;display:grid;place-items:center}
.fab-adm{
  width:100%;background:var(--card);border-radius:18px;padding:14px;margin-top:12px;
  color:var(--violet);font-weight:800;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 1px 3px rgba(14,15,17,.05);
}
.empty{color:var(--mut);text-align:center;padding:40px 10px;font-size:13.5px}

/* ================= floating nav ================= */
.nav{
  position:fixed;bottom:calc(10px + env(safe-area-inset-bottom));left:16px;right:16px;z-index:40;
  max-width:532px;margin:0 auto;background:rgba(255,255,255,.92);
  -webkit-backdrop-filter:blur(18px) saturate(1.6);backdrop-filter:blur(18px) saturate(1.6);
  border-radius:999px;display:flex;padding:7px;gap:3px;
  box-shadow:0 12px 36px rgba(14,15,17,.16),0 2px 8px rgba(14,15,17,.07);
  border:1px solid rgba(14,15,17,.04);
}
.nav button{
  flex:1;display:grid;place-items:center;color:var(--ink);
  padding:12px 0;border-radius:999px;font-size:0;line-height:0;transition:background .15s;
}
.nav button svg{stroke:currentColor;width:23px;height:23px}
.nav button.on{background:rgba(14,15,17,.08)}
.nav button:active{background:rgba(14,15,17,.12)}

/* ================= sheet ================= */
.scrim{position:fixed;inset:0;background:rgba(14,15,17,.5);opacity:0;pointer-events:none;transition:.18s;z-index:60}
.scrim.open{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:61;max-width:560px;margin:0 auto;
  background:var(--card);border-radius:26px 26px 0 0;
  padding:10px 20px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(105%);transition:transform .26s cubic-bezier(.22,.8,.3,1);
  max-height:88dvh;overflow:auto;
}
.sheet.open{transform:translateY(0)}
.grab{width:38px;height:4px;border-radius:99px;background:var(--line2);margin:4px auto 16px}
.sheet h3{font-size:19px;padding-inline-start:52px}
.sheet .sub{font-size:12.5px;color:var(--mut);margin:3px 0 17px;font-weight:600;padding-inline-start:52px}
.fld{margin-bottom:13px}
.fld>label{display:block;font-size:11.5px;font-weight:800;color:var(--ink2);margin-bottom:6px}
.fld input,.fld select{
  width:100%;border:1.5px solid var(--line2);border-radius:14px;padding:15px;font-size:18px;
  background:var(--card);outline:none;font-weight:600;
}
.fld input:focus,.fld select:focus{border-color:var(--ink)}
/* iOS: שדות שעה מתעלמים מרוחב — קיבוע מפורש */
.fld input[type="time"]{
  -webkit-appearance:none;appearance:none;display:block;
  width:100%;max-width:100%;min-width:0;text-align:start;
  background:var(--card);color:var(--ink);
}
.fld input[type="time"]::-webkit-date-and-time-value{text-align:start}
.fnote{font-size:11px;color:var(--mut);margin:-7px 0 13px;font-weight:500}
.fhelp{display:flex;align-items:center;gap:8px;margin:-7px 0 13px;flex-wrap:wrap}
.fh-info{font-size:11.5px;color:var(--mut);font-weight:600}
.fh-btn{
  display:inline-flex;align-items:center;gap:5px;border:1.5px solid var(--line2);
  border-radius:999px;padding:6px 12px;font-size:11.5px;font-weight:800;color:var(--ink2);
  background:var(--card);
}
.fh-btn:active{background:var(--paper)}
.s-act{
  width:100%;border-radius:16px;padding:17px;font-size:17.5px;font-weight:800;
  background:var(--lime);color:#0E0F11;text-align:center;margin-top:5px;
}
.s-x{position:absolute;top:16px;inset-inline-start:16px;width:32px;height:32px;border-radius:50%;background:var(--paper);display:grid;place-items:center}
/* ===== תקלות / תקינות — ממשק נהג ===== */
.fld textarea{width:100%;border:1.5px solid var(--line2);border-radius:14px;padding:14px;font-size:16px;background:var(--card);outline:none;font-weight:600;resize:vertical;min-height:92px;font-family:inherit}
.fld textarea:focus{border-color:var(--ink)}
.fld select{appearance:none;-webkit-appearance:none}
.vchev{flex:none;color:var(--mut);font-size:22px;line-height:1;font-weight:700;margin-inline-start:2px}
.vm-btn{display:flex;align-items:center;gap:14px;width:100%;padding:16px;border-radius:16px;background:var(--paper);border:1.5px solid var(--line);margin-bottom:11px;text-align:start}
.vm-btn:active{transform:scale(.985)}
.vm-btn .ic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;flex:none;background:var(--lime-soft);color:var(--lime)}
.vm-btn .tx{flex:1;min-width:0}
.vm-btn .tx b{font-size:16px;display:block}
.vm-btn .tx span{font-size:12px;color:var(--mut);font-weight:600}
.lnk{color:var(--lime);font-weight:700;font-size:13.5px;background:none}
.insp-title{font-size:21px;font-weight:800;margin:2px 0;display:flex;align-items:center;gap:7px}
.insp-h{font-size:15.5px;font-weight:800;margin:24px 0 11px}
.insp-card{background:var(--card);border-radius:16px;padding:2px 15px;box-shadow:0 1px 3px rgba(14,15,17,.05)}
.chk-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.chk-row:last-child{border-bottom:0}
.chk-lbl{font-size:15.5px;font-weight:600}
.chk-sw{width:60px;height:33px;border-radius:999px;background:var(--line2);position:relative;flex:none;transition:.16s;cursor:pointer}
.chk-sw.on{background:var(--green)}
.chk-sw .knob{position:absolute;top:3px;inset-inline-start:3px;width:27px;height:27px;border-radius:50%;background:#fff;display:grid;place-items:center;transition:.16s;box-shadow:0 1px 3px rgba(0,0,0,.22);color:var(--mut)}
.chk-sw.on .knob{inset-inline-start:30px;color:var(--green)}
.chk-sw .knob svg{width:15px;height:15px}
.rseg{display:flex;flex-direction:column;gap:9px}
.rseg button{display:flex;align-items:center;gap:12px;width:100%;text-align:start;padding:15px;border:1.5px solid var(--line2);border-radius:14px;background:var(--card);font-size:15.5px;font-weight:600;color:var(--ink)}
.rseg button .dot{width:21px;height:21px;border-radius:50%;border:2px solid var(--line2);flex:none;transition:.14s}
.rseg button.on{border-color:var(--lime);background:var(--lime-soft)}
.rseg button.on .dot{border-color:var(--lime);background:var(--lime);box-shadow:inset 0 0 0 3.5px var(--card)}
.iseg{display:flex;gap:8px}
.iseg button{flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--line2);background:var(--card);font-weight:700;font-size:14px;color:var(--mut)}
.iseg button.on{color:#fff}
.insp-flt{border:1.5px solid var(--line2);border-radius:16px;padding:17px;margin-top:22px;text-align:center}
.insp-flt h4{font-size:16px;margin-bottom:5px;display:flex;align-items:center;justify-content:center;gap:7px}
.insp-flt p{font-size:12.5px;color:var(--mut);margin-bottom:13px;font-weight:600}
.df-media-btns{display:flex;gap:9px}
.df-mbtn{flex:1;border:1.5px dashed var(--line2);border-radius:13px;padding:15px 10px;font-weight:700;font-size:13.5px;color:var(--ink2);background:var(--card);display:flex;align-items:center;justify-content:center;gap:7px}
.df-mbtn:active{background:var(--paper)}
.df-thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.df-thumb{position:relative;width:74px;height:74px;border-radius:12px;overflow:hidden;background:var(--paper)}
.df-thumb img,.df-thumb video{width:100%;height:100%;object-fit:cover}
.df-vtag{position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:20px;text-shadow:0 1px 5px rgba(0,0,0,.7);pointer-events:none}
.df-rm{position:absolute;top:3px;inset-inline-start:3px;width:21px;height:21px;border-radius:50%;background:rgba(14,15,17,.72);color:#fff;font-size:11px;display:grid;place-items:center;line-height:1}
.veh-loc{display:inline-flex;align-items:center;gap:5px}
.veh-loc svg{flex:none;opacity:.75}
.veh-bd{display:flex;align-items:center;gap:10px;min-width:0;justify-content:space-between}
.veh-bd h3{white-space:nowrap;flex:none}
.veh-bd .veh-loc{font-size:12.5px;color:var(--mut);font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;justify-content:flex-end}
.veh-oil{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--mut);font-weight:600;margin-top:6px}
.veh-oil svg{opacity:.8;flex:none}
.combo{position:relative}
.cb-list{position:absolute;top:calc(100% + 6px);inset-inline:0;z-index:70;display:none;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 16px 40px rgba(14,15,17,.28);max-height:244px;overflow:auto;padding:5px}
.cb-list.open{display:block}
.cb-list button{display:block;width:100%;text-align:start;padding:13px 14px;border-radius:10px;font-size:15.5px;font-weight:600;color:var(--ink)}
.cb-list button:active{background:var(--paper)}
.cb-list .cb-empty{padding:12px 14px;color:var(--mut);font-size:13px}

/* ================= avail / pay ================= */
.av-head{
  background:var(--card);border-radius:18px;padding:15px 16px;margin-bottom:12px;
  box-shadow:0 1px 3px rgba(14,15,17,.05);
}
.av-head .t{display:flex;align-items:center;gap:9px}
.av-head .t b{font-size:15.5px;font-family:'Rubik'}
.av-head .t .chip{margin-inline-start:auto}
.av-head .d{font-size:11.5px;color:var(--mut);font-weight:600;margin-top:4px}
.av-remind{
  background:var(--amber-bg);color:var(--amber);border-radius:14px;padding:11px 14px;
  font-size:12px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.av-all{
  width:100%;border:1.5px dashed var(--line2);border-radius:14px;padding:11px;margin-bottom:10px;
  color:var(--green);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;gap:7px;
  background:var(--card);
}
.seg3{display:flex;gap:0;border:1.5px solid var(--line2);border-radius:12px;overflow:hidden;flex:none}
.seg3 button{
  width:46px;padding:9px 0;display:grid;place-items:center;color:var(--mut);
  border-inline-start:1.5px solid var(--line2);background:var(--card);
}
.seg3 button:first-child{border-inline-start:none}
.seg3 .y.on{background:var(--green);color:#fff}
.seg3 .p.on{background:var(--amber);color:#fff}
.seg3 .n.on{background:var(--red);color:#fff}
.av-note{flex:1;min-width:0}
.av-note input{
  width:100%;border:1.5px solid var(--amber);border-radius:11px;padding:8px 11px;
  font-size:16px;background:var(--amber-bg);color:var(--ink);outline:none;font-weight:500;
}
.av-mini{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:10px}
.av-d{border-radius:13px;padding:9px 2px 8px;text-align:center;background:var(--card)}
.av-d span{display:block;font-size:9.5px;font-weight:700;color:var(--mut)}
.av-d b{display:block;font-size:15px;font-family:var(--mono);margin:2px 0 3px}
.av-d .ic{display:flex;justify-content:center}
.av-d.y{background:var(--green-bg)}.av-d.y .ic{color:var(--green)}
.av-d.p{background:var(--amber-bg)}.av-d.p .ic{color:var(--amber)}
.av-d.n{background:var(--red-bg)}.av-d.n .ic{color:var(--red)}
.av-notes{margin-bottom:10px}
.av-notes div{font-size:11.5px;color:var(--mut);font-weight:600;padding:3px 4px}
.av-more{
  width:100%;border:1.5px dashed var(--line2);border-radius:14px;padding:12px;margin-top:14px;
  color:var(--ink2);font-weight:800;font-size:13px;background:var(--card);
}
.av-sum{flex:1;min-width:0;display:flex;align-items:center;gap:8px}
.av-sum .nt{font-size:12px;color:var(--mut);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.av-submit{
  width:100%;border-radius:16px;padding:16px;font-size:16px;font-weight:800;margin-top:6px;
  background:var(--btn);color:var(--lime);
}
.av-submit:disabled{opacity:.4}
.av-row{
  background:var(--card);border-radius:17px;padding:13px 15px;margin-bottom:9px;
  display:flex;align-items:center;gap:10px;box-shadow:0 1px 3px rgba(14,15,17,.05);
}
.av-row .d{flex:1}
.av-row .d b{display:block;font-size:14.5px}
.av-row .d span{font-size:11px;color:var(--mut);font-weight:600}
.av-opts{display:flex;gap:6px}
.av-opts button{
  width:38px;height:38px;border-radius:12px;border:1.5px solid var(--line2);
  display:grid;place-items:center;color:var(--mut);
}
.av-opts button.y.on{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.av-opts button.p.on{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.av-opts button.n.on{background:var(--red-bg);border-color:var(--red);color:var(--red)}

.pay-sum{
  background:linear-gradient(150deg,#16181C,#0E0F11);color:#fff;border-radius:22px;
  padding:20px;margin-bottom:16px;box-shadow:0 10px 28px rgba(14,15,17,.2);
}
.pay-sum .lbl{font-size:11px;color:#9DA0A6;font-weight:700}
.pay-sum .big{font-size:34px;font-weight:700;font-family:var(--mono);color:var(--lime);margin-top:3px}
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
.pay-grid div b{display:block;font-size:17px;font-family:var(--mono)}
.pay-grid div span{font-size:10.5px;color:#9DA0A6;font-weight:600}
.pay-row{
  background:var(--card);border-radius:15px;padding:12px 15px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;box-shadow:0 1px 3px rgba(14,15,17,.05);
}
.pay-row .n{flex:1}
.pay-row .n b{display:block;font-size:14px}
.pay-row .n span{font-size:11px;color:var(--mut);font-weight:600}
.pay-row .amt{font-family:var(--mono);font-weight:700;font-size:15px}

.toast{
  position:fixed;bottom:calc(86px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(16px);
  background:#26282D;color:#fff;border-radius:14px;padding:12px 18px;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;transition:.2s;z-index:80;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;
  box-shadow:0 10px 26px rgba(14,15,17,.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.set-ava{width:96px;height:96px;border-radius:50%;background:var(--lime-soft);color:var(--lime);display:grid;place-items:center;font-weight:700;font-size:30px;overflow:hidden}
.set-ava img{width:100%;height:100%;object-fit:cover}
.set-photo-btn{color:var(--lime);font-weight:700;font-size:14px;cursor:pointer}
.set-photo-rm{color:var(--mut);font-size:13px;background:none}
.set-logout{width:100%;margin-top:14px;padding:13px;border-radius:14px;background:none;border:1px solid var(--line);color:#C0392B;font-weight:700;font-size:15px}
</style>
</head>

/* ============================================================
   Store — שכבת אחסון מרכזית אחת לכל המערכת (זהה בכל הקבצים).
   כל שינוי עובר דרך כאן. היום: localStorage. מעבר לאונליין:
   מחליפים רק את גוף set/get כך שידברו עם השרת. ============= */
const Store=(()=>{
  const PREFIX='vip_';const mem={};
  function set(key,val){mem[key]=val;try{localStorage.setItem(PREFIX+key,JSON.stringify(val))}catch(e){}return val;}
  function get(key,fallback){if(key in mem)return mem[key];try{const r=localStorage.getItem(PREFIX+key);if(r!=null){mem[key]=JSON.parse(r);return mem[key]}}catch(e){}return(fallback!==undefined?fallback:null);}
  function remove(key){delete mem[key];try{localStorage.removeItem(PREFIX+key)}catch(e){}}
  function reload(key){delete mem[key];return get(key);}
  return{set,get,remove,reload};
})();

/* ===== הרשאות: נהג רואה רק את הממשק שלו · מנהל יכול לפעול כנהג ולחזור ===== */

const SESSION_MAX={manager:30*24*60*60*1000,driver:183*24*60*60*1000};
const sessionExpired=s=>!s||!s.at||(Date.now()-s.at)>(SESSION_MAX[s.role]||0);
let SESSION=null;
SESSION=Store.get('session',null);

let NEXT_ID=100;

/* ===== DB משותף — מקור אמת אחד לנהג ולמנהל (localStorage 'tasks') =====
   הנהג קורא את המשימות, כותב בחזרה דיווחים (אישור/התחלה/הסרת אחריות/סיום),
   והמנהל רואה מיד. בייצור: אותו API — getTasks/saveTasks. */
const CANCEL_MS=(24+5)*3600*1000; /* בוטלה: לא הותחלה עד 5 שעות אחרי חצות שלאחר יום המשימה */
function taskStarted(t){return (t.stage!=null&&t.stage>=1)||(t.ts&&t.ts.start)||t.done;}
function isCancelledTask(t){
  if(taskStarted(t))return false;
  return Date.now()>fromIso(t.date).getTime()+CANCEL_MS;
}
function normTask(t){
  if(t.stage==null)t.stage=t.done?3:(t.cls==='live'?((t.ts&&t.ts.rel)?2:1):-1);
  t.ts=t.ts||{};t.km=t.km||{};t.rts=t.rts||{};t.locs=t.locs||{};
  if(t.cls==='admin')t.adm=true;
  return t;
}
let ALL=[]; /* כל המשימות במודל הקנוני (משותף עם המנהל) */
function loadAll(){
  let shared=null;try{shared=Store.reload('tasks')}catch(e){}
  ALL=(shared&&Array.isArray(shared)&&shared.length)?shared:DEMO_TASKS;
  ALL.forEach(normTask);
}
function saveAll(){try{Store.set('tasks',ALL)}catch(e){}}
loadAll();
const byId=id=>ALL.find(t=>t.id===+id);
/* הרשאות נתונים: נהג רואה אך ורק את המשימות שלו, ללא משימות שבוטלו */
const MY_TASKS=()=>ALL.filter(t=>t.drv===ME.n&&!isCancelledTask(t)).map(t=>Object.assign({},t,{veh:t.veh||''}));

const $=s=>document.querySelector(s);

/* ק"מ נוכחי של רכב — מהמאגר המשותף (מתעדכן ע"י דיווחי נהגים) */
function vehKmOf(name){try{const r=Store.get('veh:'+name,null);if(r&&r.km!=null)return r.km;}catch(e){}const v=vehRec(name);return v?v.km:null;}
/* דיווח סיום/דרך → ק"מ נוכחי של הרכב (סופר אחורה לטיפול אצל המנהל) */
function bumpVehicleKm(name,km,loc){
  if(!name||!km)return;
  let cur={};try{cur=Store.get('veh:'+name,{})||{}}catch(e){}
  const k=Math.max(+km,+(cur.km||0));
  const rec=Object.assign({},cur,{km:k,kmAt:Date.now()});if(loc)rec.loc=loc;
  try{Store.set('veh:'+name,rec)}catch(e){}
}

/* ===== מצב כהה ===== */
function setTheme(t){
  document.documentElement.dataset.theme=t;
  let mc=document.querySelector('meta[name="theme-color"]');
  if(!mc){mc=document.createElement('meta');mc.name='theme-color';document.head.appendChild(mc)}
  mc.content=t==='dark'?'#101114':'#F2F2EE';
  const b=$('#themeBtn');if(b)b.innerHTML=t==='dark'
    ?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M19.4 4.6l-1.8 1.8M6.4 17.6l-1.8 1.8"/></svg>'
    :'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
}
/* ערכת נושא לפי שעה: כהה מ-19:00 עד 06:00, בהיר בשאר היום — קבוע לכל הנהגים.
   החלפה ידנית גוברת עד גבול הזמן הבא (חזרה אוטומטית לבהיר ב-06:00 ולכהה ב-19:00). */
function scheduledTheme(){const h=new Date().getHours();return (h>=19||h<6)?'dark':'light';}
function themeWindowStart(){const n=new Date();const h=n.getHours();const b=new Date(n);b.setMinutes(0,0,0);if(h>=19)b.setHours(19);else if(h<6){b.setDate(b.getDate()-1);b.setHours(19);}else b.setHours(6);return b.getTime();}
function applyScheduledTheme(){let t=scheduledTheme();try{const ov=Store.get('drvTheme',null);if(ov&&ov.theme&&ov.at>=themeWindowStart())t=ov.theme;}catch(e){}setTheme(t);}
function toggleTheme(){const t=document.documentElement.dataset.theme==='dark'?'light':'dark';setTheme(t);try{Store.set('drvTheme',{theme:t,at:Date.now()})}catch(e){}}

/* ===== דיווח אופליין: תור שנשמר במכשיר ונשלח כשחוזרת רשת ===== */
let OUTBOX=[];

function saveOutbox(){Store.set('outbox',OUTBOX)}
function queueReport(desc){OUTBOX.push({desc,at:Date.now()});saveOutbox()}
function flushOutbox(){
  if(!OUTBOX.length||!navigator.onLine)return;
  const n=OUTBOX.length;OUTBOX=[];saveOutbox();
  toast(n+' דיווחים שנשמרו במכשיר סונכרנו לשרת ✓',3600);
  go('tasks');
}
window.addEventListener('online',flushOutbox);
window.addEventListener('offline',()=>toast('אין חיבור — דיווחים יישמרו במכשיר ויסונכרנו אוטומטית',3600));
function toast(t,ms=2800){$('#toast').textContent=t;$('#toast').classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>$('#toast').classList.remove('show'),ms)}
function openSheet(h){$('#sheet').innerHTML='<div class="grab"></div>'+h;$('#sheet').classList.add('open');$('#scrim').classList.add('open')}
function closeSheet(){$('#sheet').classList.remove('open');$('#scrim').classList.remove('open')}

const views={};
function go(v){
  window.CURV=v;
  if(location.hash.slice(1)!==v){try{location.hash=v}catch(e){}}
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  $('#main').innerHTML=views[v]();
  $('#main').scrollTop=0;
  if(typeof markSeen==='function')markSeen();
}
window.addEventListener('hashchange',()=>{
  const v=location.hash.slice(1);
  if(v&&views[v]&&v!==window.CURV)go(v);
});

/* ================= משימות ================= */
const STAGE_ACT={'-1':{next:0},'0':{next:1},'1':{next:2},'2':{next:3}};
const ACT_META={
  '-1':{label:'אשר שיבוץ',cls:'approve'},
  '0':{label:'התחלת משימה',cls:'start'},
  '1':{label:'הסרת אחריות',cls:'rel'},
  '2':{label:'סיום משימה',cls:'end'},
};
const TI={
  odo:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M3.34 19a10 10 0 1 1 17.32 0"/><path d="M12 14l4-4"/></svg>',
  clock:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
  cal:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M8 2v4M16 2v4M3 9h18"/></svg>',
  pin:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>',
  car:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 11l1.5-4.5A2 2 0 0 1 8.4 5h7.2a2 2 0 0 1 1.9 1.5L19 11"/><rect x="3" y="11" width="18" height="7" rx="2"/></svg>',
  check:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>',
};
function stChip(t){
  if(t.stage===3)return '<span class="chip c-mut">הושלמה</span>';
  if(t.stage===1||t.stage===2)return '<span class="chip c-green"><span class="dot pulse"></span>בנסיעה</span>';
  if(t.stage===-1)return '<span class="chip c-amber">ממתין לאישורך</span>';
  if(t.adm)return '<span class="chip c-violet">מנהלתית</span>';
  return '<span class="chip c-green">מאושרת</span>';
}
function stepper(t){
  const steps=t.adm?[['אישור',0],['התחלה',1],['סיום',3]]:[['אישור',0],['התחלה',1],['הסרת אחריות',2],['סיום',3]];
  /* done אם השלב הושג, cur אם הוא הבא בתור */
  const reached=s=>t.stage>=s;
  let curFound=false;
  return '<div class="stepper">'+steps.map(([lbl,s])=>{
    const done=reached(s);
    let cls='';
    if(done)cls='done';
    else if(!curFound){cls='cur';curFound=true}
    return `<div class="snode ${cls}"><span class="sdot">${done?TI.check:''}</span><small>${lbl}</small></div>`;
  }).join('')+'</div>';
}
let PRIMARY_ID=null; /* בחירת הנהג איזו משימה עתידית להציג כ"ראשית" */
function setPrimary(id){PRIMARY_ID=+id;go('tasks');try{$('#main').scrollTo({top:0})}catch(e){}}
function noteBlock(t){const n=t.note||t.notes;return n?`<div class="tnote"><span class="tnote-h">הערה</span><span>${n}</span></div>`:''}
function contactBlock(t){
  const c=t.contact||{};const ph=c.phone||'';
  if(!c.name&&!ph)return '';
  const ic='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/></svg>';
  return `<div class="ctc">
    <div class="ctc-h">${ic} איש קשר מטעם הלקוח</div>
    <div class="ctc-row">
      <div class="ctc-id"><b>${c.name||'—'}</b>${ph?`<span class="num ctc-ph">${ph}</span>`:''}</div>
      ${ph?`<div class="ctc-acts">
        <a class="ctc-ic ctc-call" href="${telHref(ph)}" title="חיוג" aria-label="חיוג"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2 4.2 2 2 0 0 1 4 2h3a2 2 0 0 1 2 1.7c.1.9.4 1.8.7 2.6a2 2 0 0 1-.4 2.1L8 9.6a16 16 0 0 0 6 6l1.2-1.2a2 2 0 0 1 2.1-.5c.8.3 1.7.6 2.6.7a2 2 0 0 1 1.7 2Z"/></svg></a>
        <a class="ctc-ic ctc-wa" href="${waHref(ph)}" target="_blank" rel="noopener" title="וואטסאפ" aria-label="וואטסאפ"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.3A10 10 0 1 0 12 2Zm5.3 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .2-3.2-.7-2.7-1.1-4.4-3.9-4.5-4.1-.1-.2-1.1-1.4-1.1-2.7 0-1.3.7-1.9.9-2.2.2-.2.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 1.9c.1.2.1.4 0 .5l-.3.5-.4.4c-.1.1-.3.3-.1.6.2.3.8 1.3 1.7 2.1 1.2 1 2.1 1.4 2.4 1.5.3.1.5.1.6-.1l.8-1c.2-.2.4-.2.6-.1l1.8.9c.2.1.4.2.5.3.1.2.1.8-.1 1.4Z"/></svg></a>
      </div>`:''}
    </div>
  </div>`;
}
function heroCard(t){
  const live=t.stage===1||t.stage===2;
  /* כפתור הפעולה הראשי הוא תמיד שלב הנסיעה הבא — גם אם השיבוץ טרם אושר
     (שיבוץ של "מעכשיו לעכשיו": הנהג יוצא מיד, האישור בכפתור נפרד למעלה) */
  const eff=Math.max(0,t.stage);
  const a=ACT_META[t.adm&&eff===1?'2':String(eff)];
  const lbl=t.adm&&eff===1?'סיום משימה':a.label;
  const pill=live?'<span class="pill live"><span class="dot pulse"></span>נסיעה פעילה</span>'
    :t.stage===-1?'<span class="pill wait">ממתין לאישורך</span>'
    :'<span class="pill next">המשימה הבאה שלך</span>';
  return `
  <div class="hero">
    <div class="h-status">${pill}</div>
    <div class="h-title">
      <h2>${t.adm?'<span class="adm-ic" style="display:inline-grid;vertical-align:-2px;margin-inline-end:8px">מ</span>':''}${t.n}</h2>
      <span class="h-date num">${ddmmyy(t.date)}</span>
    </div>
    ${t.stage===-1?`<button class="ap-btn" onclick="approveTask(${t.id})">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M5 13l4 4L19 7"/></svg>
      אשר שיבוץ</button>`:''}
    <div class="h-grid">
      <div class="tile"><span>${TI.cal} תאריך</span><b>${dayLabel(t.date)}</b></div>
      ${t.time?`<div class="tile"><span>${TI.clock} התייצבות</span><b class="num">${t.time}</b></div>`:`<div class="tile"><span>${TI.clock} התייצבות</span><b>—</b></div>`}
      ${t.veh?`<div class="tile ${t.loc?'':'w'}"><span>${TI.car} רכב</span><b>${t.veh}</b></div>`:''}
      ${t.loc?`<div class="tile"><span>${TI.pin} ${t.adm?'הערה':'מיקום התייצבות'}</span><b>${t.loc}</b></div>`:''}
    </div>
    ${contactBlock(t)}
    ${noteBlock(t)}
    ${stepper(t)}
    ${t.stage<3?`<button class="bigact ${a.cls}" onclick="actOn(${t.id})">${lbl}
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M14 6l-6 6 6 6"/></svg></button>`:''}
  </div>`;
}
function rowCard(t,canPrimary,doneStyle){
  const d=fromIso(t.date);
  return `<div class="row" onclick="openTaskInfo(${t.id})" style="cursor:pointer">
    <div class="dchip${doneStyle?' done':''}"><b>${t.date.slice(8,10)}</b><span>${DAY_NAMES[d.getDay()]}</span></div>
    <div class="bd">
      <h3>${t.adm?'<span class="adm-ic" style="display:inline-grid;vertical-align:-2px;margin-inline-end:5px">מ</span>':''}${t.n}</h3>
      <p>${[t.time,t.veh].filter(Boolean).join(' · ')||'—'}</p>
    </div>
    ${canPrimary?`<button class="mkpri" onclick="event.stopPropagation();setPrimary(${t.id})">הצג כראשית</button>`:t.stage===-1?`<button class="ok" onclick="event.stopPropagation();approveTask(${t.id})">אשר שיבוץ</button>`:stChip(t)}
  </div>`;
}
views.tasks=()=>{
  const tmin=s=>{const m=String(s||'').match(/(\d{1,2}):(\d{2})/);return m?+m[1]*60+ +m[2]:99999};
  const open=MY_TASKS().filter(t=>t.stage<3&&t.date>=DEMO_TODAY)
    .sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:(tmin(a.time)-tmin(b.time))||(b.stage-a.stage));
  const live=open.find(t=>t.stage===1||t.stage===2);
  let hero;
  if(live)hero=live;
  else if(PRIMARY_ID!=null&&open.some(t=>t.id===PRIMARY_ID))hero=open.find(t=>t.id===PRIMARY_ID);
  else hero=open[0];
  const rest=open.filter(t=>t!==hero);
  const canChoose=!live&&open.length>1; /* יותר ממשימה אחת עתידית — אפשר לבחור ראשית */
  const done=MY_TASKS().filter(t=>t.stage===3||t.date<DEMO_TODAY).sort((a,b)=>a.date<b.date?1:-1);
  return `
    ${OUTBOX.length?`<div style="background:var(--amber-bg);color:var(--amber);border-radius:14px;padding:10px 14px;font-size:12px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px">
      <span class="dot pulse" style="background:var(--amber)"></span>${OUTBOX.length} דיווחים שמורים במכשיר · יסונכרנו כשתחזור הקליטה</div>`:''}
    ${hero?heroCard(hero):'<div class="hero"><div class="empty">אין כרגע משימות קרובות</div></div>'}
    <button class="fab-adm" onclick="openAdm()"><span class="adm-ic">מ</span>פתיחת משימה מנהלתית</button>
    ${rest.length?`<div class="sec-t">המשימות הקרובות${canChoose?' <span class="sec-hint">· בחר משימה להצגה כראשית</span>':''}</div>${rest.map(t=>rowCard(t,canChoose)).join('')}`:''}
    ${done.length?`<div class="sec-t">משימות אחרונות שבוצעו</div>${done.slice(0,3).map(t=>rowCard(t,false,true)).join('')}`:''}
  `;
}

/* דיווח שלב */
/* פרטי משימה — נפתח בלחיצה על שורה ברשימות */
function openTaskInfo(id){
  const t=byId(id);if(!t)return;
  const log=[
    {l:'התחלת משימה',h:t.ts.start,k:t.km.start,loc:null},
    {l:'הסרת אחריות',h:t.ts.rel,k:t.km.rel,loc:t.locs.rel},
    {l:'סיום משימה',h:t.ts.end,k:t.km.end,loc:t.locs.end},
  ].filter(x=>x.h||x.k);
  const pmin=s=>{const m=String(s||'').match(/(\d{1,2}):(\d{2})/);return m?+m[1]*60+ +m[2]:null};
  let workMin=null;if(t.ts.start&&t.ts.end){const a=pmin(t.ts.start),b=pmin(t.ts.end);if(a!=null&&b!=null){workMin=b-a;if(workMin<0)workMin+=1440;}}
  const fmtDur=m=>m==null?null:Math.floor(m/60)+':'+String(m%60).padStart(2,'0');
  let kmDr=null;if(t.km.start!=null&&t.km.start!==''&&t.km.end!=null&&t.km.end!=='')kmDr=(+t.km.end)-(+t.km.start);
  const showSummary=workMin!=null||kmDr!=null;
  openSheet(`
    <button class="s-x" onclick="closeSheet()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    <h3>${t.adm?'<span class="adm-ic" style="display:inline-grid;vertical-align:-2px;margin-inline-end:7px">מ</span>':''}${t.n}</h3>
    <div class="sub">${dayLabel(t.date)+'/'+t.date.slice(2,4)}</div>
    <div style="margin-bottom:13px">${stChip(t)}</div>
    ${showSummary?`<div class="ti-sum">
      <div class="ti-sum-c"><span>${TI.clock} זמן עבודה</span><b class="num">${fmtDur(workMin)||'—'}</b></div>
      <div class="ti-sum-c"><span>${TI.odo} ק"מ נסיעה</span><b class="num">${kmDr!=null?kmDr.toLocaleString():'—'}</b></div>
    </div>`:''}
    <div class="h-grid" style="margin-top:0;margin-bottom:${log.length?'15px':'4px'}">
      ${t.time?`<div class="tile"><span>${TI.clock} התייצבות</span><b class="num">${t.time}</b></div>`:''}
      ${t.veh?`<div class="tile"><span>${TI.car} רכב</span><b>${t.veh}</b></div>`:''}
      ${t.loc?`<div class="tile w"><span>${TI.pin} ${t.adm?'הערה':'מיקום התייצבות'}</span><b>${t.loc}</b></div>`:''}
    </div>
    ${contactBlock(t)}
    ${noteBlock(t)}
    ${log.length?`<div class="sec-t" style="margin:2px 2px 10px">דיווחי הנסיעה</div>
      <div class="ti-tl">${log.map(x=>`<div class="ti-tl-i">
        <div class="ti-tl-l">${x.l}</div>
        <div class="ti-tl-d">${[x.h?TI.clock+' '+x.h:null,(x.k!=null&&x.k!=='')?TI.odo+' '+(+x.k).toLocaleString()+' ק"מ':null,x.loc?TI.pin+' '+x.loc:null].filter(Boolean).join('<span class="ti-sep">·</span>')}</div>
      </div>`).join('')}</div>`:''}
    ${t.stage===-1?`<button class="s-act" style="background:var(--green);color:#fff" onclick="approveTask(${t.id});closeSheet()">אשר שיבוץ ‹‹</button>`:''}
  `);
}
function approveTask(id){
  const t=byId(id);
  if(!t||t.stage>-1)return; /* כבר אושר — לחיצה כפולה נבלעת */
  t.stage=0;t.rts.ap=nowHM();
  saveAll();
  go('tasks');toast('השיבוץ אושר · הסדרן עודכן');
}
function actOn(id){
  const t=byId(id);
  const eff=Math.max(0,t.stage); /* התחלה אפשרית גם לפני אישור — שיבוץ דחוף */
  const a=STAGE_ACT[eff];if(!a)return;
  const next=t.adm&&eff===1?3:a.next;
  const kind=next===1?{t:'התחלת משימה',k:'start',kmL:'ק"מ בהתחלת נסיעה',tL:'שעת התחלה',loc:false,notes:true,btn:'שמור והתחל משימה'}
            :next===2?{t:'הסרת אחריות',k:'rel',kmL:'ק"מ בהסרת אחריות',tL:'שעת הסרת אחריות (חיוב לקוח)',loc:true,lph:'מיקום הסרת אחריות',btn:'שמור'}
            :{t:'סיום משימה',k:'end',kmL:'ק"מ בסיום',tL:'שעת סיום',loc:true,lph:'מיקום סיום',btn:'שמור וסיים משימה'};
  /* התחלה: ק"מ אחרון של הרכב + סנכרון · הסרה/סיום: תצוגת הדיווח הקודם של הנהג בלבד */
  const lastKm=kind.k==='start'?vehKmOf(t.veh):null;
  const prevKm=kind.k==='rel'?{l:'ק"מ שהזנת בהתחלה',v:t.km.start}
              :kind.k==='end'?{l:'ק"מ שהזנת בהסרת אחריות',v:t.km.rel||t.km.start}
              :null;
  const noVeh=!t.veh;
  const kmBlock=noVeh?'':`<div class="fld"><label>${kind.kmL}</label><input type="text" inputmode="numeric" id="rK" placeholder="הזן מספר"></div>`
    +(lastKm?`<div class="fhelp"><span class="fh-info">ק"מ אחרון שדווח: <b class="num">${(+lastKm).toLocaleString()}</b></span><button type="button" class="fh-btn" onclick="$('#rK').value='${lastKm}'">סנכרן</button></div>`:'')
    +(prevKm&&prevKm.v?`<div class="fhelp"><span class="fh-info">${prevKm.l}: <b class="num">${(+prevKm.v).toLocaleString()}</b></span></div>`:'');
  openSheet(`
    <button class="s-x" onclick="closeSheet()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    <h3>${kind.t}</h3>
    <div class="sub">«${t.n}»${t.veh?' · '+t.veh:''}</div>
    ${kmBlock}
    <div class="fld"><label>${kind.tL}</label><input type="time" id="rT" value="${nowHM()}"></div>
    <div class="fnote">השעה ניתנת לעריכה · שעת הדיווח בפועל נרשמת אוטומטית</div>
    ${kind.loc?`<div class="fld"><label>${kind.lph}</label><input type="text" id="rL" placeholder="הזן כתובת"></div>
    ${kind.k==='end'&&ME.home?`<div class="fhelp">
      <button type="button" class="fh-btn" onclick="$('#rL').value='${ME.home.replace(/'/g,"\\'")}'">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M3 11l9-8 9 8v9a2 2 0 01-2 2h-4v-7h-6v7H5a2 2 0 01-2-2z"/></svg>
        בית</button>
    </div>`:''}`:''}
    ${kind.notes?`<div class="fld"><label>הערות נהג (לא חובה)</label><input type="text" id="rN"></div>`:''}
    <button class="s-act" id="sheetGo" onclick="doReport(${t.id},${next},'${kind.k}',${!!kind.loc})">${kind.btn} ‹‹</button>
  `);
  setTimeout(()=>$('#rK')?.focus(),260);
}
function doReport(id,next,key,hasLoc){
  const t=byId(id);
  /* הגנה מלחיצה כפולה: השלב כבר בוצע — מתעלמים */
  if(!t||t.stage>=next){closeSheet();return}
  const b=$('#sheetGo');
  if(b){if(b.disabled)return;b.disabled=true;b.style.opacity=.6;b.textContent='שולח…'}
  const time=$('#rT').value;
  const rk=$('#rK');const km=rk?(rk.value||'').replace(/[^\d]/g,''):'';
  if(t.veh){
    if(!km){toast('חסר דיווח ק"מ');if(rk)rk.focus();
      if(b){b.disabled=false;b.style.opacity=1;b.textContent='שמור ‹‹'}return}
    /* ולידציה: ק"מ לא יכול להיות נמוך מהאחרון שתועד לרכב (טעות הקלדה ברוב המקרים) */
    const _ref=+(vehKmOf(t.veh)||0);
    if(_ref&&+km<_ref){
      toast('ק"מ שהזנת ('+(+km).toLocaleString()+') נמוך מהאחרון במערכת ('+_ref.toLocaleString()+' ק"מ) — בדוק שוב',4600);
      if(b){b.disabled=false;b.style.opacity=1;b.textContent='שמור ‹‹'}if(rk)rk.focus();return}
  }
  if(t.stage===-1&&!t.rts.ap)t.rts.ap=nowHM(); /* התחלה לפני אישור = אישור מובלע */
  t.ts[key]=time;if(km)t.km[key]=km;t.rts[key]=nowHM();
  if(hasLoc){const l=$('#rL').value.trim();if(l)t.locs[key]=l}
  const nEl=$('#rN');if(nEl&&nEl.value.trim())t.dnotes=nEl.value.trim();
  t.stage=next;
  if(next>=1&&t.cls!=='admin')t.cls='live';        /* התחלה → המנהל רואה «בנסיעה» */
  if(next===3){t.done=true;if(t.cls==='live')t.cls=undefined;} /* סיום → המנהל רואה «בוצע» */
  if(t.veh)bumpVehicleKm(t.veh,km,key==='end'?(t.locs.end||''):'');  /* ק"מ → ק"מ נוכחי של הרכב (סופר לטיפול) */
  saveAll();                                        /* כתיבה למאגר המשותף — המנהל מתעדכן מיד */
  closeSheet();go('tasks');
  if(!navigator.onLine){
    queueReport(kindDesc(next,t));
    toast('אין קליטה — הדיווח נשמר במכשיר ויסונכרן אוטומטית',3800);

/* ================= שכר ================= */
function payOf(t){
  if(!t.ts.start||!t.ts.end)return null;
  const p=x=>{const[a,b]=x.split(':').map(Number);return a*60+b};
  let m=p(t.ts.end)-p(t.ts.start);if(m<=0)m+=1440;
  const shabbat=fromIso(t.date).getDay()===6;
  const rate=shabbat?ME.rateS:ME.rate;
  return{m,amt:Math.round(m/60*rate),rate,shabbat,
    h:String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0')};
}
views.pay=()=>{
  const rows=MY_TASKS().filter(t=>t.stage===3).map(t=>({t,p:payOf(t)})).filter(x=>x.p);
  const totM=rows.reduce((s,x)=>s+x.p.m,0),totA=rows.reduce((s,x)=>s+x.p.amt,0);
  return `
    <div style="height:34px"></div>
    <div class="pay-sum">
      <div class="lbl">שכר מצטבר · יוני 2026</div>
      <div class="big">₪${totA.toLocaleString()}</div>
      <div class="pay-grid">
        <div><b>${String(Math.floor(totM/60)).padStart(2,'0')}:${String(totM%60).padStart(2,'0')}</b><span>סה"כ שעות</span></div>
        <div><b>${rows.length}</b><span>משימות שהושלמו</span></div>
      </div>
    </div>
    <div class="sec-t">פירוט משימות</div>
    ${rows.map(({t,p})=>`<div class="pay-row">
      <div class="n"><b>${t.n}</b><span>${dayLabel(t.date)} · ${p.h} שע׳${p.shabbat?' · שבת':''}</span></div>
      <div class="amt">₪${p.amt.toLocaleString()}</div>
    </div>`).join('')||'<div class="empty">אין עדיין משימות שהושלמו החודש</div>'}

function vehPlate(name){const v=VEHICLES.find(x=>x.n===name);return v&&v.plate?v.plate:''}
function drvAddFault(obj){let arr=[];try{arr=Store.reload('faults2')||[]}catch(e){arr=Store.get('faults2',[])||[]}arr.push(obj);Store.set('faults2',arr);}
/* קומבו עם חיפוש — זהה לזה שבטופסי המנהל */
const CB_ITEMS={};
function comboHTML(id,placeholder,initLabel,initV){
  return `<div class="combo" id="${id}"><input type="text" placeholder="${placeholder}" value="${(initLabel||'').replace(/"/g,'&quot;')}" data-v="${initV==null?'':String(initV).replace(/"/g,'&quot;')}" oninput="cbRender('${id}',this.value)" onfocus="cbFocus(this,'${id}')" autocomplete="off"><div class="cb-list"></div></div>`;
}
function cbSet(id,items){CB_ITEMS[id]=items}
function cbFocus(inp,id){cbRender(id,'');try{inp.select()}catch(e){}setTimeout(()=>{try{inp.select()}catch(e){}},0);}
function cbRender(id,q){const el=document.getElementById(id);if(!el)return;const list=el.querySelector('.cb-list');const items=(CB_ITEMS[id]||[]).filter(it=>!q||it.label.includes(q));list.innerHTML=items.length?items.map(it=>`<button type="button" onclick="cbPick('${id}','${String(it.v).replace(/'/g,"\\'")}',this.textContent)">${it.label}</button>`).join(''):'<div class="cb-empty">אין תוצאות</div>';list.classList.add('open');}
function cbPick(id,v,label){const el=document.getElementById(id);if(!el)return;const inp=el.querySelector('input');inp.value=label;inp.dataset.v=v;el.querySelector('.cb-list').classList.remove('open');if(id==='a-cb-veh'&&typeof admVehPicked==='function')admVehPicked(v);}
const cbVal=id=>{const i=document.querySelector('#'+id+' input');return i?(i.dataset.v||''):''};
const cbLabel=id=>{const i=document.querySelector('#'+id+' input');return i?(i.value||''):''};
document.addEventListener('click',e=>{if(!e.target.closest('.combo'))document.querySelectorAll('.cb-list').forEach(l=>l.classList.remove('open'));});
const _IC_FAULT='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg>';
const _IC_CHECK='<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>';
const _IC_OK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
const _IC_X='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>';
/* תפריט רכב — 2 פעולות + חזרה */
function openVehMenu(name){
  const safe=name.replace(/'/g,"\\'");
  openSheet(`
    <h3>${name}</h3><div class="sub">בחר פעולה</div>
    <button class="vm-btn" onclick="openDrvFault('${safe}','menu')"><span class="ic">${_IC_FAULT}</span><span class="tx"><b>פתיחת תקלה</b><span>דיווח על תקלה ברכב</span></span></button>
    <button class="vm-btn" onclick="openInspect('${safe}')"><span class="ic">${_IC_CHECK}</span><span class="tx"><b>בדיקת תקינות</b><span>בדיקה תקופתית של הרכב</span></span></button>
    <button class="fh-btn" style="width:100%;justify-content:center;margin-top:4px" onclick="closeSheet()">חזרה</button>
  `);
}
/* טופס פתיחת תקלה — מצומצם, נהג מזוהה אוטומטית, עם מדיה */
let DF_IMP='norm',DF_VEH='',DF_FROM='',DF_MEDIA=[];
function openDrvFault(name,from){
  DF_IMP='norm';DF_VEH=name;DF_FROM=from||'';DF_MEDIA=[];const types=drvFTypes();
  openSheet(`
    <h3>פתיחת תקלה</h3>
    <div class="fld" style="margin-top:14px"><label>רכב</label>${comboHTML('df-cb-veh','בחר רכב…',name||'',name||'')}</div>
    <div class="fld"><label>סוג התקלה</label>${comboHTML('df-cb-type','בחר סוג…','','')}</div>
    <div class="fld"><label>חשיבות</label><div class="iseg" id="df-imp">${FIMPS.map(i=>`<button data-v="${i.id}" class="${i.id==='norm'?'on':''}" style="${i.id==='norm'?'background:'+i.color+';border-color:'+i.color:''}" onclick="dfImp('${i.id}')">${i.name}</button>`).join('')}</div></div>
    <div class="fld"><label>תיאור התקלה</label><textarea id="df-desc" placeholder="מה התקלה?"></textarea></div>
    <div class="fld"><label>תמונה / סרטון</label>
      <div class="df-media-btns">
        <button type="button" class="df-mbtn" onclick="document.getElementById('df-cam').click()"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> צלם/י עכשיו</button>
        <button type="button" class="df-mbtn" onclick="document.getElementById('df-gal').click()"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg> העלה/י מהגלריה</button>
      </div>
      <input type="file" id="df-cam" accept="image/*,video/*" capture="environment" style="display:none" onchange="dfAddMedia(this)">
      <input type="file" id="df-gal" accept="image/*,video/*" multiple style="display:none" onchange="dfAddMedia(this)">
      <div class="df-thumbs" id="df-thumbs"></div>
      <div class="fnote" style="margin-top:9px">אפשר לצרף כמה קבצים — לסרטונים עדיף קצרים, כדי שההעלאה תהיה מהירה.</div>
    </div>
    <button class="s-act" onclick="submitDrvFault()">פתיחת תקלה »»»</button>
    <button class="fh-btn" style="width:100%;justify-content:center;margin-top:10px" onclick="drvFaultBack()">חזור</button>
  `);
  cbSet('df-cb-veh',VEHICLES.map(v=>({v:v.n,label:v.n})));
  cbSet('df-cb-type',types.map(t=>({v:t.id,label:t.name})));
}
function drvFaultBack(){if(DF_FROM==='menu')openVehMenu(DF_VEH);else closeSheet();}
function dfImp(id){DF_IMP=id;document.querySelectorAll('#df-imp button').forEach(b=>{const on=b.dataset.v===id,c=(FIMPS.find(x=>x.id===b.dataset.v)||{}).color;b.classList.toggle('on',on);b.style.background=on?c:'';b.style.borderColor=on?c:'';});}
function dfAddMedia(input){
  const files=[...(input.files||[])];input.value='';
  files.forEach(file=>{const r=new FileReader();r.onload=()=>{
    if(file.type.indexOf('image')===0){const img=new Image();img.onload=()=>{const max=1280;let w=img.width,h=img.height;if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);DF_MEDIA.push({type:'image',url:c.toDataURL('image/jpeg',.8)});renderDfThumbs();};img.src=r.result;}
    else{DF_MEDIA.push({type:'video',url:r.result});renderDfThumbs();}
  };r.readAsDataURL(file);});
}
function renderDfThumbs(){const el=document.getElementById('df-thumbs');if(!el)return;el.innerHTML=DF_MEDIA.map((m,i)=>`<div class="df-thumb">${m.type==='video'?`<video src="${m.url}" muted></video><span class="df-vtag">▶</span>`:`<img src="${m.url}">`}<button type="button" class="df-rm" onclick="dfRmMedia(${i})">✕</button></div>`).join('');}
function dfRmMedia(i){DF_MEDIA.splice(i,1);renderDfThumbs();}
function submitDrvFault(){
  const veh=cbVal('df-cb-veh')||cbLabel('df-cb-veh'),desc=($('#df-desc').value||'').trim();
  if(!veh){toast('יש לבחור רכב');return}
  if(!desc){toast('יש להזין תיאור תקלה');return}
  const rec={id:'flt'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),vehicle:veh,plate:vehPlate(veh),type:cbVal('df-cb-type')||'other',desc,handler:'',driver:ME.n,source:'driver',importance:DF_IMP,status:'open',openDate:DEMO_TODAY,closeDate:'',notes:'',createdAt:Date.now()};
  if(DF_MEDIA.length)rec.media=DF_MEDIA.slice();
  try{drvAddFault(rec);}
  catch(e){delete rec.media;try{drvAddFault(rec);closeSheet();DF_MEDIA=[];toast('הקבצים גדולים לשמירה מקומית — התקלה נשמרה ללא מדיה',3800);return;}catch(e2){toast('השמירה נכשלה, נסה שוב');return;}}
  closeSheet();DF_MEDIA=[];toast('התקלה דווחה ונשלחה למנהל ✓',3200);
}
/* ===== בדיקת תקינות ===== */
const INSP_ITEMS=[['arg','ארגונית'],['jack','ג׳ק שמן'],['vest','אפוד זוהר'],['handle','ידית כוח'],['oil','שמן מנוע'],['gloves','כפפות'],['emblems','סמלי מדינה'],['sticker','מדבקת גג 911']];
const INSP_OIL=[{v:'ok',l:'בדקתי, תקין'},{v:'filled',l:'בדקתי ומילאתי'},{v:'need',l:'חסר ונדרש למלא'}];
const INSP_WASHER=[{v:'done',l:'בוצע'},{v:'need',l:'לא בוצע, נדרש למלא'}];
let INSP_VEH='';
function openInspect(name){INSP_VEH=name;closeSheet();go('inspect');}
function inspPickVeh(){
  openSheet(`<h3>בחר רכב</h3><div class="sub">לבדיקת התקינות</div>${VEHICLES.filter(v=>!v.hidden&&!v.archived).map(v=>`<button class="vm-btn" style="padding:14px 16px" onclick="INSP_VEH='${v.n.replace(/'/g,"\\'")}';closeSheet();go('inspect')"><span class="tx"><b>${v.n}</b><span>${v.loc||'—'}</span></span></button>`).join('')}<button class="fh-btn" style="width:100%;justify-content:center;margin-top:4px" onclick="closeSheet()">ביטול</button>`);
}
function inspToggle(k){const sw=document.getElementById('ci-'+k);if(!sw)return;const on=!sw.classList.contains('on');sw.classList.toggle('on',on);const kn=sw.querySelector('.knob');if(kn)kn.innerHTML=on?_IC_OK:_IC_X;}
function inspRad(group,v){document.querySelectorAll('#'+group+' button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));}
function saveInspection(){
  const items={};INSP_ITEMS.forEach(([k])=>{const e=document.getElementById('ci-'+k);items[k]=!!(e&&e.classList.contains('on'))});
  const oilEl=document.querySelector('#insp-oil button.on'),washerEl=document.querySelector('#insp-washer button.on');
  const oil=oilEl?oilEl.dataset.v:'',washer=washerEl?washerEl.dataset.v:'';
  const notes=($('#insp-notes').value||'').trim();
  const rec={id:'insp'+Date.now().toString(36),vehicle:INSP_VEH,plate:vehPlate(INSP_VEH),driver:ME.n,date:DEMO_TODAY,location:'',items,oil,washer,notes,createdAt:Date.now()};
  let arr=[];try{arr=Store.reload('inspections')||[]}catch(e){arr=Store.get('inspections',[])||[]}arr.unshift(rec);Store.set('inspections',arr);
  toast('בדיקת התקינות נשמרה ✓',3200);go('veh');
}
views.inspect=()=>{
  if(!INSP_VEH){return `<div style="height:46px"></div><div class="empty">לא נבחר רכב</div><button class="bigact start" onclick="inspPickVeh()">בחר רכב</button>`;}
  const name=INSP_VEH,v=VEHICLES.find(x=>x.n===name)||{};
  return `
  <div style="height:46px"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px">
    <button class="lnk" onclick="go('veh')">‹ חזרה</button>
    <button class="lnk" onclick="inspPickVeh()">בחר רכב</button>
  </div>
  <div class="insp-title">${v.arm?'<svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l8 3v6c0 5-3.4 9.4-8 11-4.6-1.6-8-6-8-11V5z"/></svg>':''}${name}</div>
  <div class="fnote" style="margin:2px 0 6px">בדיקת תקינות תקופתית · ${ME.n}</div>

  <div class="insp-h" style="margin-top:18px">האם קיים ברכב?</div>
  <div class="insp-card">${INSP_ITEMS.map(([k,l])=>`<div class="chk-row"><span class="chk-lbl">${l}</span><div class="chk-sw on" id="ci-${k}" onclick="inspToggle('${k}')"><div class="knob">${_IC_OK}</div></div></div>`).join('')}</div>

  <div class="insp-h">בדיקת שמן / מים</div>
  <div class="rseg" id="insp-oil">${INSP_OIL.map((o,i)=>`<button class="${i===0?'on':''}" data-v="${o.v}" onclick="inspRad('insp-oil','${o.v}')"><span class="dot"></span>${o.l}</button>`).join('')}</div>

  <div class="insp-h">מילוי מים בווישרים</div>
  <div class="rseg" id="insp-washer">${INSP_WASHER.map((o,i)=>`<button class="${i===0?'on':''}" data-v="${o.v}" onclick="inspRad('insp-washer','${o.v}')"><span class="dot"></span>${o.l}</button>`).join('')}</div>

  <div class="insp-h">תקלות נוספות / מנורות בלוח שעונים / הערות</div>
  <div class="fld"><textarea id="insp-notes" placeholder="התשובה שלך"></textarea></div>

  <div class="insp-flt">
    <h4><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/><path d="M12 9v4M12 17h.01"/></svg> זיהית משהו חריג?</h4>
    <p>פתח תקלה לרכב והיא תגיע ישירות למנהל</p>
    <button class="ap-btn" style="margin-top:0;border-color:var(--lime);color:var(--lime);background:var(--lime-soft)" onclick="openDrvFault(INSP_VEH)">+ פתיחת תקלה</button>
  </div>

  <button class="bigact start" onclick="saveInspection()">שמירת בדיקה »»»</button>
  <div style="height:34px"></div>`;
}

/* נעילת זום — תחושת אפליקציה */
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
document.addEventListener('gestureend',e=>e.preventDefault());
document.addEventListener('touchmove',e=>{if(e.scale!==undefined&&e.scale!==1)e.preventDefault()},{passive:false});

/* ===== פרופיל הנהג + הגדרות + נראה לאחרונה ===== */
function markSeen(){try{const m=Store.reload('drvseen')||{};m[ME.n]=Date.now();Store.set('drvseen',m)}catch(e){}}
function persistProfile(){try{const cur=Store.get('drv:'+ME.n,{})||{};Store.set('drv:'+ME.n,Object.assign({},cur,{ph:ME.ph||'',home:ME.home||'',photo:ME.photo||''}))}catch(e){}}
function renderAva(){const a=$('#ava');if(!a)return;if(ME.photo){a.style.backgroundImage='url('+ME.photo+')';a.style.backgroundSize='cover';a.style.backgroundPosition='center';a.textContent='';}else{a.style.backgroundImage='';a.textContent=ME.n.split(' ').map(x=>x[0]).join('');}a.style.cursor='pointer';a.onclick=()=>go('settings');}
function onPhotoPick(e){const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const sz=240,s=Math.min(img.width,img.height);c.width=c.height=sz;c.getContext('2d').drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,sz,sz);ME.photo=c.toDataURL('image/jpeg',.82);persistProfile();renderAva();go('settings');toast('התמונה עודכנה');};img.src=r.result;};r.readAsDataURL(f);}
function removePhoto(){ME.photo='';persistProfile();renderAva();go('settings')}
function saveSettings(){ME.home=($('#setHome').value||'').trim();persistProfile();markSeen();renderAva();toast('ההגדרות נשמרו ✓');go('tasks');}
views.settings=()=>`
  <div style="max-width:520px;margin:0 auto;padding-bottom:80px">
    <h2 style="font-size:22px;margin:4px 0 3px">הגדרות</h2>
    <div style="color:var(--mut);font-size:13px;margin-bottom:20px">הפרטים האישיים וההעדפות שלך</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:11px;margin-bottom:24px">
      <div class="set-ava" id="setAva">${ME.photo?`<img src="${ME.photo}" alt="">`:ME.n.split(' ').map(x=>x[0]).join('')}</div>
      <label class="set-photo-btn"><input type="file" accept="image/*" style="display:none" onchange="onPhotoPick(event)">${ME.photo?'החלפת תמונה':'הוספת תמונת פרופיל'}</label>
      ${ME.photo?'<button class="set-photo-rm" onclick="removePhoto()">הסרת תמונה</button>':''}
    </div>
    <div class="fld"><label>שם</label><input type="text" value="${ME.n}" readonly style="opacity:.65"></div>
    <div class="fnote" style="margin-top:-6px">השם מוגדר על־ידי המשרד.</div>
    <div class="fld"><label>כתובת בית</label><input type="text" id="setHome" value="${ME.home||''}" placeholder="רחוב ומספר, עיר"></div>
    <div class="fnote">כתובת הבית משמשת לכפתור «בית» בדיווח סיום משימה.</div>
    <button class="s-act" style="margin-top:10px" onclick="saveSettings()">שמירת הגדרות</button>
    <button class="set-logout" onclick="vipLogout()">התנתקות</button>
  </div>`;

/* init */
(function(){
  if(SESSION){
    ME.n=SESSION.name;
    /* נהג: אין מעבר לניהול · מנהל: יש חזרה לניהול */
    if(SESSION.role==='manager')$('#backToAdmin').style.display='';
    else $('#logoutBtn').style.display='';
  }
  loadAll();
  /* טעינת פרופיל הנהג (בית/תמונה/טלפון/תעריף) מהמאגר המשותף */
  try{const dp=Store.get('drv:'+ME.n,null);if(dp){if(dp.home!=null&&dp.home!=='')ME.home=dp.home;if(dp.photo)ME.photo=dp.photo;if(dp.ph)ME.ph=dp.ph;if(dp.rate!=null)ME.rate=dp.rate;if(dp.rateS!=null)ME.rateS=dp.rateS;}}catch(e){}
  markSeen();
  applyScheduledTheme();
  setInterval(applyScheduledTheme,60000);
  if(navigator.onLine)setTimeout(flushOutbox,800);
  const h=new Date().getHours();
  $('#hello').textContent=(h<5?'לילה טוב':h<12?'בוקר טוב':h<18?'צהריים טובים':'ערב טוב')+', '+ME.n+'!';
  $('#helloDate').textContent='היום '+fromIso(DEMO_TODAY).toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});
  renderAva();
})();
const _h0=location.hash.slice(1);
go(views[_h0]?_h0:'tasks');
/* עדכון חי בין הממשקים (אותו דפדפן) — כשהמנהל משנה משימה/רכב, הנהג מתרענן */
window.addEventListener('storage',e=>{
  if(!e.key)return;
  if(e.key==='vip_tasks'){loadAll();if(window.CURV)go(window.CURV);}
  else if(e.key.indexOf('vip_veh:')===0){try{Store.reload(e.key.slice(4))}catch(err){}if(window.CURV)go(window.CURV);}
});
</script>
</body>
</html>
