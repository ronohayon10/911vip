<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>911VIP · ממשק נהג</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Rubik:wght@500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --btn:#0E0F11;
  --ink:#0E0F11;--ink2:#3A3C40;--paper:#F2F2EE;--card:#FFFFFF;
  --line:#E4E4DE;--line2:#D6D6CE;--mut:#8A8D92;
  --lime:#E0892F;--lime-soft:#FBEFE2;
  --green:#1F9D55;--green-bg:#E5F3EB;--amber:#B97A0A;--amber-bg:#FBF3E1;
  --red:#C03A2B;--red-bg:#F9E9E6;--violet:#6D5BD0;--violet-bg:#EEEBFA;
  --mono:'IBM Plex Mono',monospace;
  --r:20px;
}
html[data-theme="dark"]{
  --paper:#101114;--card:#1A1C20;--ink:#F1F1EC;--ink2:#CFD1D5;
  --line:#262930;--line2:#34373E;--mut:#8E9197;
  --lime-soft:#2A2014;
  --green-bg:#11271B;--amber-bg:#2A2110;--red-bg:#2B1613;--violet-bg:#1F1B34;
  background:#101114;
}
html[data-theme="dark"] body{background:#101114;color:#F1F1EC}
html[data-theme="dark"] .app{background:#101114}
html[data-theme="dark"] .main{background:#101114}
html[data-theme="dark"] .nav{background:rgba(26,28,32,.94);border-color:rgba(255,255,255,.06)}
html[data-theme="dark"] .nav button.on{background:rgba(255,255,255,.1)}
html[data-theme="dark"] .hero{box-shadow:0 12px 34px rgba(0,0,0,.5)}
html[data-theme="dark"] .sheet,html[data-theme="dark"] .row,html[data-theme="dark"] .tcard,html[data-theme="dark"] .av-row,html[data-theme="dark"] .pay-row,html[data-theme="dark"] .fab-adm{box-shadow:none}
html[data-theme="dark"] .dchip,html[data-theme="dark"] .tile{background:#121316}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;touch-action:manipulation}
body{
  font-family:'Heebo',sans-serif;background:var(--paper);color:var(--ink);
  position:fixed;inset:0;overflow:hidden;
}
h1,h2,h3{font-family:'Rubik',sans-serif}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit}
.num{font-family:var(--mono)}

/* ================= shell ================= */
.app{height:100%;max-width:560px;margin:0 auto;display:flex;flex-direction:column;position:relative}

/* כותרת כהה שהתוכן צף עליה */
.hd{
  background:linear-gradient(160deg,#131417 0%,#0E0F11 60%);
  color:#fff;flex:none;
  padding:calc(14px + env(safe-area-inset-top)) 20px 52px;
  border-radius:0 0 30px 30px;
  position:relative;z-index:1;
}
.hd-row{display:flex;align-items:center;gap:12px}
.hd img{height:26px;opacity:.95}
.hd .mgr{
  margin-inline-start:auto;font-size:10.5px;color:#9DA0A6;text-decoration:none;
  border:1px solid #2A2C30;border-radius:999px;padding:5px 11px;font-weight:600;
}
.hd .hello{margin-top:16px}
.hd .hello b{display:block;font-size:21px;font-family:'Rubik';font-weight:700}
.hd .hello span{font-size:12px;color:#9DA0A6;font-weight:500}
.hd .ava{
  width:38px;height:38px;border-radius:50%;background:var(--lime);color:#0E0F11;
  display:grid;place-items:center;font-weight:800;font-size:14px;flex:none;font-family:'Rubik';
}

.main{
  flex:1;overflow:auto;-webkit-overflow-scrolling:touch;
  padding:0 16px calc(108px + env(safe-area-inset-bottom));
  margin-top:-34px;position:relative;z-index:2;
}

/* ================= hero ================= */
.hero{
  background:var(--card);border-radius:24px;padding:18px 18px 16px;
  box-shadow:0 12px 34px rgba(14,15,17,.12);
}
.h-status{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.h-status .pill{
  display:inline-flex;align-items:center;gap:6px;border-radius:999px;
  padding:5px 12px;font-size:11.5px;font-weight:800;
}
.pill.live{background:var(--green-bg);color:var(--green)}
.pill.next{background:var(--lime-soft);color:#A96012}
.pill.wait{background:var(--amber-bg);color:var(--amber)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.h-status .when{margin-inline-start:auto;font-size:11.5px;color:var(--mut);font-weight:700}
.hero h2{font-size:24px;letter-spacing:-.01em}
.hero .cl{font-size:13px;color:var(--mut);font-weight:600;margin-top:2px}

.h-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:15px}
.tile{background:var(--paper);border-radius:15px;padding:11px 13px;min-width:0}
.tile.w{grid-column:1/-1}
.tile span{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--mut);font-weight:700;letter-spacing:.02em}
.tile b{display:block;font-size:16px;font-weight:700;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tile svg{flex:none}

/* stepper */
.stepper{display:flex;align-items:flex-start;margin-top:17px;padding:0 4px}
.snode{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative}
.snode::before{
  content:'';position:absolute;top:11px;inset-inline-start:calc(50% + 14px);inset-inline-end:calc(-50% + 14px);
  height:2.5px;border-radius:99px;background:var(--line);
}
.snode:last-child::before{display:none}
.snode.done::before{background:var(--green)}
.sdot{
  width:23px;height:23px;border-radius:50%;background:var(--card);border:2.5px solid var(--line2);
  display:grid;place-items:center;color:#fff;position:relative;z-index:1;
}
.snode.done .sdot{background:var(--green);border-color:var(--green)}
.snode.cur .sdot{border-color:var(--lime);box-shadow:0 0 0 4px var(--lime-soft)}
.snode.cur .sdot::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--lime);animation:pulse 1.5s infinite}
.snode small{font-size:9.5px;font-weight:700;color:var(--mut);text-align:center;line-height:1.25}
.snode.cur small{color:var(--ink)}

.bigact{
  margin-top:16px;width:100%;border-radius:17px;padding:18px;font-size:18.5px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:9px;
  transition:transform .08s;
}
.bigact:active{transform:scale(.98)}
.ap-btn{
  width:100%;margin-top:13px;display:flex;align-items:center;justify-content:center;gap:8px;
  border:1.5px solid var(--green);color:var(--green);background:var(--green-bg);
  border-radius:14px;padding:12px;font-weight:800;font-size:14.5px;
}
.ap-btn:active{transform:scale(.985)}
.bigact.approve{background:var(--green);color:#fff;box-shadow:0 8px 22px rgba(31,157,85,.3)}
.bigact.start{background:var(--btn);color:var(--lime);box-shadow:0 8px 22px rgba(14,15,17,.28)}
.bigact.rel{background:var(--lime);color:#fff;box-shadow:0 8px 22px rgba(224,137,47,.32)}
.bigact.end{background:var(--btn);color:var(--lime);box-shadow:0 8px 22px rgba(14,15,17,.28)}

/* ================= lists ================= */
.sec-t{font-size:12px;font-weight:800;color:var(--mut);letter-spacing:.05em;margin:22px 4px 10px}
.row{
  background:var(--card);border-radius:18px;padding:13px 14px;margin-bottom:9px;
  display:flex;align-items:center;gap:13px;box-shadow:0 1px 3px rgba(14,15,17,.05);
}
.dchip{
  width:46px;flex:none;background:var(--paper);border-radius:13px;text-align:center;padding:7px 0 6px;
}
.dchip b{display:block;font-size:17px;font-family:var(--mono);font-weight:700;line-height:1}
.dchip span{font-size:9.5px;color:var(--mut);font-weight:700}
.row .bd{flex:1;min-width:0}
.row .bd h3{font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .bd p{font-size:11.5px;color:var(--mut);font-weight:500;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 10px;font-size:10.5px;font-weight:800;flex:none}
.c-green{background:var(--green-bg);color:var(--green)}
.c-amber{background:var(--amber-bg);color:var(--amber)}
.c-mut{background:#EDEDE8;color:var(--mut)}
.c-violet{background:var(--violet-bg);color:var(--violet)}
.row .ok{
  flex:none;border:1.5px solid var(--green);color:var(--green);border-radius:999px;
  padding:7px 13px;font-size:12px;font-weight:800;
}
.adm-ic{width:16px;height:16px;border-radius:5px;background:var(--violet);color:#fff;font-size:10px;font-weight:800;display:grid;place-items:center}
.fab-adm{
  width:100%;background:var(--card);border-radius:18px;padding:14px;margin-top:12px;
  color:var(--violet);font-weight:800;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:9px;
  box-shadow:0 1px 3px rgba(14,15,17,.05);
}
.empty{color:var(--mut);text-align:center;padding:40px 10px;font-size:13.5px}

/* ================= floating nav ================= */
.nav{
  position:fixed;bottom:calc(10px + env(safe-area-inset-bottom));left:16px;right:16px;z-index:40;
  max-width:532px;margin:0 auto;background:rgba(255,255,255,.92);
  -webkit-backdrop-filter:blur(18px) saturate(1.6);backdrop-filter:blur(18px) saturate(1.6);
  border-radius:999px;display:flex;padding:7px;gap:3px;
  box-shadow:0 12px 36px rgba(14,15,17,.16),0 2px 8px rgba(14,15,17,.07);
  border:1px solid rgba(14,15,17,.04);
}
.nav button{
  flex:1;display:grid;place-items:center;color:var(--ink);
  padding:12px 0;border-radius:999px;font-size:0;line-height:0;transition:background .15s;
}
.nav button svg{stroke:currentColor;width:23px;height:23px}
.nav button.on{background:rgba(14,15,17,.08)}
.nav button:active{background:rgba(14,15,17,.12)}

/* ================= sheet ================= */
.scrim{position:fixed;inset:0;background:rgba(14,15,17,.5);opacity:0;pointer-events:none;transition:.18s;z-index:60}
.scrim.open{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:61;max-width:560px;margin:0 auto;
  background:var(--card);border-radius:26px 26px 0 0;
  padding:10px 20px calc(20px + env(safe-area-inset-bottom));
  transform:translateY(105%);transition:transform .26s cubic-bezier(.22,.8,.3,1);
  max-height:88dvh;overflow:auto;
}
.sheet.open{transform:translateY(0)}
.grab{width:38px;height:4px;border-radius:99px;background:var(--line2);margin:4px auto 16px}
.sheet h3{font-size:19px;padding-inline-end:52px}
.sheet .sub{font-size:12.5px;color:var(--mut);margin:3px 0 17px;font-weight:600;padding-inline-end:52px}
.fld{margin-bottom:13px}
.fld>label{display:block;font-size:11.5px;font-weight:800;color:var(--ink2);margin-bottom:6px}
.fld input,.fld select{
  width:100%;border:1.5px solid var(--line2);border-radius:14px;padding:15px;font-size:18px;
  background:var(--card);outline:none;font-weight:600;
}
.fld input:focus,.fld select:focus{border-color:var(--ink)}
/* iOS: שדות שעה מתעלמים מרוחב — קיבוע מפורש */
.fld input[type="time"]{
  -webkit-appearance:none;appearance:none;display:block;
  width:100%;max-width:100%;min-width:0;text-align:start;
  background:var(--card);color:var(--ink);
}
.fld input[type="time"]::-webkit-date-and-time-value{text-align:start}
.fnote{font-size:11px;color:var(--mut);margin:-7px 0 13px;font-weight:500}
.fhelp{display:flex;align-items:center;gap:8px;margin:-7px 0 13px;flex-wrap:wrap}
.fh-info{font-size:11.5px;color:var(--mut);font-weight:600}
.fh-btn{
  display:inline-flex;align-items:center;gap:5px;border:1.5px solid var(--line2);
  border-radius:999px;padding:6px 12px;font-size:11.5px;font-weight:800;color:var(--ink2);
  background:var(--card);
}
.fh-btn:active{background:var(--paper)}
.s-act{
  width:100%;border-radius:16px;padding:17px;font-size:17.5px;font-weight:800;
  background:var(--btn);color:var(--lime);text-align:center;margin-top:5px;
}
.s-x{position:absolute;top:16px;inset-inline-start:16px;width:32px;height:32px;border-radius:50%;background:var(--paper);display:grid;place-items:center}

/* ================= avail / pay ================= */
.av-head{
  background:var(--card);border-radius:18px;padding:15px 16px;margin-bottom:12px;
  box-shadow:0 1px 3px rgba(14,15,17,.05);
}
.av-head .t{display:flex;align-items:center;gap:9px}
.av-head .t b{font-size:15.5px;font-family:'Rubik'}
.av-head .t .chip{margin-inline-start:auto}
.av-head .d{font-size:11.5px;color:var(--mut);font-weight:600;margin-top:4px}
.av-remind{
  background:var(--amber-bg);color:var(--amber);border-radius:14px;padding:11px 14px;
  font-size:12px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;
}
.av-all{
  width:100%;border:1.5px dashed var(--line2);border-radius:14px;padding:11px;margin-bottom:10px;
  color:var(--green);font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;gap:7px;
  background:var(--card);
}
.seg3{display:flex;gap:0;border:1.5px solid var(--line2);border-radius:12px;overflow:hidden;flex:none}
.seg3 button{
  width:46px;padding:9px 0;display:grid;place-items:center;color:var(--mut);
  border-inline-start:1.5px solid var(--line2);background:var(--card);
}
.seg3 button:first-child{border-inline-start:none}
.seg3 .y.on{background:var(--green);color:#fff}
.seg3 .p.on{background:var(--amber);color:#fff}
.seg3 .n.on{background:var(--red);color:#fff}
.av-note{flex:1;min-width:0}
.av-note input{
  width:100%;border:1.5px solid var(--amber);border-radius:11px;padding:8px 11px;
  font-size:16px;background:var(--amber-bg);color:var(--ink);outline:none;font-weight:500;
}
.av-mini{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:10px}
.av-d{border-radius:13px;padding:9px 2px 8px;text-align:center;background:var(--card)}
.av-d span{display:block;font-size:9.5px;font-weight:700;color:var(--mut)}
.av-d b{display:block;font-size:15px;font-family:var(--mono);margin:2px 0 3px}
.av-d .ic{display:flex;justify-content:center}
.av-d.y{background:var(--green-bg)}.av-d.y .ic{color:var(--green)}
.av-d.p{background:var(--amber-bg)}.av-d.p .ic{color:var(--amber)}
.av-d.n{background:var(--red-bg)}.av-d.n .ic{color:var(--red)}
.av-notes{margin-bottom:10px}
.av-notes div{font-size:11.5px;color:var(--mut);font-weight:600;padding:3px 4px}
.av-more{
  width:100%;border:1.5px dashed var(--line2);border-radius:14px;padding:12px;margin-top:14px;
  color:var(--ink2);font-weight:800;font-size:13px;background:var(--card);
}
.av-sum{flex:1;min-width:0;display:flex;align-items:center;gap:8px}
.av-sum .nt{font-size:12px;color:var(--mut);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.av-submit{
  width:100%;border-radius:16px;padding:16px;font-size:16px;font-weight:800;margin-top:6px;
  background:var(--btn);color:var(--lime);
}
.av-submit:disabled{opacity:.4}
.av-row{
  background:var(--card);border-radius:17px;padding:13px 15px;margin-bottom:9px;
  display:flex;align-items:center;gap:10px;box-shadow:0 1px 3px rgba(14,15,17,.05);
}
.av-row .d{flex:1}
.av-row .d b{display:block;font-size:14.5px}
.av-row .d span{font-size:11px;color:var(--mut);font-weight:600}
.av-opts{display:flex;gap:6px}
.av-opts button{
  width:38px;height:38px;border-radius:12px;border:1.5px solid var(--line2);
  display:grid;place-items:center;color:var(--mut);
}
.av-opts button.y.on{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.av-opts button.p.on{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.av-opts button.n.on{background:var(--red-bg);border-color:var(--red);color:var(--red)}

.pay-sum{
  background:linear-gradient(150deg,#16181C,#0E0F11);color:#fff;border-radius:22px;
  padding:20px;margin-bottom:16px;box-shadow:0 10px 28px rgba(14,15,17,.2);
}
.pay-sum .lbl{font-size:11px;color:#9DA0A6;font-weight:700}
.pay-sum .big{font-size:34px;font-weight:700;font-family:var(--mono);color:var(--lime);margin-top:3px}
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
.pay-grid div b{display:block;font-size:17px;font-family:var(--mono)}
.pay-grid div span{font-size:10.5px;color:#9DA0A6;font-weight:600}
.pay-row{
  background:var(--card);border-radius:15px;padding:12px 15px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;box-shadow:0 1px 3px rgba(14,15,17,.05);
}
.pay-row .n{flex:1}
.pay-row .n b{display:block;font-size:14px}
.pay-row .n span{font-size:11px;color:var(--mut);font-weight:600}
.pay-row .amt{font-family:var(--mono);font-weight:700;font-size:15px}

.toast{
  position:fixed;bottom:calc(86px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(16px);
  background:#26282D;color:#fff;border-radius:14px;padding:12px 18px;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;transition:.2s;z-index:80;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;
  box-shadow:0 10px 26px rgba(14,15,17,.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

/* ============================================================
   Store — שכבת אחסון מרכזית אחת לכל המערכת (זהה בכל הקבצים).
   כל שינוי עובר דרך כאן. היום: localStorage. מעבר לאונליין:
   מחליפים רק את גוף set/get כך שידברו עם השרת. ============= */
const Store=(()=>{
  const PREFIX='vip_';const mem={};
  function set(key,val){mem[key]=val;try{localStorage.setItem(PREFIX+key,JSON.stringify(val))}catch(e){}return val;}
  function get(key,fallback){if(key in mem)return mem[key];try{const r=localStorage.getItem(PREFIX+key);if(r!=null){mem[key]=JSON.parse(r);return mem[key]}}catch(e){}return(fallback!==undefined?fallback:null);}
  function remove(key){delete mem[key];try{localStorage.removeItem(PREFIX+key)}catch(e){}}
  function reload(key){delete mem[key];return get(key);}
  return{set,get,remove,reload};
})();

/* ===== DB משותף — מקור אמת אחד לנהג ולמנהל (localStorage 'tasks') =====
   הנהג קורא את המשימות, כותב בחזרה דיווחים (אישור/התחלה/הסרת אחריות/סיום),
   והמנהל רואה מיד. בייצור: אותו API — getTasks/saveTasks. */
const CANCEL_MS=(24+5)*3600*1000; /* בוטלה: לא הותחלה עד 5 שעות אחרי חצות שלאחר יום המשימה */
function taskStarted(t){return (t.stage!=null&&t.stage>=1)||(t.ts&&t.ts.start)||t.done;}
function isCancelledTask(t){
  if(taskStarted(t))return false;
  return Date.now()>fromIso(t.date).getTime()+CANCEL_MS;
}
function normTask(t){
  if(t.stage==null)t.stage=t.done?3:(t.cls==='live'?((t.ts&&t.ts.rel)?2:1):-1);
  t.ts=t.ts||{};t.km=t.km||{};t.rts=t.rts||{};t.locs=t.locs||{};
  if(t.cls==='admin')t.adm=true;
  return t;
}
let ALL=[]; /* כל המשימות במודל הקנוני (משותף עם המנהל) */
function loadAll(){
  let shared=null;try{shared=Store.reload('tasks')}catch(e){}
  ALL=(shared&&Array.isArray(shared)&&shared.length)?shared:DEMO_TASKS;
  ALL.forEach(normTask);
}
function saveAll(){try{Store.set('tasks',ALL)}catch(e){}}
loadAll();
const byId=id=>ALL.find(t=>t.id===+id);
/* הרשאות נתונים: נהג רואה אך ורק את המשימות שלו, ללא משימות שבוטלו */
const MY_TASKS=()=>ALL.filter(t=>t.drv===ME.n&&!isCancelledTask(t)).map(t=>Object.assign({},t,{veh:t.veh||''}));

const $=s=>document.querySelector(s);
const vehRec=n=>VEHICLES.find(v=>v.n===n);
/* ק"מ נוכחי של רכב — מהמאגר המשותף (מתעדכן ע"י דיווחי נהגים) */
function vehKmOf(name){try{const r=Store.get('veh:'+name,null);if(r&&r.km!=null)return r.km;}catch(e){}const v=vehRec(name);return v?v.km:null;}
/* דיווח סיום/דרך → ק"מ נוכחי של הרכב (סופר אחורה לטיפול אצל המנהל) */
function bumpVehicleKm(name,km,loc){
  if(!name||!km)return;
  let cur={};try{cur=Store.get('veh:'+name,{})||{}}catch(e){}
  const k=Math.max(+km,+(cur.km||0));
  const rec=Object.assign({},cur,{km:k,kmAt:Date.now()});if(loc)rec.loc=loc;
  try{Store.set('veh:'+name,rec)}catch(e){}
}

function stChip(t){
  if(t.stage===3)return '<span class="chip c-mut">הושלמה</span>';
  if(t.stage===1||t.stage===2)return '<span class="chip c-green"><span class="dot pulse"></span>בנסיעה</span>';
  if(t.stage===-1)return '<span class="chip c-amber">ממתין לאישורך</span>';
  if(t.adm)return '<span class="chip c-violet">מנהלתית</span>';
  return '<span class="chip c-green">מאושרת</span>';
}
function stepper(t){
  const steps=t.adm?[['אישור',0],['התחלה',1],['סיום',3]]:[['אישור',0],['התחלה',1],['הסרת אחריות',2],['סיום',3]];
  /* done אם השלב הושג, cur אם הוא הבא בתור */
  const reached=s=>t.stage>=s;
  let curFound=false;
  return '<div class="stepper">'+steps.map(([lbl,s])=>{
    const done=reached(s);
    let cls='';
    if(done)cls='done';
    else if(!curFound){cls='cur';curFound=true}
    return `<div class="snode ${cls}"><span class="sdot">${done?TI.check:''}</span><small>${lbl}</small></div>`;
  }).join('')+'</div>';
}
function heroCard(t){
  const live=t.stage===1||t.stage===2;
  /* כפתור הפעולה הראשי הוא תמיד שלב הנסיעה הבא — גם אם השיבוץ טרם אושר
     (שיבוץ של "מעכשיו לעכשיו": הנהג יוצא מיד, האישור בכפתור נפרד למעלה) */
  const eff=Math.max(0,t.stage);
  const a=ACT_META[t.adm&&eff===1?'2':String(eff)];
  const lbl=t.adm&&eff===1?'סיום משימה':a.label;
  const pill=live?'<span class="pill live"><span class="dot pulse"></span>נסיעה פעילה</span>'
    :t.stage===-1?'<span class="pill wait">ממתין לאישורך</span>'
    :'<span class="pill next">המשימה הבאה שלך</span>';
  return `
  <div class="hero">
    <div class="h-status">${pill}<span class="when num">${ddmm(t.date)}</span></div>
    <h2>${t.adm?'<span class="adm-ic" style="display:inline-grid;vertical-align:-2px;margin-inline-end:8px">מ</span>':''}${t.n}</h2>
    ${t.client?`<div class="cl">${t.client}</div>`:''}
    ${t.stage===-1?`<button class="ap-btn" onclick="approveTask(${t.id})">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M5 13l4 4L19 7"/></svg>
      אשר שיבוץ</button>`:''}
    <div class="h-grid">
      <div class="tile"><span>${TI.cal} תאריך</span><b>${dayLabel(t.date)}</b></div>
      ${t.time?`<div class="tile"><span>${TI.clock} התייצבות</span><b class="num">${t.time}</b></div>`:`<div class="tile"><span>${TI.clock} התייצבות</span><b>—</b></div>`}
      ${t.veh?`<div class="tile ${t.loc?'':'w'}"><span>${TI.car} רכב</span><b>${t.veh}</b></div>`:''}
      ${t.loc?`<div class="tile"><span>${TI.pin} ${t.adm?'הערה':'מיקום התייצבות'}</span><b>${t.loc}</b></div>`:''}
    </div>
    ${stepper(t)}
    ${t.stage<3?`<button class="bigact ${a.cls}" onclick="actOn(${t.id})">${lbl}
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M14 6l-6 6 6 6"/></svg></button>`:''}
  </div>`;
}
function rowCard(t){

    <div class="dchip"><b>${t.date.slice(8,10)}</b><span>${DAY_NAMES[d.getDay()]}</span></div>

function approveTask(id){

function actOn(id){
  const t=byId(id);

  const a=STAGE_ACT[eff];if(!a)return;
  const next=t.adm&&eff===1?3:a.next;
  const kind=next===1?{t:'התחלת משימה',k:'start',kmL:'ק"מ בהתחלת נסיעה',tL:'שעת התחלה',loc:false,notes:true,btn:'שמור והתחל משימה'}

  const lastKm=kind.k==='start'?vehKmOf(t.veh):null;
  const prevKm=kind.k==='rel'?{l:'ק"מ שהזנת בהתחלה',v:t.km.start}
              :kind.k==='end'?{l:'ק"מ שהזנת בהסרת אחריות',v:t.km.rel||t.km.start}
              :null;
  openSheet(`
    <button class="s-x" onclick="closeSheet()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6L6 18M6 6l12 12"/></svg></button>

    ${lastKm?`<div class="fhelp">

      <button type="button" class="fh-btn" onclick="$('#rK').value='${lastKm}'">סנכרן</button>
    </div>`:''}
    ${prevKm&&prevKm.v?`<div class="fhelp">
      <span class="fh-info">${prevKm.l}: <b class="num">${(+prevKm.v).toLocaleString()}</b></span>

/* מילוי מיקום מ-GPS של המכשיר */
function gpsFill(id,btn){
  if(!navigator.geolocation){toast('המכשיר לא תומך באיתור מיקום');return}
  const orig=btn.innerHTML;btn.innerHTML='מאתר…';btn.disabled=true;
  navigator.geolocation.getCurrentPosition(
    p=>{
      $('#'+id).value='GPS: '+p.coords.latitude.toFixed(5)+', '+p.coords.longitude.toFixed(5);
      btn.innerHTML=orig;btn.disabled=false;
      toast('המיקום נקלט ✓');
    },
    ()=>{btn.innerHTML=orig;btn.disabled=false;toast('לא ניתן לקבל מיקום — בדוק הרשאות')},
    {enableHighAccuracy:true,timeout:8000}
  );
}
function doReport(id,next,key,hasLoc){
  const t=byId(id);
  /* הגנה מלחיצה כפולה: השלב כבר בוצע — מתעלמים */
  if(!t||t.stage>=next){closeSheet();return}
  const b=$('#sheetGo');
  if(b){if(b.disabled)return;b.disabled=true;b.style.opacity=.6;b.textContent='שולח…'}
  const time=$('#rT').value,km=($('#rK').value||'').replace(/[^\d]/g,'');
  if(!km){toast('חסר דיווח ק"מ');$('#rK').focus();
    if(b){b.disabled=false;b.style.opacity=1;b.textContent='שמור ‹‹'}return}
  if(t.stage===-1&&!t.rts.ap)t.rts.ap=nowHM(); /* התחלה לפני אישור = אישור מובלע */
  t.ts[key]=time;t.km[key]=km;t.rts[key]=nowHM();
  if(hasLoc){const l=$('#rL').value.trim();if(l)t.locs[key]=l}
  const nEl=$('#rN');if(nEl&&nEl.value.trim())t.dnotes=nEl.value.trim();
  t.stage=next;
  if(next>=1&&t.cls!=='admin')t.cls='live';        /* התחלה → המנהל רואה «בנסיעה» */
  if(next===3){t.done=true;if(t.cls==='live')t.cls=undefined;} /* סיום → המנהל רואה «בוצע» */
  bumpVehicleKm(t.veh,km,key==='end'?(t.locs.end||''):'');  /* ק"מ → ק"מ נוכחי של הרכב (סופר לטיפול) */
  saveAll();                                        /* כתיבה למאגר המשותף — המנהל מתעדכן מיד */
  closeSheet();go('tasks');
  if(!navigator.onLine){
    queueReport(kindDesc(next,t));
    toast('אין קליטה — הדיווח נשמר במכשיר ויסונכרן אוטומטית',3800);
  }else{
    toast(next===3?'המשימה הסתיימה · נשלח לסדרן':'הדיווח נשלח לסדרן');
  }
}

const startOfWeek=s=>{const d=fromIso(s);d.setDate(d.getDate()-d.getDay());return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};

  AV[wk]=AV[wk]||{};

function avSection(wk,title,primary){

/* ================= שכר ================= */
function payOf(t){
  if(!t.ts.start||!t.ts.end)return null;
  const p=x=>{const[a,b]=x.split(':').map(Number);return a*60+b};
  let m=p(t.ts.end)-p(t.ts.start);if(m<=0)m+=1440;
  const shabbat=fromIso(t.date).getDay()===6;
  const rate=shabbat?ME.rateS:ME.rate;
  return{m,amt:Math.round(m/60*rate),rate,shabbat,
    h:String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0')};
}
views.pay=()=>{
  const rows=MY_TASKS().filter(t=>t.stage===3).map(t=>({t,p:payOf(t)})).filter(x=>x.p);
  const totM=rows.reduce((s,x)=>s+x.p.m,0),totA=rows.reduce((s,x)=>s+x.p.amt,0);
  return `
    <div style="height:34px"></div>
    <div class="pay-sum">
      <div class="lbl">שכר מצטבר · יוני 2026</div>
      <div class="big">₪${totA.toLocaleString()}</div>
      <div class="pay-grid">
        <div><b>${String(Math.floor(totM/60)).padStart(2,'0')}:${String(totM%60).padStart(2,'0')}</b><span>סה"כ שעות</span></div>
        <div><b>${rows.length}</b><span>משימות שהושלמו</span></div>
      </div>
    </div>
    <div class="sec-t">פירוט משימות</div>
    ${rows.map(({t,p})=>`<div class="pay-row">
      <div class="n"><b>${t.n}</b><span>${dayLabel(t.date)} · ${p.h} שע׳${p.shabbat?' · שבת':''}</span></div>
      <div class="amt">₪${p.amt.toLocaleString()}</div>
    </div>`).join('')||'<div class="empty">אין עדיין משימות שהושלמו החודש</div>'}
    <div class="fnote" style="margin-top:12px;text-align:center">החישוב: שעות בפועל × תעריף (חול/שבת) · הוצאות יתווספו בהמשך</div>
  `;
}

    ${VEHICLES.map(v=>`<div class="row">
      <div class="bd">
        <h3>${v.arm?'<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-1px;margin-inline-end:5px"><path d="M12 2l8 3v6c0 5-3.4 9.4-8 11-4.6-1.6-8-6-8-11V5z"/></svg>':''}${v.n}</h3>
        <p>${v.loc||'—'}</p>
      </div>
      ${v.loc?`<a class="ok" style="text-decoration:none" href="https://waze.com/ul?q=${encodeURIComponent(v.loc)}" target="_blank">נווט</a>`:''}
    </div>`).join('')}
    <div class="fnote" style="margin-top:12px;text-align:center">המיקום מתעדכן לפי דיווחי סיום המשימות</div>
  `;
}

/* נעילת זום — תחושת אפליקציה */
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
document.addEventListener('gestureend',e=>e.preventDefault());
document.addEventListener('touchmove',e=>{if(e.scale!==undefined&&e.scale!==1)e.preventDefault()},{passive:false});

/* init */
(function(){
  if(SESSION){
    ME.n=SESSION.name;
    /* נהג: אין מעבר לניהול · מנהל: יש חזרה לניהול */
    if(SESSION.role==='manager')$('#backToAdmin').style.display='';
    else $('#logoutBtn').style.display='';
  }
  loadAll();
  let th=Store.get('theme','light');
  setTheme(th);
  if(navigator.onLine)setTimeout(flushOutbox,800);
  const h=new Date().getHours();
  $('#hello').textContent=(h<5?'לילה טוב':h<12?'בוקר טוב':h<18?'צהריים טובים':'ערב טוב')+', '+ME.n+'!';
  $('#helloDate').textContent='היום '+fromIso(DEMO_TODAY).toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});
  $('#ava').textContent=ME.n.split(' ').map(x=>x[0]).join('');
})();
const _h0=location.hash.slice(1);
go(views[_h0]?_h0:'tasks');
/* עדכון חי בין הממשקים (אותו דפדפן) — כשהמנהל משנה משימה/רכב, הנהג מתרענן */
window.addEventListener('storage',e=>{
  if(!e.key)return;
  if(e.key==='vip_tasks'){loadAll();if(window.CURV)go(window.CURV);}
  else if(e.key.indexOf('vip_veh:')===0){try{Store.reload(e.key.slice(4))}catch(err){}if(window.CURV)go(window.CURV);}
});
</script>
</body>
</html>
