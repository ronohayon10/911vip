<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>911VIP · מערך נסיעות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Heebo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E0F11; --ink2:#3A3D42; --mut:#8A8E96;
  --paper:#F4F4F0; --card:#FFFFFF; --line:#E5E5DE; --line2:#D8D8D0;
  --lime:#E0892F; --lime-ink:#FFF7EE;
  --violet:#7C5CFC; --violet-bg:#EFEAFF;
  --green:#1E9E5E; --green-bg:#E2F6EA;
  --amber:#D98E0B; --amber-bg:#FCF0D8;
  --red:#D14848; --red-bg:#FBE7E7;
  --blue:#2D6CDF; --blue-bg:#E6EEFC;
  --r:14px; --r-s:9px;
  --shadow:0 1px 2px rgba(14,15,17,.05),0 8px 24px -12px rgba(14,15,17,.12);
  --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Heebo',sans-serif; background:var(--paper); color:var(--ink);
  font-size:15px; line-height:1.45; min-height:100dvh;
}
h1,h2,h3,.disp{font-family:'Rubik',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:inherit;color:inherit}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.02em}

/* ---------- App shell ---------- */
.shell{display:flex;min-height:100dvh}
.rail{
  position:fixed;inset-block:0;inset-inline-start:0;width:218px;z-index:40;
  background:var(--ink);color:#EDEEE9;display:flex;flex-direction:column;
  padding:20px 14px calc(16px + env(safe-area-inset-bottom));overflow:visible;
}
.brand{display:flex;justify-content:center;padding:2px 8px 14px}
.logo-img{width:38px;height:auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}
.badge911{
  width:38px;height:42px;display:grid;place-items:center;flex:none;
  background:var(--lime);color:var(--ink);font-family:'Rubik';font-weight:800;font-size:15px;
  clip-path:polygon(50% 0,100% 12%,100% 62%,50% 100%,0 62%,0 12%);
}
.brand b{font-family:'Rubik';font-size:17px;letter-spacing:.02em}
.brand small{display:block;color:#9CA0A8;font-size:11px;font-weight:400}
.nav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav button{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;
  color:#C9CBC4;font-size:14.5px;font-weight:500;text-align:start;transition:background .12s,color .12s;
}
.nav button svg{flex:none}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff}
.nav button.on{background:var(--lime);color:var(--lime-ink);font-weight:700}
.nav .spacer{flex:1}
.me{display:flex;align-items:center;gap:10px;padding:10px 8px;border-top:1px solid rgba(255,255,255,.1)}
.ava{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#5b5f66,#2c2f34);display:grid;place-items:center;font-family:'Rubik';font-weight:700;font-size:13px;color:var(--lime)}
.me small{color:#9CA0A8;font-size:11.5px}

.main{flex:1;margin-inline-start:218px;padding:22px clamp(16px,3vw,34px) 96px;transition:margin-inline-start .22s cubic-bezier(.32,.72,.32,1)}
/* --- תפריט מכווץ: אייקונים בלבד, נפתח במעבר עכבר --- */
.rail{transition:width .22s cubic-bezier(.32,.72,.32,1)}
.lbl{white-space:nowrap}
.tg-ic{transition:transform .22s ease}
.t-exp{display:none}
body.railc .t-col{display:none}
body.railc .t-exp{display:inline}
body.railc .tg-ic{transform:rotate(180deg)}
body.railc .ntg:hover .tg-ic{transform:rotate(180deg) scale(1.28)}
body.railc .rail{width:72px}
body.railc .main{margin-inline-start:72px}
body.railc .me-txt,body.railc .brand small{display:none}
body.railc .me{justify-content:center;padding-inline:0}
body.railc .nav button{justify-content:center;padding:12px 0;position:relative}
body.railc .nav button svg{transition:transform .16s ease}
body.railc .nav button:hover svg{transform:scale(1.28)}
/* תווית צפה פר-פריט: נפתחת רק לפריט שמרחפים מעליו */
body.railc .nav button .lbl{
  position:absolute;right:calc(100% + 14px);top:50%;
  transform:translateY(-50%) translateX(12px) scale(.92);transform-origin:right center;
  background:var(--ink);color:#F4F4EF;padding:8px 16px;border-radius:10px;
  font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;
  box-shadow:0 10px 28px rgba(14,15,17,.4);border:1px solid rgba(255,255,255,.09);
  transition:opacity .14s ease,transform .2s cubic-bezier(.32,.72,.32,1);z-index:60;
}
body.railc .nav button .lbl::after{
  content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%) rotate(45deg);
  width:9px;height:9px;background:var(--ink);border-inline-end:1px solid rgba(255,255,255,.09);border-top:1px solid rgba(255,255,255,.09);
}
body.railc .nav button:hover .lbl{opacity:1;transform:translateY(-50%) translateX(0) scale(1)}
body.railc .nav button.on:hover .lbl{background:var(--lime);color:var(--lime-ink);border-color:transparent}
body.railc .nav button.on:hover .lbl::after{background:var(--lime);border-color:transparent}
.main>.view>*:not(.home-grid){max-width:1280px}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.topbar h1{font-size:clamp(22px,3vw,28px);font-weight:800;letter-spacing:-.01em}
.topbar .sub{color:var(--mut);font-size:13.5px;margin-top:2px}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:999px;
  font-weight:600;font-size:14px;transition:transform .08s,box-shadow .12s;white-space:nowrap;
}
.btn:active{transform:scale(.97)}
.btn-pri{background:var(--lime);color:#0E0F11}
.btn-pri:hover{box-shadow:0 6px 18px -6px rgba(14,15,17,.4)}
.btn-gho{background:var(--card);border:1px solid var(--line2)}
.btn-gho:hover{border-color:var(--ink2)}
.btn-eq{min-width:62px;justify-content:center;padding-inline:10px}
.mob-live{display:none !important;position:relative}
@media (max-width:768px){
  .mob-live{display:inline-flex !important}
  .actions{flex-wrap:nowrap;gap:5px}
  .actions .btn{padding-inline:8px}
  .actions .btn-eq{min-width:52px}
  .actions .btn-ico{width:34px;height:34px}
}
.btn-ico{width:38px;height:38px;padding:0;justify-content:center;font-size:17px;font-weight:700;border-radius:50%}

/* ---------- Cards / chips ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.chip{display:inline-flex;align-items:center;gap:5px;padding:2.5px 10px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}
.c-green{background:var(--green-bg);color:var(--green)}
.c-amber{background:var(--amber-bg);color:var(--amber)}
.c-red{background:var(--red-bg);color:var(--red)}
.c-blue{background:var(--blue-bg);color:var(--blue)}
.c-violet{background:var(--violet-bg);color:var(--violet)}
.c-mut{background:#EFEFEA;color:var(--ink2)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.pulse{animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ---------- Dashboard ---------- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi{padding:14px 16px;display:flex;flex-direction:column;gap:2px}
.kpi .v{font-family:'Rubik';font-size:26px;font-weight:800;line-height:1.1}
.kpi .l{color:var(--mut);font-size:12.5px;font-weight:500}
.kpi .t{font-size:12px;font-weight:600}

.live{padding:18px;margin-bottom:14px;overflow:hidden}
.live-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.live-head h2{font-size:16.5px;font-weight:700;display:flex;align-items:center;gap:9px}
.now-clock{font-family:var(--mono);font-size:13px;color:var(--mut)}
.tl{position:relative}
.tl-hours{display:flex;justify-content:space-between;color:var(--mut);font-size:10.5px;font-family:var(--mono);padding:0 2px 6px;border-bottom:1px solid var(--line)}
.tl-rows{position:relative}
.tl-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line)}
.tl-row:last-child{border-bottom:none}
.tl-veh{width:128px;flex:none;font-size:12.5px;font-weight:600;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-track{position:relative;flex:1;height:30px;background:repeating-linear-gradient(to left,transparent,transparent calc(100%/18 - 1px),var(--line) calc(100%/18 - 1px),var(--line) calc(100%/18))}
.tl-bar{
  position:absolute;top:3px;bottom:3px;border-radius:7px;display:flex;align-items:center;
  padding:0 9px;font-size:11.5px;font-weight:600;overflow:hidden;white-space:nowrap;
  background:var(--ink);color:#fff;min-width:54px;
}
.tl-bar.done{background:#C9CDC2;color:#3c4038}
.tl-bar.admin{background:var(--violet)}
.tl-bar.live-bar{background:var(--green);box-shadow:0 0 0 3px var(--green-bg)}
.tl-now{position:absolute;top:-4px;bottom:0;width:2px;background:var(--red);z-index:3}
.tl-now::before{content:'';position:absolute;top:-3px;inset-inline-start:-3px;width:8px;height:8px;border-radius:50%;background:var(--red)}

.split{display:grid;grid-template-columns:1.4fr 1fr;gap:14px}
.panel{padding:16px 18px}
.panel h3{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.panel h3 a{font-size:12.5px;color:var(--mut);font-weight:500;text-decoration:none;cursor:pointer}
.alert-row{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line)}
.alert-row:last-child{border:none;padding-bottom:2px}
.alert-ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:none}
.alert-row b{font-size:13.5px;font-weight:600;display:block}
.alert-row span{font-size:12.5px;color:var(--mut)}
.feed-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.feed-row:last-child{border:none}
.feed-t{font-family:var(--mono);font-size:11.5px;color:var(--mut);flex:none;padding-top:2px}

/* ---------- Tables → cards ---------- */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.search{
  flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--card);
  border:1px solid var(--line2);border-radius:999px;padding:8px 14px;
}
.search input{border:none;outline:none;background:none;width:100%;font-size:14px}
.search svg{color:var(--mut);flex:none}
.seg{display:inline-flex;background:var(--card);border:1px solid var(--line2);border-radius:999px;padding:3px}
.seg button{padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600;color:var(--mut)}
.seg button.on{background:var(--lime);color:#0E0F11}
.filt{background:var(--card);border:1px solid var(--line2);border-radius:999px;padding:8px 13px;font-size:13px;font-weight:600;color:var(--ink2)}

.tbl{width:100%;border-collapse:collapse}
.tbl th{
  text-align:start;font-size:11.5px;font-weight:600;color:var(--mut);letter-spacing:.03em;
  padding:11px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);z-index:2;
}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .1s;cursor:pointer}
.tbl tbody tr:hover{background:#FAFAF6}
.tname{font-weight:700;font-size:14px}
.tsub{color:var(--mut);font-size:12px;margin-top:1px}
.scrollx{overflow-x:auto;border-radius:var(--r)}

.cards{display:none;flex-direction:column;gap:10px}
.mcard{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.mcard .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.mcard .meta{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:13px;color:var(--ink2)}
.mcard .meta b{font-weight:600;color:var(--ink)}
.mtimes{display:flex;gap:0;background:var(--paper);border-radius:var(--r-s);overflow:hidden;border:1px solid var(--line)}
.mtimes div{flex:1;text-align:center;padding:7px 4px;border-inline-start:1px solid var(--line)}
.mtimes div:first-child{border-inline-start:none}
.mtimes .l{font-size:10.5px;color:var(--mut);display:block}
.mtimes .v{font-family:var(--mono);font-size:13.5px;font-weight:600}

/* ---------- Week board ---------- */
.board-wrap{overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.board{display:grid;grid-template-columns:repeat(7,minmax(150px,1fr));gap:8px;min-width:1080px}
.bday{display:flex;flex-direction:column;gap:8px}
.bday-h{
  text-align:center;padding:9px 6px;border-radius:var(--r-s);background:var(--card);
  border:1px solid var(--line);font-size:12.5px;color:var(--mut);font-weight:600;
}
.bday-h b{display:block;font-family:'Rubik';font-size:16px;color:var(--ink)}
.bday-h.today{background:var(--ink);border-color:var(--ink)}
.bday-h.today b{color:var(--lime)}
.bday-h.shabat{background:#EFEFE8}
.btask{padding:10px 12px;border-radius:var(--r-s);border:1px solid var(--line);background:var(--card);cursor:pointer;transition:transform .1s,box-shadow .12s;border-inline-start:3px solid var(--ink)}
.btask:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.btask b{font-size:13px;display:block;margin-bottom:2px}
.btask span{font-size:11.5px;color:var(--mut);display:block}
.btask.admin{border-inline-start-color:var(--violet)}
.btask.cancelled{opacity:.55;border-inline-start-color:var(--red)}
.badd{border:1.5px dashed var(--line2);border-radius:var(--r-s);padding:9px;color:var(--mut);font-size:13px;font-weight:600;text-align:center;transition:all .12s}
.badd:hover{border-color:var(--ink);color:var(--ink)}

/* ---------- Week grid (home): vehicles × days ---------- */
.wk-wrap{overflow:auto;border-radius:var(--r);max-height:calc(100dvh - 175px);-webkit-overflow-scrolling:touch}
.wk{display:grid;grid-template-columns:max-content repeat(7,minmax(132px,1fr));min-width:1040px;background:var(--card)}
.wk-hd,.wk-corner,.wk-veh,.wk-cell{border-bottom:1px solid var(--line2);border-inline-end:1px solid var(--line2)}
.wk-hd:last-of-type{border-inline-end:none}
.wk-hd{
  position:sticky;top:0;z-index:5;background:var(--card);text-align:center;padding:9px 6px 10px;
  font-size:12px;color:var(--mut);font-weight:600;
}
.wk-hd b{display:block;font-family:'Rubik';font-size:16.5px;color:var(--ink);letter-spacing:-.01em}
.wk-hd.past{background:#FBF1F0}
.wk-hd.today{background:#D6E8F7;color:#54718C}
.wk-hd.today b{color:#1E3A56}
.wk-veh{
  position:sticky;inset-inline-start:0;z-index:4;background:var(--card);
  padding:10px 12px;display:flex;flex-direction:column;justify-content:center;gap:1px;
}
.wk-veh b{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap}
.wk-veh span{font-size:11px;color:var(--mut);width:0;min-width:100%;white-space:normal;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sh-ic{width:12px;height:12px;flex:none;color:var(--ink2)}
.wk-veh .vshield{font-size:9.5px;padding:1px 5px}
.wk-corner{position:sticky;top:0;inset-inline-start:0;z-index:6;background:var(--card);display:flex;align-items:center;padding:0 10px}
.wk-corner input{border:none;outline:none;background:none;flex:1;width:0;min-width:0;font-size:13px}
.wk-cell{padding:5px;display:flex;flex-direction:column;gap:4px;min-height:62px;position:relative;transition:background .12s}
.wk-cell.today-col{background:#F2F8FD}
.wk-cell.past{
  background-image:repeating-linear-gradient(45deg,transparent 0 7px,rgba(14,15,17,.028) 7px 8px);
}
.wk-cell.past:hover{background-color:inherit}
.wk-cell:hover{background:#FAF5EC}
.wk-task{
  border-radius:8px;padding:6px 9px;background:#F4F5EF;border:1px solid var(--line);
  border-inline-start:3px solid var(--ink);cursor:pointer;transition:transform .1s,box-shadow .12s;
}
.wk-task:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.wk-task{user-select:none;-webkit-user-select:none;cursor:grab;position:relative}
/* --- מצב בחירה מרובה --- */
.wk-task .ck{
  display:none;position:absolute;top:5px;inset-inline-end:5px;width:16px;height:16px;
  border:1.5px solid var(--line2);border-radius:5px;background:#fff;place-items:center;color:#fff;z-index:2;
}
body.selmode .wk-task .ck{display:grid}
body.selmode .wk-task{cursor:pointer;padding-inline-end:24px}
body.selmode .wk-add{display:none}
.done-b{
  position:absolute;top:4px;inset-inline-end:5px;color:var(--green);
  display:grid;place-items:center;z-index:2;line-height:0;
}
.wk-task.mini .done-b{top:3px;inset-inline-end:4px}
.live-b{
  position:absolute;top:7px;inset-inline-end:7px;width:7px;height:7px;border-radius:50%;
  background:var(--green);z-index:2;animation:pulse 1.6s infinite;
}
.wk-task.is-done{cursor:default}
.wk-task.is-done:hover{transform:none;box-shadow:none}
body.selmode .done-b,body.selmode .live-b{display:none}
.wk-task.sel{box-shadow:0 0 0 2px var(--lime);background:#FFF3E2}
.wk-task.sel .ck{background:var(--lime);border-color:var(--lime)}
.btn-gho.on-sel{background:var(--lime);color:#0E0F11;border-color:var(--lime)}
.drag-ghost span.gbadge{
  position:absolute;top:-9px;inset-inline-start:-9px;width:23px;height:23px;border-radius:50%;
  background:var(--lime);color:var(--lime-ink);display:grid;place-items:center;
  font-size:11.5px;font-weight:800;line-height:1;text-align:center;
  box-shadow:0 3px 10px rgba(0,0,0,.3);
}
.dp{
  position:fixed;z-index:82;display:none;width:272px;
  background:var(--card);border:1px solid var(--line);border-radius:15px;
  box-shadow:0 22px 60px rgba(14,15,17,.28);padding:13px;
}
.dp.open{display:block;animation:fade .15s ease}
.dp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.dp-head b{font-size:14px;font-weight:700}
.dp-nav{width:29px;height:29px;border-radius:9px;background:var(--paper);font-size:16px;font-weight:700;color:var(--ink2);display:grid;place-items:center}
.dp-nav:hover{background:var(--line)}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dp-dow{text-align:center;font-size:10.5px;color:var(--mut);font-weight:700;padding:4px 0}
.dp-day{
  height:32px;border-radius:9px;display:grid;place-items:center;
  font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums;transition:background .1s;
}
.dp-day:hover{background:var(--paper)}
.dp-day.other{color:var(--line2)}
.dp-day.today{box-shadow:inset 0 0 0 1.5px var(--lime);color:var(--ink)}
.dp-day.selected{background:var(--lime);color:#0E0F11}
.dp-day.shabat{color:var(--mut)}
.dp-day.selected.shabat{color:var(--lime)}
.dp-today{
  margin-top:9px;width:100%;background:var(--paper);border:1px solid var(--line2);
  border-radius:999px;padding:7px;font-size:12.5px;font-weight:700;color:var(--ink2);
}
.dp-today:hover{border-color:var(--ink2);color:var(--ink)}
.cb-list button.ext-step{
  width:26px;height:26px;border-radius:8px;background:var(--paper);border:1px solid var(--line2);
  font-size:14px;font-weight:700;color:var(--ink2);display:grid;place-items:center;flex:none;padding:0;text-align:center;
}
.cb-list button.ext-step:hover{border-color:var(--ink);background:var(--paper)}
.confirm{
  position:fixed;bottom:152px;left:50%;transform:translateX(-50%) translateY(12px);
  opacity:0;pointer-events:none;transition:opacity .2s,transform .24s;z-index:74;

.av-task{background:var(--ink);color:var(--lime)}

/* ---------- Pay ---------- */
.payhead{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.paysum{margin-inline-start:auto;text-align:end}
.paysum .v{font-family:'Rubik';font-size:30px;font-weight:800}
.paysum .l{color:var(--mut);font-size:12.5px}

/* ---------- Detail drawer ---------- */
.scrim{position:fixed;inset:0;background:rgba(14,15,17,.45);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;z-index:61;background:var(--card);
  inset-block:0;inset-inline-end:0;width:min(440px,100%);transform:translateX(-100%);
  transition:transform .26s cubic-bezier(.32,.72,.32,1);display:flex;flex-direction:column;
  box-shadow:-12px 0 40px rgba(14,15,17,.18);
}
.drawer.open{transform:translateX(0)}
.dr-head{padding:18px 20px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.dr-head h3{font-size:17px;font-weight:800}
.dr-body{padding:18px 20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:16px}
.dr-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
/* ===== כרטיס רכב — טיפולים ===== */
.svc-search{margin:12px 0 4px}
.svc-list{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.svc-card{border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:var(--card)}
.svc-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.svc-when{display:flex;flex-wrap:wrap;align-items:baseline;gap:5px 12px}
.svc-when b{font-size:14px}
.svc-when>span{font-size:12px;color:var(--mut)}
.svc-next{color:var(--green)!important;font-weight:700}
.svc-card-acts{display:flex;gap:6px;flex:none}
.svc-edit,.svc-del{flex:none;width:28px;height:28px;border-radius:8px;border:none;background:var(--paper);color:var(--mut);display:grid;place-items:center;cursor:pointer}
.svc-edit:hover{color:var(--ink);background:#ECECE6}
.svc-del{flex:none;width:28px;height:28px;border-radius:8px;border:none;background:var(--paper);color:var(--mut);display:grid;place-items:center;cursor:pointer}
.svc-del:hover{color:var(--red);background:var(--red-bg)}
.svc-item{display:flex;align-items:center;gap:9px;padding:5px 0}
.svc-item+.svc-item{border-top:1px dashed var(--line)}
.svc-tag{flex:none;font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px}
.svc-note{font-size:12.5px;color:var(--ink2);line-height:1.4}
.svc-note.mut{color:#C9CBC4}
/* טופס */
.svc-form-item{background:var(--paper);border-radius:12px;padding:10px 12px;margin-bottom:9px}
.svc-form-row{display:flex;gap:9px;align-items:flex-end}
.svc-rm{flex:none;width:30px;height:30px;border-radius:9px;border:1.5px solid var(--line2);background:var(--card);color:var(--mut);display:grid;place-items:center;cursor:pointer;margin-bottom:1px}
.svc-rm:hover{color:var(--red);border-color:#EBD2CD}
.km-sync{display:inline-flex;align-items:center;gap:5px;margin-top:6px;background:none;border:none;
  color:var(--ink2);font-family:inherit;font-size:11.5px;font-weight:700;cursor:pointer;padding:2px 0}
.km-sync:hover{color:var(--ink)}
.dr-body select{width:100%;padding:10px;border:1.5px solid var(--line2);border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;background:var(--card);color:var(--ink)}
/* ===== כרטיס רכב: טאבים + סקירה ===== */
.vc-tabs{display:flex;gap:4px;padding:0 20px;border-bottom:1px solid var(--line);background:var(--card)}
.vc-tabs button{
  flex:1;padding:12px 4px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:700;
  color:var(--mut);cursor:pointer;border-bottom:2.5px solid transparent;position:relative;
}
.vc-tabs button.on{color:var(--ink);border-bottom-color:var(--lime)}
.vc-badge{display:inline-grid;place-items:center;min-width:17px;height:17px;padding:0 4px;margin-inline-start:4px;
  border-radius:999px;background:var(--red);color:#fff;font-size:10px;font-weight:800;vertical-align:1px}
.vc-grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.vc-stat{background:var(--paper);border-radius:12px;padding:11px 13px;display:flex;flex-direction:column;gap:1px}
.vc-stat-l{font-size:11px;color:var(--mut);font-weight:700}
.vc-stat b{font-size:18px;font-weight:800;line-height:1.15}
.vc-stat-s{font-size:10.5px;color:var(--mut)}
.vc-sec{margin-top:18px}
.vc-sec h4{font-size:13px;font-weight:800;margin-bottom:10px}
.vc-diag-wrap{display:flex;gap:4px;align-items:center;justify-content:center}
.vc-side{display:flex;flex-direction:column;gap:30px;justify-content:center}
.vc-side-r{text-align:right}
.vc-side-l{text-align:left}
.vc-cn{display:flex;flex-direction:column;gap:1px}
.vc-cn span{font-size:10.5px;color:var(--mut)}
.vc-cn b{font-size:12.5px;white-space:nowrap}
.vc-cn-date{font-size:10px;color:var(--mut);margin-top:1px}
.vc-diag-wrap .cardiag{width:104px}
.cardiag{width:108px;height:auto;flex:none}
.vc-legend{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:6px 12px}
.vc-legend div{display:flex;flex-direction:column}
.vc-legend span{font-size:10.5px;color:var(--mut)}
.vc-legend b{font-size:12.5px}
.vc-hint{font-size:10.5px;color:var(--mut);margin-top:8px;line-height:1.5}
.vc-fleet{margin-top:10px;font-size:12px;color:var(--ink2);background:var(--paper);border-radius:10px;padding:9px 12px}
.vc-fleet b{color:var(--ink)}
.vc-freq{display:flex;flex-direction:column;gap:10px}
.vc-freq-grp{background:var(--paper);border-radius:12px;padding:10px 13px}
.vc-freq-h{font-size:11.5px;font-weight:800;color:var(--ink2);margin-bottom:6px}
.vc-freq-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12.5px}
.vc-freq-row span{color:var(--mut)}
.vc-freq-row b{font-weight:800}
.vc-freq-row b.mut{color:#B7B9B1;font-weight:600}
/* מדים — ציר ערך */
.vc-meter{background:var(--paper);border-radius:12px;padding:11px 13px;margin-bottom:9px}
.vc-meter-top{display:flex;justify-content:space-between;align-items:baseline}
.vc-meter-l{font-size:12px;font-weight:700;color:var(--ink2)}
.vc-meter-top b{font-size:15px;font-weight:800}
.vc-meter-bar{height:7px;border-radius:99px;background:#E7E7DF;overflow:hidden;margin:7px 0 5px}
.vc-meter-bar i{display:block;height:100%;border-radius:99px}
.vc-meter-sub{font-size:10.5px;color:var(--mut)}
/* מסמכי רכב */
.vdoc-list{display:flex;flex-direction:column;gap:14px}
.vdoc{border:1px solid var(--line);border-radius:16px;padding:14px;background:var(--card)}
.vdoc-val{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:11px;padding-top:11px;border-top:1px solid var(--line)}
.vdoc-val-l{font-size:12.5px;font-weight:800;color:var(--mut)}
.vdoc-date{min-width:135px;text-align:center}
.vdoc.has{box-shadow:0 1px 3px rgba(14,15,17,.04)}
.vdoc-head{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px}
.vdoc-title{display:flex;align-items:center;gap:10px}
.vdoc-ic{flex:none;width:34px;height:34px;border-radius:10px;background:var(--paper);display:grid;place-items:center;color:var(--ink2)}
.vdoc-title b{font-size:13.5px;display:block}
.vdoc-meta{font-size:10.5px;color:var(--mut)}
.vdoc-meta.mut{color:#B7B9B1}
.vdoc-menu{position:relative;flex:none}
.vdoc-dots{width:32px;height:32px;border-radius:9px;border:none;background:none;color:var(--mut);cursor:pointer;display:grid;place-items:center}
.vdoc-dots:hover{background:var(--paper)}
.vdoc-pop{position:absolute;top:36px;inset-inline-start:0;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 30px rgba(14,15,17,.16);padding:5px;min-width:150px;z-index:20;display:none}
.vdoc-pop.show{display:block}
.vdoc-pop button{display:block;width:100%;text-align:start;padding:9px 12px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);border-radius:8px;cursor:pointer}
.vdoc-pop button:hover{background:var(--paper)}
.vdoc-pop button.del{color:var(--red)}
.vdoc-open{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border:1.5px solid var(--line2);
  border-radius:10px;background:var(--card);font-family:inherit;font-size:13px;font-weight:700;color:var(--ink2);cursor:pointer}
.vdoc-open:hover{background:var(--paper);color:var(--ink)}
.vdoc-file{display:flex;flex-direction:column;align-items:center;gap:8px;padding:34px;color:var(--mut)}
.vdoc-file span{font-size:12.5px;font-weight:700}
.vdoc-up{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border:1.5px dashed var(--line2);border-radius:12px;background:var(--paper);font-family:inherit;font-size:13.5px;font-weight:700;color:var(--ink2);cursor:pointer}
.vdoc-up:hover{border-color:var(--ink2);color:var(--ink)}
/* כפתור רישיון בטבלה */
.lic-btn{width:30px;height:30px;border-radius:8px;border:none;background:var(--paper);color:var(--ink2);display:inline-grid;place-items:center;cursor:pointer}
.lic-btn:hover{background:#ECECE6;color:var(--ink)}
/* ===== טבלת חיוב ===== */
.bill-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:10px}
.bill-month{display:flex;align-items:center;gap:4px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;padding:4px}
.bill-month b{min-width:120px;text-align:center;font-size:13.5px;font-weight:800}
.bill-month button{width:32px;height:32px;border:none;background:none;border-radius:8px;color:var(--ink2);cursor:pointer;display:grid;place-items:center}
.bill-month button:hover{background:var(--paper)}
.bill-select{border:1.5px solid var(--line);border-radius:12px;padding:9px 14px;font-family:inherit;font-size:13px;font-weight:600;background:var(--card);color:var(--ink);cursor:pointer;min-width:150px}
.bill-toggles{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.btoggle{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:1.5px solid var(--line2);border-radius:999px;background:var(--card);font-family:inherit;font-size:12.5px;font-weight:700;color:var(--ink2);cursor:pointer}
.btoggle:hover{background:var(--paper)}
.btoggle.on{border-color:var(--ink);background:var(--ink);color:#fff}
.btoggle .eye{display:inline-flex;vertical-align:-2px}
.bill-show{position:relative;display:inline-block}
.bill-show-pop{position:absolute;top:42px;inset-inline-start:0;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 32px rgba(14,15,17,.16);padding:6px;min-width:170px;z-index:40;display:none}
.bill-show-pop.show{display:block}
.bill-show-pop label{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer}
.bill-show-pop label:hover{background:var(--paper)}
.bill-show-pop input{width:16px;height:16px;accent-color:var(--ink);cursor:pointer}
.bill-billstatus{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--ink2)}
.bill-billstatus .bill-select{min-width:90px}
.bill-reset{margin-inline-start:auto}
.th-srch{display:flex;align-items:center;gap:5px;white-space:nowrap}
.th-srch.open{gap:3px}
.th-srch-ic{flex:none;width:22px;height:22px;border:none;background:none;color:#B7B9B1;border-radius:6px;cursor:pointer;display:grid;place-items:center;padding:0}
.th-srch-ic:hover{background:var(--paper);color:var(--ink2)}
.th-srch-ic.active{color:var(--ink);background:var(--lime-soft)}
.th-srch .col-q{width:108px;box-sizing:border-box;border:1px solid var(--ink);border-radius:8px;padding:5px 9px;font-family:inherit;font-size:11.5px;font-weight:500;background:var(--card);color:var(--ink);outline:none}
.th-srch .col-q::placeholder{color:#B7B9B1;font-weight:500}
.th-srch-x{flex:none;width:20px;height:20px;border:none;background:none;color:var(--mut);border-radius:6px;cursor:pointer;display:grid;place-items:center;padding:0}
.th-srch-x:hover{color:var(--red)}
.bill-bulkbar{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--ink);color:#fff;border-radius:14px;padding:11px 18px;margin-bottom:12px}
.bill-bulkbar #bill-selcount{font-weight:800;font-size:14px}
.bill-bulk-acts{display:flex;gap:8px}
.btn-bulk{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.btn-bulk svg{flex:none}
.bulk-bill{background:var(--lime);color:var(--ink)}
.bulk-bill:hover{filter:brightness(1.05)}
.bulk-del{background:rgba(255,255,255,.12);color:#fff}
.bulk-del:hover{background:var(--red);color:#fff}
.bulk-unbill{background:rgba(255,255,255,.12);color:#fff}
.bulk-unbill:hover{background:var(--amber);color:var(--ink)}
.bulk-clear{background:none;color:rgba(255,255,255,.7)}
.bulk-clear:hover{color:#fff}
.btbl{width:100%;border-collapse:collapse;font-size:13px}
.btbl thead th{background:var(--card);text-align:right;font-size:11.5px;font-weight:800;color:var(--ink2);padding:10px 9px;border-bottom:1.5px solid var(--line);white-space:nowrap}
.btbl thead th.c{text-align:center}
.btbl tbody td{padding:9px;border-bottom:1px solid var(--line);text-align:right;vertical-align:middle}
.btbl tbody td.c{text-align:center}
.btbl tbody tr:hover{background:var(--paper)}
.btbl tbody tr.sel{background:var(--lime-soft)}
.btbl tbody tr.is-billed{opacity:.62}
.btbl input[type=checkbox]{width:16px;height:16px;accent-color:var(--ink);cursor:pointer}
.btbl .bill-foot td{border-top:2px solid var(--line);border-bottom:none;background:var(--paper);padding:11px 9px}
.chip.c-blue{background:#DCEBFF;color:#2563EB}
.chip.c-gray{background:#EDEDE7;color:#8A8D85}
.bill-ok{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:50%;background:var(--green-bg);color:var(--green);margin:0 auto}
.bill-open{display:inline-block;color:#C9CBC4;font-weight:800;font-size:16px}
/* הגדרות רכב */
.veh-hidden-tag{font-size:9.5px;font-weight:800;color:var(--mut);background:var(--paper);border-radius:6px;padding:1px 6px;margin-inline-start:5px;vertical-align:1px}
.vtoggle{flex:none;width:44px;height:26px;border-radius:99px;border:none;background:#D8D8D2;cursor:pointer;position:relative;transition:background .15s}
.vtoggle.on{background:var(--green)}
.vtoggle span{position:absolute;top:3px;inset-inline-start:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:inset-inline-start .15s}
.vtoggle.on span{inset-inline-start:21px}
/* תפריט הגדרות בכרטיס רכב */
.vc-head-acts{display:flex;align-items:center;gap:4px}
.vc-menu{position:relative}
.vc-menu-pop{position:absolute;top:42px;inset-inline-end:0;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:0 14px 36px rgba(14,15,17,.18);padding:12px;width:240px;max-width:calc(100vw - 32px);z-index:30;display:none}
.vc-menu-pop.show{display:block}
.vc-menu-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.vc-menu-row span{font-size:13px;font-weight:700}
.vc-menu-note{font-size:10.5px;color:var(--mut);margin:5px 0 11px;line-height:1.45}
.vc-menu-arch{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;border:1.5px solid #EBD2CD;border-radius:10px;background:var(--card);color:var(--red);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer}
.vc-menu-arch:hover{background:var(--red-bg)}
.vc-menu-edit{width:100%;display:flex;align-items:center;gap:8px;padding:9px;border:none;background:none;color:var(--ink);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border-radius:9px;margin-bottom:8px}
.vc-menu-edit:hover{background:var(--lime-soft)}
.vf-typs{display:flex;gap:8px}
.vf-typ{flex:1;padding:11px 8px;border:1.5px solid var(--line);border-radius:11px;background:var(--card);font-family:inherit;font-size:13.5px;font-weight:700;color:var(--mut);cursor:pointer}
.vf-typ.on{border-color:var(--lime);background:var(--lime-soft);color:var(--lime)}
.vc-stat-edit{border:none;background:none;color:var(--mut);cursor:pointer;padding:0;margin-inline-start:4px;vertical-align:-1px}
.vc-stat-edit:hover{color:var(--ink)}
.pbox-ov{position:fixed;inset:0;background:rgba(14,15,17,.4);z-index:200;display:grid;place-items:center;padding:20px}
.pbox{background:var(--card);border-radius:18px;padding:20px;width:100%;max-width:360px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.pbox h3{font-size:16px;font-weight:800;margin-bottom:14px}
.pbox-acts{display:flex;gap:8px;margin-top:16px}
.pbox-acts .btn{flex:1}
/* פינות בטופס */
.svc-corners{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
.svc-corners-l{font-size:11.5px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.svc-corners .cardiag{width:84px;display:block;margin:0 auto}
.svc-quick{display:flex;gap:6px;justify-content:center;margin-top:8px}
.svc-quick button{flex:1;padding:7px 4px;border:1.5px solid var(--line2);border-radius:9px;background:var(--card);
  font-family:inherit;font-size:11.5px;font-weight:700;color:var(--ink2);cursor:pointer}
.svc-quick button:hover{background:var(--paper)}
/* בחירת סוג טיפול — כפתורים עם אייקונים */
.svc-type-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.svc-type-head label{font-size:12px;font-weight:700;color:var(--ink2)}
.svc-type-btns{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px}
.svc-type{
  display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 4px;
  border:1.5px solid var(--line2);border-radius:12px;background:var(--card);cursor:pointer;
  font-family:inherit;font-size:11.5px;font-weight:700;color:var(--ink2);transition:.12s;
}
.svc-type:hover{background:var(--paper)}
.svc-type.on{border-color:var(--ink);background:var(--ink);color:#fff}
.svc-type-ic{width:22px;height:22px}
.svc-type-ic svg{width:100%;height:100%}
/* פירוט בלמים לפי פינה */
.svc-bd{margin-top:10px;display:flex;flex-direction:column;gap:7px}
.svc-bd-row{display:flex;align-items:center;gap:8px}
.svc-bd-c{flex:none;width:74px;font-size:11.5px;font-weight:700;color:var(--ink2)}
.svc-bd-opts{display:flex;gap:5px;flex:1}
.svc-bd-opts button{
  flex:1;padding:7px 4px;border:1.5px solid var(--line2);border-radius:9px;background:var(--card);
  font-family:inherit;font-size:11px;font-weight:700;color:var(--ink2);cursor:pointer;
}
.svc-bd-opts button.on{border-color:var(--lime);background:var(--lime-soft);color:var(--ink)}
@media (max-width:480px){.svc-type-btns{grid-template-columns:1fr 1fr}}
.cn.pick rect{transition:fill .12s}
/* תקלות */
.fault-open{color:var(--red);font-weight:800}
.sev{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px}
.sev-low{background:var(--green-bg);color:var(--green)}
.sev-mid{background:var(--amber-bg);color:var(--amber)}
.sev-high{background:var(--red-bg);color:var(--red)}
.dr-item{background:var(--paper);border-radius:var(--r-s);padding:9px 12px}
.dr-item .l{font-size:11px;color:var(--mut);display:block}
.dr-item .v{font-size:13.5px;font-weight:600}
.steps{display:flex;flex-direction:column;gap:0;position:relative}
.step{display:flex;gap:12px;padding-bottom:18px;position:relative}
.step::before{content:'';position:absolute;inset-inline-start:9px;top:22px;bottom:0;width:2px;background:var(--line)}
.step:last-child::before{display:none}
.step-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--line2);background:var(--card);flex:none;display:grid;place-items:center;z-index:1}
.step.done .step-dot{background:var(--green);border-color:var(--green);color:#fff}
.step.cur .step-dot{border-color:var(--green);box-shadow:0 0 0 4px var(--green-bg)}
.step b{font-size:13.5px;display:block}

.dr-foot{padding:14px 20px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line);display:flex;gap:8px}
.dr-foot .btn{flex:1;justify-content:center}
.x{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:var(--paper)}

/* ---------- New task form ---------- */
.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.fld>label{font-size:11.5px;font-weight:700;color:var(--ink2)}
.fld>label.lbl-smart{display:flex;align-items:center;justify-content:space-between;gap:8px}
.smart-btn{display:inline-flex;align-items:center;gap:5px;font-family:inherit;font-size:10.5px;font-weight:800;padding:3px 9px 3px 8px;border-radius:999px;border:1px solid var(--line2);background:var(--paper);color:var(--mut);cursor:default;transition:background .15s,color .15s,border-color .15s;max-width:62%;overflow:hidden;white-space:nowrap;line-height:1.4}
.smart-btn svg{flex:none}
.smart-btn span{overflow:hidden;text-overflow:ellipsis}
.smart-btn.off{opacity:.55}
.smart-btn.on{background:var(--lime-soft);border-color:var(--lime);color:var(--lime);cursor:pointer;box-shadow:0 1px 6px rgba(224,137,47,.18)}
.smart-btn.on:hover{background:var(--lime);color:#fff;border-color:var(--lime)}
.arch-del{color:var(--red);border-color:#E7C3BC;padding:9px 11px}
.arch-del:hover{background:var(--red);color:#fff;border-color:var(--red)}
.fld>label .req{color:var(--red)}
.fld input[type=text],.fld input[type=tel],.fld input[type=date],.fld input[type=time],.fld input[type=number],.fld select,.fld textarea{
  width:100%;box-sizing:border-box;border:1px solid var(--line2);border-radius:10px;
  padding:0 12px;height:44px;line-height:42px;font-size:14px;font-weight:600;
  background:var(--card);color:var(--ink);outline:none;transition:border-color .12s;font-family:inherit;
}
.fld textarea{height:auto;line-height:1.5;padding:9px 12px}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--ink)}
/* תאריך/שעה/מספר — נירמול מראה אחיד וטקסט מיושר להתחלה */
.fld input[type="time"],.fld input[type="date"],.fld input[type="number"],.rep-row input[type="time"]{
  -webkit-appearance:none;appearance:none;display:block;
  width:100%;max-width:100%;min-width:0;text-align:start;
}
.fld input[type="number"]{-moz-appearance:textfield}
.fld input[type="number"]::-webkit-outer-spin-button,.fld input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.fld input[type="date"]::-webkit-calendar-picker-indicator{margin-inline-start:0;opacity:.55}
.fld input[type="date"]::-webkit-date-and-time-value,.fld input[type="time"]::-webkit-date-and-time-value{text-align:start}
.fld textarea{resize:vertical;min-height:64px}
.fld .hint{font-size:11px;color:var(--mut)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media (max-width:768px){.f-row{grid-template-columns:1fr;gap:0}}
.tseg{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:15px}
.tseg>button,.tseg .combo>button{
  border:1.5px solid var(--line2);border-radius:11px;padding:9px 8px;font-size:12.5px;font-weight:700;
  color:var(--ink2);background:var(--card);transition:all .12s;text-align:center;
}
.tseg>button.on,.tseg .combo>button.on{background:var(--ink);color:var(--lime);border-color:var(--ink)}
.tseg .combo>button{width:100%}
.combo{position:relative}
.ctc-field{position:relative}
.ctc-sug{position:absolute;top:100%;inset-inline:0;z-index:40;background:var(--paper);border:1px solid var(--line);border-radius:11px;margin-top:5px;box-shadow:0 10px 28px rgba(14,15,17,.12);max-height:210px;overflow:auto;display:none}
.ctc-sug.open{display:block}
.ctc-sug button{display:block;width:100%;text-align:start;padding:10px 13px;font-size:13px;font-weight:600;background:none;border:none;border-bottom:1px solid var(--line);cursor:pointer;font-family:inherit;color:var(--ink)}
.ctc-sug button:last-child{border-bottom:none}
.ctc-sug button:hover{background:var(--lime-soft)}
.ctc-sug .num{color:var(--mut);font-weight:600}
.cb-list{
  position:absolute;top:calc(100% + 5px);inset-inline:0;z-index:70;display:none;
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  box-shadow:0 14px 38px rgba(14,15,17,.22);max-height:200px;overflow:auto;padding:4px;
}
.cb-list.open{display:block}
.cb-list button{display:block;width:100%;text-align:start;padding:8px 12px;border-radius:8px;font-size:13.5px;font-weight:500}
.cb-list button:hover{background:var(--paper)}
.cb-list .cb-empty{padding:9px 12px;color:var(--mut);font-size:12.5px}
.f-datebtn{
  width:100%;border:1px solid var(--line2);border-radius:10px;padding:9px 12px;font-size:14px;
  background:var(--card);text-align:start;font-weight:600;transition:border-color .12s;
}
.f-datebtn:hover{border-color:var(--ink2)}
.cl-sum{
  width:100%;text-align:start;margin-top:2px;padding:11px 14px;border-radius:12px;
  background:var(--paper);font-size:12.5px;font-weight:700;color:var(--ink2);
}
.cl-sum:hover{background:#ECECE6}
.dtabs{display:flex;gap:7px;padding:12px 20px;border-bottom:1px solid var(--line)}
.dtabs button{flex:1;padding:9px;border-radius:11px;font-weight:700;font-size:13px;color:var(--mut);background:var(--paper);transition:all .12s}
.dtabs button.on{background:var(--ink);color:var(--lime)}
.st-opt{
  display:flex;align-items:center;gap:11px;padding:11px 13px;border:1.5px solid var(--line2);
  border-radius:12px;margin-bottom:8px;cursor:pointer;font-weight:600;font-size:13.5px;transition:all .12s;
}
.st-opt:hover{border-color:var(--ink2)}
.st-opt.on{border-color:var(--ink);background:#FAF7F1}
.st-opt .dot2{width:17px;height:17px;border-radius:50%;border:2px solid var(--line2);flex:none;display:grid;place-items:center}
.st-opt.on .dot2{border-color:var(--ink)}
.st-opt.on .dot2::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--lime)}
.rep-row{display:grid;grid-template-columns:92px 1fr 1fr;gap:8px;align-items:center;margin-bottom:9px}
.rep-row>label{font-size:12px;font-weight:700;color:var(--ink2)}
.rep-row input{border:1px solid var(--line2);border-radius:9px;padding:8px 10px;font-size:13.5px;width:100%;outline:none}
.rep-row input:focus{border-color:var(--ink)}
.rep-hd{display:grid;grid-template-columns:92px 1fr 1fr;gap:8px;font-size:10.5px;color:var(--mut);font-weight:700;margin-bottom:5px}
.lic{display:inline-block;font-style:normal;margin-inline-end:3px;vertical-align:-1.5px;line-height:0}
.rstamp{display:block;font-size:10.5px;color:var(--mut);font-weight:500;margin-top:2px}
.rstamp.gap{color:#C2590B;font-weight:700}
.step .gapline{color:#C2590B;font-weight:700}
.f-check{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink2);cursor:pointer;margin-bottom:13px}
.f-check input{width:16px;height:16px;accent-color:var(--ink)}
.multiday-note{
  background:var(--violet-bg);color:var(--violet);border-radius:10px;padding:8px 12px;
  font-size:12px;font-weight:600;margin-bottom:13px;display:none;
}
.multiday-note.show{display:block}

/* ---------- Toast ---------- */
.toast{
  position:fixed;bottom:88px;inset-inline:0;margin:auto;width:fit-content;max-width:90%;
  background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;
  z-index:80;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;display:flex;gap:8px;align-items:center;
}
.toast.show{opacity:1;transform:none;pointer-events:auto}
.toast-btn{display:none;background:var(--lime);color:var(--lime-ink);border-radius:999px;padding:4px 14px;font-size:12.5px;font-weight:700;margin-inline-start:4px}
.toast-btn.show{display:inline-block}
.pn-ic{display:inline-flex;margin-inline-start:4px;color:var(--amber);vertical-align:-2px;animation:pulse 1.8s infinite}
.toast .dot{background:var(--lime)}

/* ---------- Mobile nav ---------- */
.mnav{
  display:none;position:fixed;bottom:calc(10px + env(safe-area-inset-bottom));left:16px;right:16px;z-index:50;
  background:rgba(255,255,255,.92);
  -webkit-backdrop-filter:blur(18px) saturate(1.6);backdrop-filter:blur(18px) saturate(1.6);
  border-radius:999px;padding:7px;
  box-shadow:0 12px 36px rgba(14,15,17,.16),0 2px 8px rgba(14,15,17,.07);
  border:1px solid rgba(14,15,17,.04);
}
.mnav .wrap{display:flex;max-width:520px;margin:auto;gap:3px}
.mnav button{
  flex:1;display:grid;place-items:center;color:var(--ink);
  padding:12px 0;border-radius:999px;font-size:0;line-height:0;transition:background .15s;
}
.mnav button svg{width:23px;height:23px}
.mnav button.on{background:rgba(14,15,17,.08)}
.mnav .mn-pager{color:var(--mut)}
.mnav button:active{background:rgba(14,15,17,.12)}
.fab{
  display:none;position:fixed;bottom:calc(92px + env(safe-area-inset-bottom));inset-inline-end:18px;z-index:51;
  width:54px;height:54px;border-radius:18px;background:var(--lime);color:var(--ink);
  box-shadow:0 10px 28px -8px rgba(190,110,30,.55);place-items:center;
}

.view{display:none;animation:fade .18s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- Responsive ---------- */
@media (max-width:980px){
  .kpis{grid-template-columns:repeat(2,1fr)}

  .tl-veh{width:92px;font-size:11.5px}
}

  /* הדף לא נגלל — רק אזור התוכן. כך התפריט התחתון מקובע באמת בכל דפדפן */

    -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
    padding:14px 12px calc(86px + env(safe-area-inset-bottom));

  /* היומן: גלילה פנימית בלבד — כותרות ימים ועמודת רכבים נשארות קפואות */
  .wk-wrap{height:calc(100dvh - 235px);min-height:460px;max-height:none}
  .side{display:flex;flex-direction:column;gap:12px;position:static;max-height:none;overflow:visible}

  .wk{grid-template-columns:max-content repeat(7,minmax(116px,1fr));min-width:920px}

  .wk-veh b{font-size:11.5px}

  .home-grid{gap:12px}
  .mnav{display:block}
  body.show-fab .fab{display:grid}
  .scrollx.has-cards .tbl{display:none}
  .has-cards .cards{display:flex}
  /* טבלאות נהגים/רכבים נשארות גלויות ונגללות אופקית במובייל */
  .dtbl,.vtbl{min-width:640px}

  .drawer{inset-inline:0;top:auto;bottom:0;width:100%;max-height:88dvh;border-radius:20px 20px 0 0;transform:translateY(105%)}
  .drawer.dr-tall{height:88dvh}
  .drawer.open{transform:translateY(0)}
}

.insp-c-veh{font-size:15.5px;font-weight:800;color:var(--ink)}
.insp-stat{font-size:11.5px;font-weight:800;border-radius:999px;padding:3px 10px;white-space:nowrap}
.insp-stat.ok{background:#2E9D551f;color:#2E9D55}
.insp-stat.warn{background:#E0892F22;color:#B5701E}
.insp-c-sub{font-size:12.5px;color:var(--mut);font-weight:600;margin-top:3px}
.insp-old{color:#C0392B;font-weight:800}
.insp-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.insp-chip{font-size:11.5px;font-weight:700;border-radius:8px;padding:4px 9px;background:var(--card);color:var(--mut);border:1px solid var(--line)}
.insp-chip.ok{background:#2E9D551a;color:#2E9D55;border-color:transparent}
.insp-chip.bad{background:#C0392B14;color:#C0392B;border-color:transparent}
.insp-c-note{margin-top:9px;font-size:12.5px;color:var(--ink);background:var(--card);border-radius:10px;padding:8px 10px;line-height:1.45}
.insp-eq{display:flex;flex-wrap:wrap;gap:7px}
.insp-eq-i{font-size:12.5px;font-weight:700;border-radius:8px;padding:5px 10px}
.insp-eq-i.yes{background:#2E9D5514;color:#2E9D55}
.insp-eq-i.no{background:#C0392B14;color:#C0392B}
.insp-edit-eq{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
.insp-eq-tog{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 11px;cursor:pointer}
.insp-eq-tog input{width:17px;height:17px;accent-color:var(--lime)}
.ins-lbl{font-size:12.5px;font-weight:800;color:var(--mut);margin:14px 0 7px}
.fst-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px}
@media(max-width:760px){.fst-grid{grid-template-columns:repeat(2,1fr)}}
.fst{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:12px}
.fst .fic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:none}
.fst .fv{font-family:var(--mono);font-weight:700;font-size:21px;line-height:1}
.fst .fl{font-size:11.5px;color:var(--mut);margin-top:2px}
.fseg{display:inline-flex;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px}
.fseg button{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--mut);background:transparent}
.fseg button.on{background:var(--ink);color:#fff}
.flt-list{display:flex;flex-direction:column;gap:10px}
.flt-card{display:flex;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s}
.flt-card:hover{box-shadow:0 6px 18px rgba(14,15,17,.08)}
.flt-card.done{opacity:.72}
.flt-spine{width:5px;flex:none}
.flt-main{flex:1;min-width:0;padding:12px 14px}
.flt-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:7px}
.ftype{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px}
.fimp{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px}
.fstale{font-size:11px;font-weight:700;color:#C0392B;background:rgba(192,57,43,.12);padding:3px 8px;border-radius:999px}
.fstat{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;margin-inline-start:auto}
.fstat.open{color:var(--amber);background:var(--amber-bg)}
.fstat.done{color:var(--green);background:var(--green-bg)}
.flt-desc{font-size:14.5px;font-weight:600;color:var(--ink);margin-bottom:7px;line-height:1.35}
.flt-meta{display:flex;flex-wrap:wrap;gap:13px}
.flt-m{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--mut);white-space:nowrap}
.flt-m svg{opacity:.7}
.flt-notes{font-size:12px;color:var(--mut);margin-top:7px;background:var(--paper);border-radius:8px;padding:6px 9px}
.flt-acts{display:flex;flex-direction:column;gap:6px;padding:10px;border-inline-start:1px solid var(--line);justify-content:center}
.flt-a{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--paper);color:var(--ink2);display:grid;place-items:center;cursor:pointer}
.flt-a.ok:hover{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.flt-a.del:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.ff-imp{display:flex;gap:8px}
.ff-imp button{flex:1;padding:10px;border-radius:11px;border:1.5px solid var(--line);background:var(--card);font-weight:700;font-size:13px;color:var(--mut)}
.ff-imp button.on{color:#fff}
.flt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.flt-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.flt-group{margin-bottom:22px}
.flt-group-h{display:flex;align-items:center;gap:11px;margin:0 0 12px}
.flt-group-t{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap}
.flt-group-h::after{content:"";flex:1;height:1px;background:var(--line)}
.flt-group-c{font-size:11.5px;font-weight:600;color:var(--mut);background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:2px 10px;order:-1}
.flt-rows{display:flex;flex-direction:column;gap:6px}
.flt-row{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:9px 13px;cursor:pointer}
.flt-row:hover{box-shadow:0 2px 10px rgba(14,15,17,.05)}
.flt-row.done{opacity:.66}
.flt-row.sel{border-color:var(--lime);background:rgba(224,137,47,.07)}
.flt-chk{width:16px;height:16px;flex:none;accent-color:var(--lime)}
.flt-dot{width:9px;height:9px;border-radius:50%;flex:none}
.flt-rdesc{flex:1;min-width:0;font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.flt-rveh{font-size:12px;color:var(--mut);white-space:nowrap}
.flt-rdate{font-size:12px;color:var(--mut)}
.flt-racts{display:flex;gap:5px}
.flt-bulk{display:flex;align-items:center;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:9px 13px;margin-bottom:12px;font-size:13px;font-weight:600;flex-wrap:wrap}
.flt-bulk .btn{padding:6px 12px}
.fcfg-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fcfg-row input[type=text]{flex:1}
.fcfg-row input[type=color]{width:38px;height:38px;border:1px solid var(--line);border-radius:9px;padding:2px;background:var(--card);flex:none;cursor:pointer}
.fcfg-del{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--paper);color:var(--mut);flex:none;cursor:pointer;font-size:15px}
.fcfg-del:hover{color:var(--red);border-color:var(--red)}
.vc-fsec-h{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.vc-fsec-c{font-size:11px;font-weight:700;color:var(--mut);background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:1px 8px}
.vc-fsec-empty{color:var(--mut);font-size:12.5px;text-align:center;padding:18px 10px}
/* מדיה בטופס המנהל */
.df-media-btns{display:flex;gap:9px}
.df-mbtn{flex:1;border:1.5px dashed var(--line);border-radius:12px;padding:12px 8px;font-weight:700;font-size:13px;color:var(--ink2);background:var(--card);display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer}
.df-mbtn:hover{background:var(--paper)}
.df-thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.df-thumb{position:relative;width:70px;height:70px;border-radius:11px;overflow:hidden;background:var(--paper)}
.df-thumb img,.df-thumb video{width:100%;height:100%;object-fit:cover}
.df-vtag{position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:19px;text-shadow:0 1px 5px rgba(0,0,0,.7);pointer-events:none}
.df-rm{position:absolute;top:3px;inset-inline-start:3px;width:20px;height:20px;border-radius:50%;background:rgba(14,15,17,.72);color:#fff;font-size:11px;display:grid;place-items:center;cursor:pointer}
.fmedia{font-size:11px;font-weight:700;color:var(--ink2);background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:2px 8px}
/* תצוגת תקלה */
.fv-chips{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.dr-hbtns{display:flex;gap:8px;align-items:center}
.dr-back{height:32px;padding:0 13px;border-radius:999px;background:var(--paper);border:1px solid var(--line);font-size:13px;font-weight:700;color:var(--ink2);display:inline-flex;align-items:center;gap:4px;cursor:pointer;white-space:nowrap}
.dr-back:hover{border-color:var(--ink2)}
.fsrc{font-size:11px;font-weight:700;color:#5B7CC2;background:#5B7CC21f;padding:3px 9px;border-radius:999px}
.fv-desc{font-size:16px;font-weight:600;line-height:1.5;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:14px 15px;margin-bottom:16px}
.fv-sec{margin-bottom:16px}
.fv-sk{font-size:12px;font-weight:800;color:var(--mut);letter-spacing:.04em;margin-bottom:9px}
.fv-rows{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:13px;overflow:hidden}
.fv-row{display:flex;gap:12px;padding:11px 14px;background:var(--card);align-items:flex-start;border-bottom:1px solid var(--line)}
.fv-row:last-child{border-bottom:0}
.fv-k{flex:none;width:96px;color:var(--mut);font-size:13px;font-weight:600}
.fv-v{flex:1;color:var(--ink);font-size:14px;font-weight:500}
.fv-quick{display:grid;grid-template-columns:1fr;gap:11px}
.fq{display:flex;flex-direction:column;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px}
.fq.miss{border-color:#E0892F66;background:#E0892F12}
.fq>label{font-size:12.5px;font-weight:700;color:var(--ink2);display:flex;align-items:center;gap:7px}
.fq-miss{font-size:10px;font-weight:800;color:#C0392B;background:#C0392B1f;padding:1px 7px;border-radius:999px}
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:9px}
.media-cell{position:relative;aspect-ratio:1;border-radius:11px;overflow:hidden;border:1px solid var(--line);background:var(--paper);cursor:pointer}
.media-cell img,.media-cell video{width:100%;height:100%;object-fit:cover;display:block}
.mc-play{position:absolute;inset:0;display:grid;place-items:center;font-size:22px;color:#fff;background:rgba(0,0,0,.35)}
/* lightbox */
.flb-scrim{position:fixed;inset:0;z-index:200;background:rgba(8,9,11,.93);display:flex;align-items:center;justify-content:center;padding:24px}
.flb-stage{position:relative;max-width:100%;max-height:100%;display:flex;align-items:center;justify-content:center}
.flb-media{max-width:92vw;max-height:86vh;border-radius:12px;display:block}
.flb-x{position:fixed;top:18px;inset-inline-start:18px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;display:grid;place-items:center;cursor:pointer}
.flb-nav{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.16);color:#fff;font-size:26px;display:grid;place-items:center;cursor:pointer}
.flb-nav.prev{inset-inline-end:-8px}.flb-nav.next{inset-inline-start:-8px}
.flb-count{position:absolute;bottom:-34px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;font-weight:700;font-family:var(--mono)}
</style>
</head>

   היום: נשמר במכשיר (localStorage) — אב-טיפוס.
   מעבר לאונליין: מחליפים רק את גוף set/get כך שיעשו fetch
   לשרת (למשל Supabase), וכל המערכת הופכת מסונכרנת בין כל
   המשתמשים — בלי לגעת באף עמוד. זה הצינור היחיד.
   ============================================================ */
const Store=(()=>{
  const PREFIX='vip_';
  const mem={}; // מטמון בזיכרון — בעתיד יתמלא מתשובת השרת
  function set(key,val){
    mem[key]=val;
    try{localStorage.setItem(PREFIX+key,JSON.stringify(val))}catch(e){}
    /* כאן בעתיד: fetch(API+'/'+key,{method:'PUT',body:JSON.stringify(val)}) */
    return val;
  }
  function get(key,fallback){
    if(key in mem)return mem[key];
    try{const r=localStorage.getItem(PREFIX+key);if(r!=null){mem[key]=JSON.parse(r);return mem[key]}}catch(e){}
    /* כאן בעתיד: await fetch(API+'/'+key) */
    return (fallback!==undefined?fallback:null);
  }
  function remove(key){delete mem[key];try{localStorage.removeItem(PREFIX+key)}catch(e){}}
  function reload(key){delete mem[key];return get(key);}
  function keys(){const out=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.indexOf(PREFIX)===0)out.push(k.slice(PREFIX.length))}}catch(e){}return out;}
  function getRaw(key){try{const r=localStorage.getItem(PREFIX+key);return r!=null?JSON.parse(r):null}catch(e){return null}}
  return {set,get,remove,reload,keys,getRaw,PREFIX};
})();

/* ===== חוקיות אחידה לטיפול: ציר מטיפול לטיפול (מחזור 12,000 ק"מ) =====
   ירוק עד שנותרו 3,000 · כתום בהיר 3,000–1,000 · כתום כהה 1,000–0 · חריגה: אדום עם ! */
const SVC_CYCLE=12000;
/* ===== טיפולי רכב =====
   כרטיס טיפול = תאריך + ק"מ משותפים, ובתוכו פריט אחד או יותר.
   סוגים: periodic(תקופתי) · brakes(בלמים) · tires(צמיגים) · general(כללי).
   רק תקופתי קובע ק"מ לטיפול הבא. הכל נשמר דרך Store (מוכן לשרת). */
const SVC_TYPES={
  periodic:{label:'תקופתי',col:'var(--green)',bg:'var(--green-bg)'},
  brakes:{label:'בלמים',col:'#B8860B',bg:'#FBF3D5'},
  tires:{label:'צמיגים',col:'#2563EB',bg:'#DCEBFF'},
  general:{label:'כללי',col:'var(--ink2)',bg:'var(--paper)'}
};
/* הצעת ק"מ לטיפול הבא: הכפולה הקרובה של 12,000 מעל הק"מ הנוכחי */
/* הצעת ק"מ לטיפול הבא = מחזור אחד (12,000) מעל הטיפול הבא המתוכנן של הרכב.
   כך המחזור נשאר קבוע ולא "זוחל" לפי מתי שהוזן הטיפול בפועל.
   אם אין טיפול הבא מתוכנן — נופלים לכפולה הקרובה מעל הק"מ הנוכחי. */
function suggestNextSvc(km,plannedNext){
  if(plannedNext&&plannedNext>0)return plannedNext+SVC_CYCLE;
  return Math.ceil((km+1)/SVC_CYCLE)*SVC_CYCLE;
}
/* היסטוריית טיפולים לרכב (מהדמו + מה שנשמר) */
let SVC_LOG=Store.get('svclog',null);
if(!SVC_LOG){
  SVC_LOG=(!_NOSEED&&window.VIP_SEED&&window.VIP_SEED.services)?window.VIP_SEED.services:{};
  Store.set('svclog',SVC_LOG);
}
function svcOf(name){return SVC_LOG[name]||[]}
const CORNERS=[['fl','קדמי שמאל'],['fr','קדמי ימין'],['rl','אחורי שמאל'],['rr','אחורי ימין']];
/* לכל פינה: הטיפול האחרון מסוג נתון (brakes/tires) — להצגת "כמה ק\"מ עברו" */
function cornerState(name,type){
  const log=svcOf(name).slice().sort((a,b)=>a.km-b.km); // ישן→חדש
  const cur=(VEHICLES.find(v=>v.n===name)||{}).km||0;
  const st={};
  CORNERS.forEach(([c])=>{st[c]=null});
  log.forEach(r=>r.items.forEach(it=>{
    if(it.type===type&&Array.isArray(it.corners)) it.corners.forEach(c=>{st[c]={km:r.km,date:r.date}});
  }));
  CORNERS.forEach(([c])=>{if(st[c])st[c].since=Math.max(0,cur-st[c].km)});
  return st;
}
/* ===== ממוצע מרווח החלפה (ק"מ) לפי ציר ולפי רכיב =====
   axle: 'front'|'rear' · part: 'pads'(רפידות)|'discs'(צלחות)
   ממוצע = (ק"מ אחרון − ק"מ ראשון) / (מספר החלפות − 1). דורש ≥2 החלפות. */
function brakeInterval(name,axle,part){
  const cs=axle==='front'?['fl','fr']:['rl','rr'];
  const log=svcOf(name).slice().sort((a,b)=>a.km-b.km);
  const kms=[];
  log.forEach(r=>r.items.forEach(it=>{
    if(it.type!=='brakes'||!Array.isArray(it.corners))return;
    const onAxle=it.corners.some(c=>cs.includes(c));
    if(!onAxle)return;
    // האם הרכיב הזה הוחלף? צלחות רק אם detail=pads_discs; רפידות תמיד בהחלפת בלמים
    let hit=false;
    cs.forEach(c=>{if(it.corners.includes(c)){const d=(it.detail&&it.detail[c])||'pads';if(part==='pads')hit=true;else if(part==='discs'&&d==='pads_discs')hit=true;}});
    if(hit)kms.push(r.km);
  }));
  const uniq=[...new Set(kms)].sort((a,b)=>a-b);
  if(uniq.length<2)return {avg:null,count:uniq.length,last:uniq[uniq.length-1]||null};
  const avg=Math.round((uniq[uniq.length-1]-uniq[0])/(uniq.length-1));
  return {avg,count:uniq.length,last:uniq[uniq.length-1]};
}
function tireInterval(name,axle){
  const cs=axle==='front'?['fl','fr']:['rl','rr'];
  const log=svcOf(name).slice().sort((a,b)=>a.km-b.km);
  const kms=[];
  log.forEach(r=>r.items.forEach(it=>{
    if(it.type!=='tires'||!Array.isArray(it.corners))return;
    if(it.corners.some(c=>cs.includes(c)))kms.push(r.km);
  }));
  const uniq=[...new Set(kms)].sort((a,b)=>a-b);
  if(uniq.length<2)return {avg:null,count:uniq.length};
  return {avg:Math.round((uniq[uniq.length-1]-uniq[0])/(uniq.length-1)),count:uniq.length};
}
function svcLogSave(){Store.set('svclog',SVC_LOG)}
/* מזהי טיפולים דרך המחולל המרכזי */
(()=>{let m=0;Object.values(SVC_LOG).forEach(a=>a.forEach(r=>{if(r.id>m)m=r.id}));IDS.ensure('SVC',m)})();
/* הוספת כרטיס טיפול: שומר, ואם יש פריט תקופתי — מאפס את סקלת הרכב */
function addSvcRecord(name,rec){
  rec.id=IDS.next('SVC');
  (SVC_LOG[name]=SVC_LOG[name]||[]).push(rec);
  const veh=VEHICLES.find(v=>v.n===name);
  if(veh){
    /* ק"מ נוכחי: האחרון שדווח תופס (טיפול או משימה) */
    if(rec.km){veh.km=rec.km;veh.kmAt=Date.now();}
    /* ק"מ טיפול הבא מתעדכן רק מטיפול תקופתי */
    const per=rec.items.find(it=>it.type==='periodic');
    if(per&&rec.next)veh.svcKm=rec.next;
    Store.set('veh:'+veh.n,{km:veh.km,loc:veh.loc,svcKm:veh.svcKm,kmAt:veh.kmAt});
  }
  svcLogSave();
}
function svcMeta(km,svcKm){
  const prev=svcKm-SVC_CYCLE;
  const rem=svcKm-km;
  const pct=Math.max(3,Math.min(100,(km-prev)/(svcKm-prev)*100));
  const col=rem<=0?'var(--red)':rem<=1000?'#C2590B':rem<=3000?'#E8A23B':'var(--green)';
  return{rem,pct,col};
}
/* רמזור תוקפים: יותר מחודש — ירוק · חודש ומטה — כתום · חריגה — אדום */
const docCol=d=>d<0?'var(--red)':d<=30?'var(--amber)':'var(--green)';
const docPct=d=>d<0?100:Math.max(6,Math.min(100,(30-d)/30*100));

/* סטטוס חיוב נשמר ב-Store: { 'TSK-<id>': {invoice, at, by} } */
let BILLING=Store.get('billing',{})||{};
function billSave(){Store.set('billing',BILLING)}
function isBilled(t){return !!BILLING['TSK-'+t.id]}
function billInfo(t){return BILLING['TSK-'+t.id]||null}

/* מצב משימה מחושב: live / done / future / cancelled / pending */
function taskComputedStatus(t){
  if(t.done||t.stage===3)return 'done';
  if(t.cls==='live'||t.stage>=1)return 'live';
  const start=fromIso(t.date).getTime();
  const cancelAt=start+24*3600*1000+5*3600*1000; /* 5 שעות אחרי חצות יום המשימה */
  const notStarted=!t.ts||!t.ts.start;
  if(notStarted&&Date.now()>cancelAt)return 'cancelled';
  return 'future'; /* כל מה שלא בוצע/פעיל/בוטל = עתידית */
}
function isAdminTask(t){return t.cls==='admin'}

/* חישוב סה"כ שעות (מיציאת נהג עד סיום) וק"מ (סיום פחות התחלה) */
function taskHours(t){
  if(!t.ts||!t.ts.start||!t.ts.end)return null;
  const [h1,m1]=t.ts.start.split(':').map(Number),[h2,m2]=t.ts.end.split(':').map(Number);
  let mins=(h2*60+m2)-(h1*60+m1);if(mins<0)mins+=1440;
  return String(Math.floor(mins/60)).padStart(2,'0')+':'+String(mins%60).padStart(2,'0');
}
function taskKm(t){
  if(!t.km||!t.km.start||!t.km.end)return null;
  return Math.max(0,+t.km.end-+t.km.start);
}
const DOW=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
function fullDate(iso){return iso.slice(8,10)+'/'+iso.slice(5,7)+'/'+iso.slice(0,4)}

/* פילטרים — נשמרים בזיכרון העמוד */
function billDefaults(){return {month:DEMO_TODAY.slice(0,7),qName:'',qClient:'',qDrv:'',qVeh:'',billStatus:'open',showAdmin:false,showFuture:false,showCancelled:false};}
let TF=billDefaults();
function billReset(){TF=billDefaults();window.BILL_SEL=new Set();window.BILL_SEARCH_OPEN={};rerenderTasks();}

function billMonthList(){
  /* כל המשימות (לא מנהלתיות אלא אם בוקש) בחודש שנבחר */
  return TASKS_DB.filter(t=>t.date.slice(0,7)===TF.month);
}
function billFiltered(){
  let list=billMonthList().map(t=>({t,st:taskComputedStatus(t)}));
  /* ברירת מחדל: רק משימות שבוצעו או פעילות. כפתור העין חושף מנהלתיות/עתידיות/מבוטלות */
  list=list.filter(x=>{
    if(isAdminTask(x.t))return TF.showAdmin;
    if(x.st==='future')return TF.showFuture;
    if(x.st==='cancelled')return TF.showCancelled;
    return x.st==='done'||x.st==='live'; /* ברירת מחדל */
  });
  /* סטטוס חיוב: open=לא חויב · billed=חויב · all=הכל */
  if(TF.billStatus==='open')list=list.filter(x=>!isBilled(x.t));
  else if(TF.billStatus==='billed')list=list.filter(x=>isBilled(x.t));
  /* חיפוש לפי שדה (כל אחד עצמאי) */
  const inc=(v,q)=>q&&!String(v||'').includes(q.trim());
  list=list.filter(x=>{
    const t=x.t;const veh=ROWS[t.ri]?ROWS[t.ri].v:'';
    if(inc(t.n,TF.qName))return false;
    if(inc(t.client,TF.qClient))return false;
    if(inc(t.drv,TF.qDrv))return false;
    if(inc(veh,TF.qVeh))return false;
    return true;
  });
  /* מיון לפי תאריך */
  return list.sort((a,b)=>a.t.date<b.t.date?-1:1);
}

/* לקוחות שיש להם משימות בחודש (לתפריט הסינון) */

  const s=new Set();billMonthList().forEach(t=>{if(t.client&&!isAdminTask(t))s.add(t.client)});
  return [...s].sort();
}

function monthLabel(m){
  const [y,mo]=m.split('-');
  return new Date(+y,+mo-1,1).toLocaleDateString('he-IL',{month:'long',year:'numeric'});

function exportBilling(){
  const list=billFiltered();
  if(!list.length){toast('אין משימות לייצוא');return}
  const clientName=TF.qClient||'כללי';
  const title=`ריכוז משימות ${clientName}, חודש ${monthLabel(TF.month)}`;
  const head=['שם משימה','תאריך','יום','סטטוס','לקוח','נהג','רכב','יציאת נהג','הסרת אחריות','סיום','סה"כ שעות','סה"כ ק"מ','סטטוס חיוב','מספר חשבונית'];
  const STtxt={done:'בוצע',live:'בנסיעה',future:'עתידית',cancelled:'בוטלה'};
  const rows=list.map(x=>{
    const t=x.t;const veh=ROWS[t.ri]?ROWS[t.ri].v:(isAdminTask(t)?'מנהלתית':'');
    const h=taskHours(t),km=taskKm(t);const bi=billInfo(t);
    return [t.n,fullDate(t.date),DOW[fromIso(t.date).getDay()],STtxt[x.st]||'',t.client||(isAdminTask(t)?'':'מזדמן'),t.drv||'',veh,
      (t.ts&&t.ts.start)||'',(t.ts&&t.ts.rel)||'',(t.ts&&t.ts.end)||'',h||'',km!=null?String(km):'',isBilled(t)?'חויב':'פתוח',bi?bi.invoice:''];
  });
  /* CSV אמיתי — נפתח באקסל ישירות, ללא אזהרת תאימות וללא עיצוב */
  const cell=v=>{v=String(v==null?'':v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const lines=[];
  lines.push(cell(title));            /* שורת כותרת */
  lines.push(head.map(cell).join(',')); /* כותרות עמודות */
  rows.forEach(r=>lines.push(r.map(cell).join(',')));
  const csv='\ufeff'+lines.join('\r\n'); /* BOM לתמיכה בעברית באקסל */
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const fn=clientName.replace(/[\\/:*?"<>|]/g,'')+' '+TF.month+'.csv';
  a.download=fn;document.body.appendChild(a);a.click();a.remove();
  toast('הקובץ יוצא · '+list.length+' משימות');
}

function fNewId(){return 'flt'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function fById(id){return FAULTS2.find(f=>f.id===id)}
function fAgeDays(f){if(!f.openDate)return 0;const o=fromIso(f.openDate),end=(f.status==='done'&&f.closeDate)?fromIso(f.closeDate):fromIso(DEMO_TODAY);return Math.max(0,Math.round((end-o)/86400000))}
function fIsStale(f){return f.status!=='done'&&fAgeDays(f)>=FSTALE_DAYS}
const _fimpRank={high:0,med:1,norm:2};
function fSort(a,b){if(a.status!==b.status)return a.status==='done'?1:-1;const r=_fimpRank[a.importance]-_fimpRank[b.importance];if(r)return r;return (a.openDate<b.openDate?1:-1)}
function vehStats(name){
  const ri=riByName(name);
  const ts=TASKS_DB.filter(t=>t.ri===ri&&t.drv);
  const now=DEMO_TODAY,mon=now.slice(0,7),yr=now.slice(0,4);
  let month=0,year=0;
  ts.forEach(t=>{
    const km=(t.km&&t.km.start&&t.km.end)?Math.max(0,+t.km.end-+t.km.start):0;
    if(t.date.slice(0,4)===yr)year+=km;
    if(t.date.slice(0,7)===mon)month+=km;
  });
  // נהג מוביל לפי מספר משימות
  const cnt={};ts.forEach(t=>{cnt[t.drv]=(cnt[t.drv]||0)+1});
  let topDrv=null,topDrvN=0;Object.entries(cnt).forEach(([d,n])=>{if(n>topDrvN){topDrv=d;topDrvN=n}});
  // נהג אחרון
  const sorted=ts.slice().sort((a,b)=>a.date<b.date?1:-1);
  const last=sorted[0];
  return {month,year,topDrv,topDrvN,lastDrv:last?last.drv:null,lastDate:last?last.date:null,count:ts.length};
}
function fleetCompare(name){
  const arr=VEHICLES.filter(vehActive).map(v=>({n:v.n,c:vehStats(v.n).count})).sort((a,b)=>b.c-a.c);
  const total=arr.length,rank=arr.findIndex(x=>x.n===name)+1;
  const pct=rank<=total/3?'מהעמוסים בצי':rank>=total*2/3?'מהפנויים בצי':'עומס ממוצע';
  return {rank,total,pct};
}

  ov.innerHTML=`<div class="pbox">
    <h3>${title}</h3>
    <div class="fld"><label>${label}</label>
      <input id="pbox-in" type="${type}" ${type==='number'?'inputmode="numeric"':''} value="${String(val).replace(/"/g,'&quot;')}"></div>
    <div class="pbox-acts">
      <button class="btn btn-gho" onclick="document.getElementById('promptBox').remove()">ביטול</button>
      <button class="btn btn-pri" id="pbox-ok">שמירה</button>

/* ---------- טיפולים (כולל הוספה) ---------- */
let SVC_Q='';
function svcMatch(r,q){
  if(!q)return true;
  q=q.trim();
  /* חיפוש בכל הטקסט: תאריך, ק"מ, סוג, פירוט חופשי, פינות, רפידות/צלחות */
  const SH={fl:'קדמי שמאל',fr:'קדמי ימין',rl:'אחורי שמאל',rr:'אחורי ימין'};
  let hay=[r.date,String(r.km),r.next?String(r.next):''];
  r.items.forEach(it=>{
    hay.push((SVC_TYPES[it.type]||SVC_TYPES.general).label);
    if(it.note)hay.push(it.note);
    if(Array.isArray(it.corners))it.corners.forEach(c=>hay.push(SH[c]||''));
    if(it.detail)Object.values(it.detail).forEach(d=>hay.push(d==='pads_discs'?'רפידות צלחות':'רפידות'));
  });
  return hay.join(' ').includes(q);
}
function vcSvc(v){
  const all=svcOf(v.n).slice().sort((a,b)=>a.date<b.date?1:-1);
  const log=all.filter(r=>svcMatch(r,SVC_Q));
  const rows=log.map(r=>{
    const head=`<div class="svc-when"><b class="num">${r.date.slice(8,10)}/${r.date.slice(5,7)}/${r.date.slice(0,4)}</b><span class="num">${(+r.km).toLocaleString()} ק"מ</span>${r.next?`<span class="svc-next">טיפול הבא: ${(+r.next).toLocaleString()}</span>`:''}</div>`;
    const items=r.items.map(it=>{
      const T=SVC_TYPES[it.type]||SVC_TYPES.general;
      const SH={fl:'קד׳ שמאל',fr:'קד׳ ימין',rl:'אח׳ שמאל',rr:'אח׳ ימין'};
      let cn='';
      if(Array.isArray(it.corners)&&it.corners.length){
        if(it.type==='brakes'&&it.detail){
          cn=' · '+['fl','fr','rl','rr'].filter(c=>it.corners.includes(c)).map(c=>SH[c]+' ('+(it.detail[c]==='pads_discs'?'רפידות+צלחות':'רפידות')+')').join(', ');
        }else{
          cn=' · '+['fl','fr','rl','rr'].filter(c=>it.corners.includes(c)).map(c=>SH[c]).join(', ');
        }
      }
      return `<div class="svc-item"><span class="svc-tag" style="color:${T.col};background:${T.bg}">${T.label}</span><span class="svc-note">${it.note||(cn?'':'<span class=mut>ללא פירוט</span>')}${cn?`<span class="mut">${cn}</span>`:''}</span></div>`;
    }).join('');
    return `<div class="svc-card"><div class="svc-card-top">${head}<div class="svc-card-acts"><button class="svc-edit" title="עריכה" onclick="editSvc(${r.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.8 2.8 0 014 4L7.5 20.5 2 22l1.5-5.5z"/></svg></button><button class="svc-del" title="מחיקה" onclick="delSvc(${r.id})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button></div></div>${items}</div>`;
  }).join('')||`<div style="color:var(--mut);text-align:center;padding:30px 10px">${SVC_Q?'לא נמצאו טיפולים התואמים לחיפוש':'אין טיפולים מתועדים'}</div>`;
  const search=`<div class="dsearch svc-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input type="text" placeholder="חיפוש בטיפולים…" value="${SVC_Q.replace(/"/g,'&quot;')}"
        oninput="SVC_Q=this.value;const p=this.selectionStart;document.getElementById('vc-body').innerHTML=vcSvc(VEHICLES.find(x=>x.n===VC_NAME));const i=document.querySelector('.svc-search input');if(i){i.focus();i.setSelectionRange(p,p)}">
    </div>`;
  return `<button class="btn btn-pri" style="width:100%" onclick="openSvcForm()">+ הוסף טיפול</button>${search}<div class="svc-list">${rows}</div>`;
}

  return `<div class="flt-card ${done?'done':''}" onclick="openFaultView('${f.id}','${og}')">

function ffAddMedia(input){
  const files=[...(input.files||[])];input.value='';
  files.forEach(file=>{const r=new FileReader();r.onload=()=>{
    if(file.type.indexOf('image')===0){const img=new Image();img.onload=()=>{const max=1280;let w=img.width,h=img.height;if(w>max||h>max){const s=max/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);FF_MEDIA.push({type:'image',url:c.toDataURL('image/jpeg',.8)});renderFfThumbs();};img.src=r.result;}
    else{FF_MEDIA.push({type:'video',url:r.result});renderFfThumbs();}
  };r.readAsDataURL(file);});
}

function vcTasks(v){

  const isActive=t=>!isDone(t)&&(t.cls==='live'||t.stage===1||t.stage===2);
  const byDateDesc=(a,b)=>a.date<b.date?1:a.date>b.date?-1:0;
  const all=TASKS_DB.filter(t=>t.ri===ri&&(isDone(t)||isActive(t)));
  const list=all.filter(isActive).sort(byDateDesc).concat(all.filter(isDone).sort(byDateDesc)).slice(0,12);
  const rows=list.map(t=>`<div class="svc-card" style="cursor:pointer" onclick="openJournalTask(${t.id},'card')"><div class="svc-card-top">
    <div class="svc-when"><b>${t.n}</b><span class="num">${ddmmyy(t.date)}</span>${t.drv?`<span>${t.drv}</span>`:''}</div>
