function saveSvc(){
  const date=document.getElementById('svc-date').value;
  const km=+document.getElementById('svc-km').value;
  if(!date||!km){toast('יש למלא תאריך וק״מ');return}
  // כללי דורש פירוט; בלמים/צמיגים דורשים סימון פינה אחת לפחות
  for(const it of SVC_DRAFT){
    if(it.type==='general'&&!(it.note||'').trim()){toast('יש לפרט מה בוצע בטיפול כללי');return}
    if((it.type==='brakes'||it.type==='tires')&&!(it.corners&&it.corners.length)){toast('יש לסמן אילו '+(it.type==='brakes'?'בלמים':'צמיגים')+' הוחלפו');return}
  }
  const rec={date,km,items:SVC_DRAFT.map(it=>{
    const o={type:it.type,note:(it.note||'').trim()};
    if((it.type==='brakes'||it.type==='tires')&&it.corners&&it.corners.length)o.corners=it.corners.slice();
    if(it.type==='brakes'&&it.detail){o.detail={};it.corners.forEach(c=>{o.detail[c]=it.detail[c]||'pads'})}
    return o;
  })};
  const per=SVC_DRAFT.find(it=>it.type==='periodic');
  if(per){const el=document.getElementById('svc-next');const val=(el&&+el.value)||per.next||0;if(val)rec.next=val;}
  /* אם לא הוזן ק"מ טיפול הבא — לא משנים את הסקלה הקיימת */
  if(SVC_EDIT_ID){
    const arr=SVC_LOG[VC_NAME]||[];const idx=arr.findIndex(r=>r.id===SVC_EDIT_ID);
    if(idx>-1){rec.id=SVC_EDIT_ID;arr[idx]=rec;}
    /* עדכון ק"מ/סקלה לפי הרשומה שנערכה */
    const veh=VEHICLES.find(x=>x.n===VC_NAME);
    if(veh){if(rec.km){veh.km=rec.km;veh.kmAt=Date.now()}if(rec.next)veh.svcKm=rec.next;Store.set('veh:'+veh.n,{km:veh.km,loc:veh.loc,svcKm:veh.svcKm,kmAt:veh.kmAt})}
    svcLogSave();
    SVC_EDIT_ID=null;
    openVehCard(VC_NAME,'svc');toast('הטיפול עודכן');
  }else{
    addSvcRecord(VC_NAME,rec);
    openVehCard(VC_NAME,'svc');
    toast('הטיפול נשמר'+(rec.next?' · סקלת הטיפול אופסה':''));
  }
}

function animateDrvCounts(){
  window._kpiLast=window._kpiLast||{};
  document.querySelectorAll('#main .kpi .v[data-countup]').forEach(el=>{
    const to=+el.getAttribute('data-countup'),fmt=el.getAttribute('data-fmt'),k=el.getAttribute('data-k');
    const f=fmt==='hm'?(v=>fmtHM(Math.round(v))):fmt==='cur'?(v=>'₪'+Math.round(v).toLocaleString()):(v=>Math.round(v).toLocaleString());
    const last=window._kpiLast[k];
    if(last===to){el.textContent=f(to);return;}
    const from=last==null?0:last;window._kpiLast[k]=to;
    if(!window.requestAnimationFrame){el.textContent=f(to);return;}
    const t0=performance.now(),dur=680;
    (function step(t){const p=Math.min(1,(t-t0)/dur),e=1-Math.pow(1-p,3);el.textContent=f(from+(to-from)*e);if(p<1)requestAnimationFrame(step);})(t0);
  });
}

views.pay=()=>{

 const RATE=70,RATE_S=90;
 const p2=s=>{const a=(s||'').split(':');return (+a[0])*60+(+a[1]||0)};
 const fmtMin=m=>Math.floor(m/60)+':'+String(Math.round(m%60)).padStart(2,'0');

     return{n:t.n,drv:t.drv||'—',d:dd(t.date),date:t.date,min:m,v,adm:t.cls==='admin'};})
   .sort((a,b)=>a.date<b.date?1:-1);
 const tot=rows.reduce((a,b)=>a+b.v,0),totMin=rows.reduce((a,b)=>a+b.min,0);

function _dl(filename,obj){
  try{const txt=(typeof obj==='string')?obj:JSON.stringify(obj,null,2);
    const blob=new Blob([txt],{type:'application/json;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;
    document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},120);
  }catch(e){toast('ההורדה נכשלה')}
}
function _stamp(){const d=new Date(),p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
function buildBackup(){
  const store={};
  Store.keys().forEach(k=>{if(k==='autobackup')return;const v=Store.getRaw(k);if(v!==null)store[k]=v;});
  return {meta:{app:'911vip',type:'full',ver:1,at:new Date().toISOString()},store};
}
function downloadBackup(){_dl('911vip-גיבוי-מלא-'+_stamp()+'.json',buildBackup());toast('גיבוי מלא הורד ✓');}

function restoreFromBackup(obj){
  const meta=(obj&&obj.meta)||obj||{};
  /* גיבוי מלא — מזוהה לפי קיום אובייקט store (גם אם meta.app חסר/ישן) */
  if(obj&&obj.store&&typeof obj.store==='object'){
    showConfirm('שחזור גיבוי מלא','פעולה זו תחליף את כל הנתונים הקיימים בנתוני הגיבוי. הפעולה אינה ניתנת לביטול. להמשיך?',()=>{
      try{
        Store.keys().forEach(k=>{if(k!=='autobackup')Store.remove(k);});
        Object.keys(obj.store).forEach(k=>{try{Store.set(k,obj.store[k])}catch(e){}});
        toast('הנתונים שוחזרו · טוען מחדש…');
        setTimeout(()=>{try{location.reload()}catch(e){}},600);
      }catch(e){toast('השחזור נכשל')}
    },'שחזור');
    return;
  }
  if(meta.type==='dataset'||obj&&obj.data){toast('זהו קובץ מערך בודד · לשחזור מלא העלה קובץ «גיבוי מלא»');return;}
  toast('הקובץ אינו גיבוי 911VIP תקין');
}
function importBackupFile(input){
  const f=input.files&&input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{restoreFromBackup(JSON.parse(r.result))}catch(e){toast('קריאת הקובץ נכשלה — ודא JSON תקין')}};
  r.onerror=()=>toast('קריאת הקובץ נכשלה');
  r.readAsText(f);input.value='';
}
function autoBackupCheck(){
  try{
    const meta=Store.get('autobackupMeta',null),now=Date.now();
    if(meta&&meta.at&&(now-meta.at)<24*60*60*1000)return; /* פחות מ-24 שעות — לא מגבים שוב */
    Store.set('autobackup',buildBackup());   /* עותק יחיד — נדרס בכל גיבוי, ללא עומס */
    Store.set('autobackupMeta',{at:now});
  }catch(e){}
}

        ${(t.done||t.stage===3)?DONE:t.stage===1?'<span class="live-b" title="בנסיעה כעת"></span>':''}${CK}<span class="adm-ic">מ</span><b>${t.drv||t.n}</b></div>`;
      return`<div class="wk-task ${mini?'mini':''} ${t.cls||''} ${t.sel?'sel':''} ${isDone?'is-done':''}" data-id="${t.id}" data-ri="${ri}" data-date="${d.iso}" ${mini?`title="${t.n}${t.drv?' · '+t.drv:''}"`:''} onclick="event.stopPropagation();chipClick(this)">
        ${isDone?DONE:t.cls==='live'?'<span class="live-b" title="בנסיעה כעת"></span>':''}${CK}<b>${t.n}</b>${!mini&&t.drv?`<span>${t.drv}</span>`:''}</div>`};

/* סדרות רב-יומיות: שינוי שנוגע ביום האחרון של קטע — מציע להמשיך אל הימים העוקבים ברצף */
function seriesPrompt(affected,applyFn){
  const sids=[...new Set(affected.map(o=>o.t&&o.t.sid).filter(Boolean))];
  sids.forEach(sid=>{
    const aff=affected.filter(o=>o.t.sid===sid);
    const last=aff.map(o=>o.t.date).sort().pop();
    const rest=TASKS_DB.filter(t=>t.sid===sid&&t.date>last&&!aff.some(o=>o.t===t))
                       .sort((a,b)=>a.date<b.date?-1:1);
    const chain=[];let next=addD(last,1);
    for(const t of rest){
      if(t.date===next){chain.push(t);next=addD(next,1)}
      else if(t.date>next)break;
    }
    if(!chain.length)return;
    const label=dayLabel(chain[0].date)+(chain.length>1?' – '+dayLabel(chain[chain.length-1].date):'');
    showConfirm(
      '«'+chain[0].n+'» ממשיכה ברצף ('+label+')',
      'להחיל את השינוי גם על '+chain.length+' הימים הבאים באותו רצף?',
      ()=>{applyFn(chain);renderWeek(WKQ);toast('השינוי הוחל גם על '+label,3200)},
      'החל גם','לא, רק מה שסומן'
    );
  });
}
function showConfirm(title,q,onYes,yesLabel,noLabel){
  $('#cfTitle').textContent=title;$('#cfQ').textContent=q;
  $('#cfYes').textContent=yesLabel||'אישור';

let JT_FROM='page'; /* מקור פתיחת המשימה: page (יומן/רשימה) או card (כרטיס רכב) */
function openJournalTask(id,origin){
  const t=byId(id);if(!t)return;

  const _series=t.sid?TASKS_DB.filter(x=>x.sid===t.sid):[t];
  const extBase=_series.reduce((a,b)=>a.date>b.date?a:b).date;
  const ts=t.ts||{},km=t.km||{},rts=t.rts||{},locs=t.locs||{};
  const IC={
    clock:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
    odo:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3.34 19a10 10 0 1 1 17.32 0"/><path d="M12 14l4-4"/></svg>',
    pin:'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>'
  };
  const det=(h,k,l)=>[
    h?`<i class="lic">${IC.clock}</i>${h}`:'',
    k?`<i class="lic">${IC.odo}</i>${(+k).toLocaleString()} ק"מ`:'',
    l?`<i class="lic">${IC.pin}</i>${l}`:''
  ].filter(Boolean).join(' · ');
  const gapMin=(a,b)=>{
    if(!a||!b)return 0;
    const p=x=>{const m=String(x).match(/(\d{1,2}):(\d{2})/);return m?+m[1]*60+ +m[2]:null};
    const x=p(a),y=p(b);if(x==null||y==null)return 0;
    let d=Math.abs(y-x);return Math.min(d,1440-d);
  };
  const stamp=(rep,act)=>{
    if(!act)return '';
    const gap=rep&&gapMin(rep,act)>20;
    return `<i class="rstamp ${gap?'gap':''}">דווח בפועל ב-${act}${gap?' · פער מהשעה שדווחה':''}</i>`;
  };
  const isAdmin=t.cls==='admin';
  const notStarted=!isDone&&t.cls!=='live'&&!(t.stage>=1); /* הודעה לנהג רק לפני תחילת המשימה */
  const stepStart={n:'התחלת משימה',d:det(ts.start,km.start),st:stamp(ts.start,rts.start),gap:ts.start&&rts.start&&gapMin(ts.start,rts.start)>20};
  const stepEnd={n:'סיום משימה',d:det(ts.end,km.end,locs.end),st:stamp(ts.end,rts.end),gap:ts.end&&rts.end&&gapMin(ts.end,rts.end)>20};
  const steps=isAdmin?[stepStart,stepEnd]:[
    {n:'שיבוץ אושר ע"י הנהג',d:'',st:stamp(null,rts.ap)},
    stepStart,
    {n:'הסרת אחריות',d:det(ts.rel,km.rel,locs.rel),st:stamp(ts.rel,rts.rel),gap:ts.rel&&rts.rel&&gapMin(ts.rel,rts.rel)>20},
    stepEnd,
  ];
  const doneCount=isAdmin
    ?(isDone?2:t.stage===1?1:0)
    :(t.stage!==undefined?[1,2,3,4][t.stage]:(isDone?4:t.cls==='live'?2:0));
  const showSteps=!t.cls||t.cls==='live'||isAdmin;
  /* סיכום למשימה שהושלמה — זמן עבודה וק"מ נסיעה */
  const _pm=x=>{const m=String(x||'').match(/(\d{1,2}):(\d{2})/);return m?+m[1]*60+ +m[2]:null};
  let workMin=null;
  if(ts.start&&ts.end){const a=_pm(ts.start),b=_pm(ts.end);if(a!=null&&b!=null){workMin=b-a;if(workMin<=0)workMin+=1440;}}
  const fmtHM=m=>Math.floor(m/60)+':'+String(m%60).padStart(2,'0');
  let totKm=null;
  if(km.start!=null&&km.start!==''&&km.end!=null&&km.end!==''){const d=+km.end-+km.start;if(d>=0&&isFinite(d))totKm=d;}

  <div class="dr-hbtns">${JT_FROM==='card'?`<button class="dr-back" onclick="openVehCard(VC_NAME,'tasks')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M9 6l6 6-6 6"/></svg> חזרה</button>`:''}<button class="x" onclick="closeDrawer()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div></div>
  <div class="dr-body">

    <div class="dr-grid">
      <div class="dr-item"><span class="l">נהג</span><span class="v">${t.drv||'— טרם שובץ —'}</span></div>
      <div class="dr-item"><span class="l">רכב</span><span class="v">${vehName}</span></div>
      <div class="dr-item"><span class="l">תאריך</span><span class="v num">${ddmm(t.date)}/${t.date.slice(0,4)}</span></div>
      <div class="dr-item"><span class="l">סדרה</span><span class="v">${t.sid?'רב-יומית':'יום בודד'}</span></div>
      ${isDone&&workMin!=null?`<div class="dr-item"><span class="l">זמן עבודה</span><span class="v num" style="display:inline-flex;align-items:center;gap:6px"><i style="display:inline-flex;color:var(--mut)">${IC.clock}</i>${fmtHM(workMin)}</span></div>`:''}
      ${isDone&&totKm!=null?`<div class="dr-item"><span class="l">ק"מ נסיעה</span><span class="v num" style="display:inline-flex;align-items:center;gap:6px"><i style="display:inline-flex;color:var(--mut)">${IC.odo}</i>${totKm.toLocaleString()}</span></div>`:''}
    </div>
    ${showSteps?`<div><h3 style="font-size:14px;margin-bottom:12px">מהלך המשימה</h3>
    <div class="steps">${steps.map((s,i)=>`<div class="step ${i<doneCount?'done':''} ${i===doneCount&&t.cls==='live'?'cur':''}">
      <div class="step-dot">${i<doneCount?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M5 13l4 4L19 7"/></svg>':''}</div>
      <div><b>${s.n}</b><span>${i<doneCount?(s.d||'דווח'):'טרם דווח'}</span>${i<doneCount?(s.st||''):''}</div></div>`).join('')}</div></div>`:''}
  </div>
  <div class="dr-foot" style="flex-wrap:wrap">
    <button class="btn btn-gho" onclick="openEditTask(${t.id},'details')">עריכה</button>
    ${t.drv&&notStarted?`<button class="btn btn-gho" onclick="toast('הודעה נשלחה ל${t.drv} (דמו)')">שליחה לנהג</button>`:''}
    <div class="combo" style="flex:1">
      <button type="button" class="btn btn-gho" style="width:100%;justify-content:center" onclick="event.stopPropagation();$('#extList').classList.toggle('open');extUpdate();$('#extN')?.focus()">+ הארכה</button>
      <div class="cb-list" id="extList" data-base="${extBase}" style="top:auto;bottom:calc(100% + 6px);inset-inline:auto 0;width:178px;padding:12px">
        <div style="display:flex;align-items:center;justify-content:center;gap:8px">
          <button type="button" class="ext-step" onclick="extStep(-1)">−</button>
          <input type="text" inputmode="numeric" id="extN" value="1" oninput="extUpdate()"
            style="width:46px;text-align:center;border:1px solid var(--line2);border-radius:9px;padding:7px 2px;font-size:16px;font-weight:700;font-family:var(--mono)">
          <button type="button" class="ext-step" onclick="extStep(1)">+</button>
        </div>
        <div id="extUntil" style="text-align:center;font-size:12px;color:var(--mut);font-weight:600;margin-top:8px"></div>
        <button type="button" onclick="extendTask(${t.id},Math.max(1,+($('#extN').value||1)))"
          style="margin-top:9px;width:100%;background:var(--ink);color:var(--lime);border-radius:999px;padding:8px;font-weight:700;font-size:13px;text-align:center">הארך משימה</button>
      </div>
    </div>
    <button class="btn btn-pri" onclick="duplicateTask(${t.id})">שכפול</button>
    <button class="btn btn-gho" style="color:var(--red);border-color:#EBD2CD" onclick="deleteTask(${t.id})">מחיקה</button>
  </div>`;
  $('#drawer').classList.add('open');$('#scrim').classList.add('open');
}

function extendTask(id,n){

  let series=t.sid?TASKS_DB.filter(x=>x.sid===t.sid):[t];

  t.rts=t.rts||{};
  const now=new Date(),nowHM=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  ['start','rel','end'].forEach(k=>{if(_nt[k]&&_nt[k]!==_old[k])t.rts[k]=nowHM+' · עדכון ידני'});
  t.ts=_nt;

  toast('«'+t.n+'» — עודכן'
    +(pay?' · שכר: '+pay.h+' שע׳ = ₪'+pay.amt.toLocaleString():'')
    +(sync?' · ק"מ הרכב עודכן (+'+sync.delta.toLocaleString()+')':''),5600);
}
/* דיווחי ק"מ זורמים לכרטיס הרכב: עדכון מד-אוצף + ספירה לטיפול הבא */
function syncVehicleKm(t){
  const rowName=ROWS[t.ri]?.v;if(!rowName)return null;
  const veh=VEHICLES.find(v=>v.n===rowName);if(!veh)return null;
  const reported=Math.max(...['start','rel','end'].map(k=>+(t.km?.[k]||0)));
  if(!reported||reported<=veh.km)return null;
  const delta=reported-veh.km;
  veh.km=reported;veh.kmAt=Date.now();
  /* מיקום נוכחי מתעדכן ממיקום הסיום שהנהג הזין */
  if(t.locs&&t.locs.end){veh.loc=t.locs.end;refreshRows();}
  Store.set('veh:'+veh.n,{km:veh.km,loc:veh.loc,svcKm:veh.svcKm,kmAt:veh.kmAt}); /* שינוי הרכב נשמר */
  /* הווידג'טים והיומן נגזרים ישירות מ-VEHICLES */
  return {veh,delta};
}

/* חישוב שכר מחדש לפי הדיווחים העדכניים: שעות × תעריף נהג (חול/שבת) */
function recalcPay(t){
  if(!t.drv||!t.ts||!t.ts.start||!t.ts.end){t.pay=undefined;return null}
  const d=DRIVERS.find(x=>x.n===t.drv);
  const base=d?.rate||60;
  const [h1,m1]=t.ts.start.split(':').map(Number),[h2,m2]=t.ts.end.split(':').map(Number);
  let mins=(h2*60+m2)-(h1*60+m1);
  if(mins<=0)mins+=1440; // משימה שנגמרת אחרי חצות
  const shabbat=fromIso(t.date).getDay()===6;
  const rate=shabbat?(d?.rateS||90):(d?.rate||70);
  const amt=Math.round(mins/60*rate);
  const km=(t.km&&t.km.start&&t.km.end)?Math.max(0,+t.km.end-+t.km.start):undefined;
  const h=String(Math.floor(mins/60)).padStart(2,'0')+':'+String(mins%60).padStart(2,'0');
  t.pay={h,rate,amt,km,shabbat};
  return t.pay;
}
/* ריכוז חודשי ללקוח — כל המשימות של הלקוח באותו חודש, מתוך אותו מסד */
function durOf(t){
  if(!t.ts||!t.ts.start||!t.ts.end)return null;
  const p=x=>{const[a,b]=x.split(':').map(Number);return a*60+b};
  let m=p(t.ts.end)-p(t.ts.start);if(m<=0)m+=1440;
  return m;
}

/* מחיקה ממסך הפרטים — אישור מיידי בתוך החלון, כולל אפשרות רצף */
function seriesChainOf(t){
  if(!t.sid)return[];
  const rest=TASKS_DB.filter(x=>x.sid===t.sid&&x.date>t.date).sort((a,b)=>a.date<b.date?-1:1);
  const chain=[];let next=addD(t.date,1);
  for(const x of rest){
    if(x.date===next){chain.push(x);next=addD(next,1)}
    else if(x.date>next)break;
  }
  return chain;
}
function deleteTask(id){
  const t=byId(id);if(!t)return;
  const chain=seriesChainOf(t);
  const f=document.querySelector('#drawer .dr-foot');if(!f)return;
  f.innerHTML=`
    <span style="font-size:12.5px;font-weight:800;color:var(--red);margin-inline-end:auto">למחוק את «${t.n}»?</span>
    <button class="btn btn-gho" onclick="openJournalTask(${id},'${JT_FROM}')">ביטול</button>
    ${chain.length?`<button class="btn" style="background:var(--red-bg);color:var(--red);font-weight:800" onclick="doDeleteTask(${id},1)">מחק גם ${chain.length} הבאים</button>`:''}
    <button class="btn" style="background:var(--red);color:#fff;font-weight:800" onclick="doDeleteTask(${id},0)">${chain.length?'מחק יום זה בלבד':'מחק'}</button>`;
}

    TRASH=TRASH.filter(e=>!sigs.includes(e.sig));trashSave();

}

/* ============ Drag & Drop ביומן ============ */
const DND={el:null,ghost:null,src:null,over:null,moved:false,timer:null,sx:0,sy:0,active:false,group:null};
document.addEventListener('pointerdown',e=>{
  const t=e.target.closest('.wk-task');
  if(!t||e.button>0)return;
  if(t.classList.contains('is-done'))return; // משימה שהושלמה — לא ניתנת לגרירה
  const _tk=byId(t.dataset.id);
  if(_tk&&(_tk.cls==='live'||_tk.stage>=1))return; // נסיעה שכבר התחילה — לא ניתנת לגרירה
  if(_tk&&_tk.cls==='ext')return; // משימה חיצונית — לא ניתנת לגרירה
  DND.el=t;DND.moved=false;DND.active=false;DND.sx=e.clientX;DND.sy=e.clientY;
  DND.src={id:+t.dataset.id,ri:+t.dataset.ri,date:t.dataset.date};
  if(e.pointerType==='touch'){
    DND.timer=setTimeout(()=>startDrag(e.clientX,e.clientY),330);
  }
});
document.addEventListener('pointermove',e=>{
  if(!DND.el)return;
  const dx=Math.abs(e.clientX-DND.sx),dy=Math.abs(e.clientY-DND.sy);
  if(!DND.active){
    if(DND.timer&&(dx>9||dy>9)){clearTimeout(DND.timer);DND.timer=null;DND.el=null;return}
    if(!DND.timer&&(dx>6||dy>6))startDrag(e.clientX,e.clientY);
    if(!DND.active)return;
  }
  moveDrag(e.clientX,e.clientY);
},{passive:true});
document.addEventListener('touchmove',e=>{if(DND.active)e.preventDefault()},{passive:false});
/* חסימת pinch-to-zoom במובייל (iOS מתעלם מ-user-scalable=no) */
document.addEventListener('gesturestart',e=>e.preventDefault());
document.addEventListener('gesturechange',e=>e.preventDefault());
document.addEventListener('gestureend',e=>e.preventDefault());
document.addEventListener('touchmove',e=>{if(e.scale!==undefined&&e.scale!==1)e.preventDefault()},{passive:false});
document.addEventListener('pointerup',()=>{
  if(DND.timer){clearTimeout(DND.timer);DND.timer=null}
  if(DND.active)endDrag();
  DND.el=null;setTimeout(()=>DND.moved=false,50);
});
function startDrag(x,y){
  if(!DND.el)return;
  DND.active=true;DND.moved=true;
  DND.x=x;DND.y=y;
  if(!DND.raf)DND.raf=requestAnimationFrame(dragLoop);
  document.body.classList.add('dragging-now');
  const srcTask=byId(DND.src.id);
  DND.group=(SEL_MODE&&srcTask&&srcTask.sel)?selTasks():null;
  const g=DND.el.cloneNode(true);
  g.classList.add('drag-ghost');g.classList.remove('dragging');
  if(DND.group&&DND.group.length>1)g.insertAdjacentHTML('beforeend','<span class="gbadge">'+DND.group.length+'</span>');
  document.body.appendChild(g);DND.ghost=g;
  DND.el.classList.add('dragging');
  moveDrag(x,y);
  if(navigator.vibrate)navigator.vibrate(12);
}
function moveDrag(x,y){
  DND.x=x;DND.y=y;
  DND.ghost.style.left=x+'px';DND.ghost.style.top=y+'px';
  DND.ghost.style.display='none';
  const cell=document.elementFromPoint(x,y)?.closest('.wk-cell:not(.past)');
  DND.ghost.style.display='';
  if(cell===DND.over)return;
  document.querySelectorAll('.wk-cell.drop-on').forEach(c=>c.classList.remove('drop-on'));
  DND.over=cell||null;
  if(!cell)return;
  if(DND.group&&DND.group.length>1){
    /* תצוגה מקדימה: כל תאי היעד של הקבוצה לפי הדלתא בימים */
    const s=DND.src,tri=+cell.dataset.ri,tDate=cell.dataset.date;
    const vehChanged=tri!==s.ri,dd=dayDiff(tDate,s.date);
    DND.group.forEach(({t})=>{
      const nri=vehChanged?tri:t.ri;
      const nd=addD(t.date,dd);
      document.querySelector(`.wk-cell[data-ri="${nri}"][data-date="${nd}"]`)?.classList.add('drop-on');
    });
  }else{
    cell.classList.add('drop-on');
  }
}
/* גלילה אוטומטית של היומן בזמן גרירה ליד הקצוות */
function dragLoop(){
  if(!DND.active){DND.raf=null;return}
  const wrap=document.querySelector('.wk-wrap');
  if(wrap&&DND.ghost){
    const r=wrap.getBoundingClientRect(),M=60,MAX=16;
    let sx=0,sy=0;
    if(DND.y<r.top+M&&DND.y>r.top-30)sy=-MAX*Math.min(1,(r.top+M-DND.y)/M);
    else if(DND.y>r.bottom-M&&DND.y<r.bottom+30)sy=MAX*Math.min(1,(DND.y-(r.bottom-M))/M);
    if(DND.x<r.left+M&&DND.x>r.left-30)sx=-MAX*Math.min(1,(r.left+M-DND.x)/M);
    else if(DND.x>r.right-M&&DND.x<r.right+30)sx=MAX*Math.min(1,(DND.x-(r.right-M))/M);
    if(sx||sy){
      wrap.scrollBy(sx,sy);
      moveDrag(DND.x,DND.y); // רענון תא היעד אחרי הגלילה
    }
  }
  DND.raf=requestAnimationFrame(dragLoop);
}
function endDrag(){
  if(DND.raf){cancelAnimationFrame(DND.raf);DND.raf=null}
  document.body.classList.remove('dragging-now');
  DND.ghost?.remove();DND.ghost=null;
  DND.el?.classList.remove('dragging');
  const tgt=DND.over;
  document.querySelectorAll('.wk-cell.drop-on').forEach(c=>c.classList.remove('drop-on'));
  DND.over=null;DND.active=false;
  if(!tgt)return;
  const s=DND.src,tri=+tgt.dataset.ri,tDate=tgt.dataset.date;
  if(tri===s.ri&&tDate===s.date)return;
  /* גרירה קבוצתית: רכב — מוחלף לכולן; יום — הזזה יחסית לפי הדלתא */
  if(DND.group&&DND.group.length>0){
    const list=DND.group,vehChanged=tri!==s.ri,dd=dayDiff(tDate,s.date);
    const snap=list.map(({t})=>({t,ri:t.ri,date:t.date}));
    list.forEach(({t})=>{
      if(vehChanged)t.ri=tri;
      if(dd)t.date=addD(t.date,dd);
    });
    DND.group=null;
    endSelMode();
    const parts=[];
    if(vehChanged)parts.push('רכב: '+ROWS[tri].v);
    if(dd)parts.push('הזזה של '+Math.abs(dd)+' '+(Math.abs(dd)===1?'יום':'ימים')+(dd>0?' קדימה':' אחורה'));
    toastA(list.length+' משימות עודכנו · '+parts.join(' · '),'בטל',()=>{
      restorePos(snap);toast('השינוי בוטל');
    },8000);
    if(vehChanged&&!dd)seriesPrompt(list,ch=>ch.forEach(t=>t.ri=tri));
    return;
  }
  const task=byId(s.id);if(!task)return;
  task.ri=tri;task.date=tDate;
  const parts=[];
  if(tri!==s.ri)parts.push('רכב: '+ROWS[tri].v);
  if(tDate!==s.date)parts.push('יום: '+dayLabel(tDate));
  queueDriverNotice(task,s,parts);
  renderWeek(WKQ);
  if(task.sid&&tri!==s.ri&&tDate===s.date)seriesPrompt([{t:task}],ch=>ch.forEach(t=>t.ri=tri));
}

function comboHTML(id,placeholder,initLabel,initV){
  return `<div class="combo" id="${id}">
    <input type="text" placeholder="${placeholder}" value="${initLabel||''}" data-v="${initV??''}"
      oninput="cbRender('${id}',this.value)" onfocus="cbFocus(this,'${id}')" autocomplete="off">
    <div class="cb-list"></div>
  </div>`;
}
const CB_ITEMS={};
function cbSet(id,items){CB_ITEMS[id]=items}
/* בלחיצה: פתיחת הרשימה ובחירת כל הטקסט — כך אפשר מיד להקליד ולחפש (אמין גם במובייל) */
function cbFocus(inp,id){
  cbRender(id,'');
  const sel=()=>{try{inp.select()}catch(e){}};
  sel();setTimeout(sel,0);
  /* מובייל: לגלול את השדה לראש האזור כדי שלא ייחסם ע"י המקלדת */
  if(window.matchMedia&&window.matchMedia('(max-width:760px)').matches){
    setTimeout(()=>{try{(inp.closest('.fld')||inp).scrollIntoView({block:'start',behavior:'smooth'})}catch(e){}},320);
  }
}
function cbRender(id,q){
  const el=document.getElementById(id),list=el.querySelector('.cb-list');
  const items=(CB_ITEMS[id]||[]).filter(it=>!q||it.label.includes(q));
  list.innerHTML=items.length
    ?items.map(it=>`<button type="button" onclick="cbPick('${id}','${String(it.v)}',this.textContent)">${it.label}</button>`).join('')
    :'<div class="cb-empty">אין תוצאות</div>';
  list.classList.add('open');
}
function cbPick(id,v,label){
  const el=document.getElementById(id),inp=el.querySelector('input');
  inp.value=label;inp.dataset.v=v;
  el.querySelector('.cb-list').classList.remove('open');
  if(id==='cb-client')ntContacts();
  if(id==='cb-veh'&&typeof ntSmartSuggest==='function')ntSmartSuggest();
  if(id==='ff-cb-driver'&&typeof ffDriverPicked==='function')ffDriverPicked(v);
}
function contactSuggest(scope){
  const nm=$('#'+scope+'ContactName'),box=$('#'+scope+'ContactSug');if(!nm||!box)return;
  const ci=cbVal('cb-client'),c=ci!==''?CLIENTS[+ci]:null;
  const q=(nm.value||'').trim();
  let list=c?c.contacts.slice():[];
  if(q)list=list.filter(x=>(x.split('·')[0]||'').includes(q));
  if(!list.length){box.classList.remove('open');box.innerHTML='';return}
  box.innerHTML=list.map(x=>{const p=x.split('·');const n=(p[0]||'').trim(),ph=p.slice(1).join('·').trim();
    return `<button type="button" onmousedown="event.preventDefault()" onclick="contactPickSug('${scope}','${n.replace(/'/g,"\\'")}','${ph.replace(/'/g,"\\'")}')">${n}${ph?` · <span class="num">${ph}</span>`:''}</button>`}).join('');
  box.classList.add('open');
}
function contactPickSug(scope,n,ph){const nm=$('#'+scope+'ContactName'),phEl=$('#'+scope+'ContactPhone'),box=$('#'+scope+'ContactSug');if(nm)nm.value=n;if(phEl)phEl.value=ph;if(box)box.classList.remove('open');}
function contactSugHide(scope){const box=$('#'+scope+'ContactSug');if(box)setTimeout(()=>box.classList.remove('open'),120);}

/* ===== שיבוץ חכם — רכב במיקום בית של נהג ===== */
function locNorm(s){return (s||'').toString().replace(/[\s,.'"׳״\-־()]/g,'')}
function locTokens(s){return (s||'').toString().split(/[\s,./־\-]+/).map(w=>w.trim()).filter(w=>w.length>=2)}
function locSimilar(a,b){
  const na=locNorm(a),nb=locNorm(b);
  if(!na||!nb)return false;
  if(na===nb)return true;
  if(na.length>=4&&nb.length>=4&&(na.includes(nb)||nb.includes(na)))return true;
  const ta=locTokens(a),tb=locTokens(b);
  return ta.filter(w=>tb.includes(w)).length>=2;
}
function ntVehName(){const vv=cbVal('cb-veh');if(vv===''||vv==null)return '';const r=ROWS[+vv];return r?r.v:''}
function ntSmartSuggest(){
  const btn=document.getElementById('ntSmartBtn');if(!btn)return;
  const txt=document.getElementById('ntSmartTxt');
  const vn=ntVehName();let match=null,loc='';
  if(vn){const v=VEHICLES.find(x=>x.n===vn);loc=v&&v.loc;
    if(loc)match=DRIVERS.filter(d=>d.active!==0&&!d.archived&&d.home).find(d=>locSimilar(loc,d.home))||null;}
  window._ntSuggest=match?match.n:null;
  if(match){btn.classList.add('on');btn.classList.remove('off');if(txt)txt.textContent='שבץ '+match.n;btn.title=match.n+' מתגורר במיקום הרכב ('+loc+')';}
  else{btn.classList.remove('on');btn.classList.add('off');if(txt)txt.textContent='שיבוץ חכם';btn.title=vn?'אין נהג שמתגורר במיקום הרכב':'בחר רכב כדי לקבל הצעה';}
}

  $('#ntRegBtn').classList.toggle('on',t==='regular');
  $('#ntOtherBtn').classList.toggle('on',t!=='regular');
  $('#ntOtherBtn').textContent=(t==='regular'?'אחר':other[t])+' ▾';
  $('#ntSub').textContent={regular:'משימה רגילה',self:'נהיגה עצמית',drive:'משימת נהיגה — רכב של הלקוח',ext:'משימה חיצונית — רכב של חברה חיצונית'}[t];

}

function saveTask(send){
  const name=$('#ntName').value.trim();
  if(!name){toast('חסר כינוי משימה');$('#ntName').focus();return}
  const t=NT.type;
  const vehV=cbVal('cb-veh');
  if((t==='regular'||t==='self')&&vehV===''){toast('בחר רכב');return}
  const casual=$('#ntCasual')&&$('#ntCasual').checked;
  if(!casual&&cbVal('cb-client')===''){toast('בחר לקוח או סמן «לקוח מזדמן»');return}
  const s=NT.start,e=NT.end;
  const n=dayDiff(e,s)+1;
  const drv=(t==='self'||t==='ext')?'':cbVal('cb-drv');
  const ri=t==='drive'?ROWS.findIndex(r=>r.v==='משימת נהיגה')
          :t==='ext'?ROWS.findIndex(r=>r.v==='משימה חיצונית')
          :+vehV;
  const sid=n>1?'s'+NEXT_ID:undefined;
  const cls=t==='self'?'self':t==='ext'?'ext':undefined;
  const client=casual?($('#ntCasualName').value.trim()||'לקוח מזדמן'):cbLabel('cb-client');
  const time=$('#ntTime')?.value||undefined,loc=$('#ntLoc')?.value.trim()||undefined,notes=$('#ntNotes')?.value.trim()||undefined;
  const cName=$('#ntContactName')?.value.trim()||'',cPhone=$('#ntContactPhone')?.value.trim()||'';
  const contact=(cName||cPhone)?{name:cName,phone:cPhone}:undefined;
  if(!casual&&cName&&cbVal('cb-client')!==''){const _ci=+cbVal('cb-client');if(CLIENTS[_ci])saveClientContact(CLIENTS[_ci].n,cName+(cPhone?' · '+cPhone:''));}
  for(let i=0;i<n;i++){
    TASKS_DB.push({id:IDS.next('TSK'),ri,date:addD(s,i),n:name,drv:drv||undefined,cls,sid,client,time,loc,notes,contact});
  }
  closeDrawer();
  WEEK_START=startOfWeek(s);
  renderWeek(WKQ);
  let msg=(n>1?n+' משימות נוצרו':'המשימה נוצרה');
  if(send&&drv)msg+=' · תישלח הודעת שיבוץ ל'+drv;
  else if(send&&!drv)msg+=' · לא שובץ נהג — לא תישלח הודעה';
  if(t==='drive'&&!drv)msg+=' · ⚠ זכור לשבץ נהג';
  toast(msg,4200);
}

/* עמוד 1: דשבורד · משימות · יומן (מרכז) · רכבים · ‹ | עמוד 2: נהגים · לקוחות · שכר · הוצאות · › */
const MN_PAGES=[['board','tasks','home','vehicles'],['drivers','clients','pay','expenses','goDriver']];
let MN_PG=0;
function renderMnav(){
  const w=document.getElementById('mnav');if(!w)return;
  const cur=document.querySelector('#nav button.on')?.dataset.v;
  const btns=MN_PAGES[MN_PG].map(v=>
    v==='goDriver'
      ?`<button title="מעבר לממשק נהג" onclick="location.href='911vip-driver.html'" style="color:var(--lime)">${MN_I[v]}</button>`
      :`<button data-v="${v}" class="${cur===v?'on':''}" onclick="${v==='vehicles'?"VEH_PAGE='vehicles';go('vehicles')":`go('${v}')`}">${MN_I[v]}</button>`
  ).join('');
  const pager=`<button class="mn-pager" onclick="MN_PG=1-MN_PG;renderMnav()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      ${MN_PG===0?'<path d="M14 6l-6 6 6 6"/>':'<path d="M10 6l6 6-6 6"/>'}
    </svg></button>`;
  /* בעמוד 1 החץ בקצה השמאלי · בעמוד 2 חץ החזרה בקצה הימני */
  w.innerHTML=MN_PG===0?btns+pager:pager+btns;
}
renderMnav();
/* לכל עמוד קישור משלו: ‎#home ‎#tasks ‎#board ‎#vehicles ‎#drivers ‎#clients ‎#avail ‎#pay ‎#expenses */
window.addEventListener('hashchange',()=>{
  const v=location.hash.slice(1);
  if(v==='vehicles'||v==='vehicles-faults'||v==='vehicles-insp'){
    const want=v==='vehicles-faults'?'faults':v==='vehicles-insp'?'inspections':'vehicles';
    if(window.CURV!=='vehicles'||VEH_PAGE!==want)routeHash(v);
    return;
  }
  if(v&&views[v]&&v!==window.CURV){go(v);return}
  if(/^(vehicle|driver|client|task)-/.test(v))routeHash(v);
});
/* קישור עמוק: עדכון שקט של שורת הכתובת — בלי רינדור מחדש ובלי הכבדה */
function deepHash(h){try{history.replaceState(null,'','#'+h)}catch(e){}}
function routeHash(h){
  let m;
  if(h==='vehicles'||h==='vehicles-faults'||h==='vehicles-insp'){VEH_PAGE=h==='vehicles-faults'?'faults':h==='vehicles-insp'?'inspections':'vehicles';go('vehicles');return true}
  if(m=h.match(/^task-(\d+)$/)){go('home');if(byId(+m[1]))openJournalTask(+m[1]);return true}
  if(m=h.match(/^vehicle-(\d+)$/)){const v=vehById(+m[1]);go('vehicles');if(v)openVehCard(v.n);return true}
  if(h==='driver-new'){go('drivers');openAddDrv();return true}
  if(m=h.match(/^driver-(\d+)$/)){const d=drvById(+m[1]);go('drivers');if(d){DRV_Q=d.n;go('drivers');deepHash('driver-'+d.id);}return true}
  if(m=h.match(/^client-(\d+)$/)){const c=cliById(+m[1]);go('clients');if(c)openClientSummary(c.n,DEMO_TODAY);return true}
  if(m=h.match(/^client-(.+)$/)){go('clients');openClientSummary(decodeURIComponent(m[1]),DEMO_TODAY);return true}
  return false;
}
const _h0=location.hash.slice(1);
if(!routeHash(_h0))go(views[_h0]?_h0:'home');
try{autoBackupCheck()}catch(e){}
/* ===== עדכון חי מהמאגר המשותף (דיווחי נהג) ===== */
function reloadTasksFromDB(){
  try{
    const saved=Store.reload('tasks');
    if(saved&&Array.isArray(saved)){
      TASKS_DB.length=0;
      saved.forEach(t=>{const ri=resolveTaskRi(t);if(ri!=null)t.ri=ri;TASKS_DB.push(t);});
      let mx=0;TASKS_DB.forEach(t=>{if(typeof t.id==='number'&&t.id>mx)mx=t.id});IDS.ensure('TSK',mx);
    }
  }catch(e){}
}
window.addEventListener('storage',e=>{
  if(!e.key)return;
  if(e.key==='vip_tasks'){reloadTasksFromDB();if(typeof refreshRows==='function')refreshRows();if(window.CURV)go(window.CURV);}
  else if(e.key==='vip_inspections'){if(typeof inspReload==='function')inspReload();if(window.CURV==='vehicles')go('vehicles');if(typeof VC_NAME!=='undefined'&&VC_NAME&&VC_TAB==='insp')openVehCard(VC_NAME,'insp');}
  else if(e.key==='vip_faults2'){try{FAULTS2=Store.reload('faults2')||FAULTS2;}catch(err){}if(window.CURV)go(window.CURV);}
  else if(e.key.indexOf('vip_veh:')===0){
    try{const sk=e.key.slice(4),name=sk.slice(4),rec=Store.reload(sk),v=VEHICLES.find(x=>x.n===name);
      if(v&&rec){if(rec.km!=null)v.km=rec.km;if(rec.loc)v.loc=rec.loc;if(rec.svcKm)v.svcKm=rec.svcKm;if(rec.kmAt)v.kmAt=rec.kmAt;}}catch(err){}
    if(window.CURV)go(window.CURV);
  }
});
/* שם המשתמש המחובר בפרופיל */
if(SESSION){
  const nm=document.getElementById('meName');
  if(nm){
    nm.textContent=SESSION.name;
    if(SESSION.role==='manager')nm.insertAdjacentHTML('beforeend',
      ' <span class="crown" title="מנהל" style="vertical-align:-2px"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M3 8l4.5 4L12 5l4.5 7L21 8l-1.6 10.2a1.5 1.5 0 01-1.5 1.3H6.1a1.5 1.5 0 01-1.5-1.3z"/></svg></span>');
  }
  const av=document.getElementById('meAva');if(av)av.textContent=SESSION.name.split(' ').map(x=>x[0]).join('');
}
</script>
