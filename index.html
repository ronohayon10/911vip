<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>911VIP · מערך נסיעות</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=Heebo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E0F11; --ink2:#3A3D42; --mut:#8A8E96;
  --paper:#F4F4F0; --card:#FFFFFF; --line:#E5E5DE; --line2:#D8D8D0;
  --lime:#E0892F; --lime-ink:#FFF7EE;
  --violet:#7C5CFC; --violet-bg:#EFEAFF;
  --green:#1E9E5E; --green-bg:#E2F6EA;
  --amber:#D98E0B; --amber-bg:#FCF0D8;
  --red:#D14848; --red-bg:#FBE7E7;
  --blue:#2D6CDF; --blue-bg:#E6EEFC;
  --r:14px; --r-s:9px;
  --shadow:0 1px 2px rgba(14,15,17,.05),0 8px 24px -12px rgba(14,15,17,.12);
  --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Heebo',sans-serif; background:var(--paper); color:var(--ink);
  font-size:15px; line-height:1.45; min-height:100dvh;
}
h1,h2,h3,.disp{font-family:'Rubik',sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:inherit;color:inherit}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.02em}

/* ---------- App shell ---------- */
.shell{display:flex;min-height:100dvh}
.rail{
  position:fixed;inset-block:0;inset-inline-start:0;width:218px;z-index:40;
  background:var(--ink);color:#EDEEE9;display:flex;flex-direction:column;
  padding:20px 14px calc(16px + env(safe-area-inset-bottom));overflow:visible;
}
.brand{display:flex;justify-content:center;padding:2px 8px 14px}
.logo-img{width:64px;height:auto;filter:drop-shadow(0 2px 8px rgba(0,0,0,.4))}
.badge911{
  width:38px;height:42px;display:grid;place-items:center;flex:none;
  background:var(--lime);color:var(--ink);font-family:'Rubik';font-weight:800;font-size:15px;
  clip-path:polygon(50% 0,100% 12%,100% 62%,50% 100%,0 62%,0 12%);
}
.brand b{font-family:'Rubik';font-size:17px;letter-spacing:.02em}
.brand small{display:block;color:#9CA0A8;font-size:11px;font-weight:400}
.nav{display:flex;flex-direction:column;gap:2px;flex:1}
.nav button{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;
  color:#C9CBC4;font-size:14.5px;font-weight:500;text-align:start;transition:background .12s,color .12s;
}
.nav button svg{flex:none}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff}
.nav button.on{background:var(--lime);color:var(--lime-ink);font-weight:700}
.nav .spacer{flex:1}
.me{display:flex;align-items:center;gap:10px;padding:10px 8px;border-top:1px solid rgba(255,255,255,.1)}
.ava{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#5b5f66,#2c2f34);display:grid;place-items:center;font-family:'Rubik';font-weight:700;font-size:13px;color:var(--lime)}
.me small{color:#9CA0A8;font-size:11.5px}

.main{flex:1;margin-inline-start:218px;padding:22px clamp(16px,3vw,34px) 96px;transition:margin-inline-start .22s cubic-bezier(.32,.72,.32,1)}
/* --- תפריט מכווץ: אייקונים בלבד, נפתח במעבר עכבר --- */
.rail{transition:width .22s cubic-bezier(.32,.72,.32,1)}
.lbl{white-space:nowrap}
.tg-ic{transition:transform .22s ease}
.t-exp{display:none}
body.railc .t-col{display:none}
body.railc .t-exp{display:inline}
body.railc .tg-ic{transform:rotate(180deg)}
body.railc .ntg:hover .tg-ic{transform:rotate(180deg) scale(1.28)}
body.railc .rail{width:72px}
body.railc .main{margin-inline-start:72px}
body.railc .me-txt,body.railc .brand small{display:none}
body.railc .logo-img{width:38px}
body.railc .me{justify-content:center;padding-inline:0}
body.railc .nav button{justify-content:center;padding:12px 0;position:relative}
body.railc .nav button svg{transition:transform .16s ease}
body.railc .nav button:hover svg{transform:scale(1.28)}
/* תווית צפה פר-פריט: נפתחת רק לפריט שמרחפים מעליו */
body.railc .nav button .lbl{
  position:absolute;right:calc(100% + 14px);top:50%;
  transform:translateY(-50%) translateX(12px) scale(.92);transform-origin:right center;
  background:var(--ink);color:#F4F4EF;padding:8px 16px;border-radius:10px;
  font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;
  box-shadow:0 10px 28px rgba(14,15,17,.4);border:1px solid rgba(255,255,255,.09);
  transition:opacity .14s ease,transform .2s cubic-bezier(.32,.72,.32,1);z-index:60;
}
body.railc .nav button .lbl::after{
  content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%) rotate(45deg);
  width:9px;height:9px;background:var(--ink);border-inline-end:1px solid rgba(255,255,255,.09);border-top:1px solid rgba(255,255,255,.09);
}
body.railc .nav button:hover .lbl{opacity:1;transform:translateY(-50%) translateX(0) scale(1)}
body.railc .nav button.on:hover .lbl{background:var(--lime);color:var(--lime-ink);border-color:transparent}
body.railc .nav button.on:hover .lbl::after{background:var(--lime);border-color:transparent}
.main>.view>*:not(.home-grid){max-width:1280px}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.topbar h1{font-size:clamp(22px,3vw,28px);font-weight:800;letter-spacing:-.01em}
.topbar .sub{color:var(--mut);font-size:13.5px;margin-top:2px}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:999px;
  font-weight:600;font-size:14px;transition:transform .08s,box-shadow .12s;white-space:nowrap;
}
.btn:active{transform:scale(.97)}
.btn-pri{background:var(--ink);color:var(--lime)}
.btn-pri:hover{box-shadow:0 6px 18px -6px rgba(14,15,17,.4)}
.btn-gho{background:var(--card);border:1px solid var(--line2)}
.btn-gho:hover{border-color:var(--ink2)}
.btn-ico{width:38px;height:38px;padding:0;justify-content:center;font-size:17px;font-weight:700;border-radius:50%}

/* ---------- Cards / chips ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.chip{display:inline-flex;align-items:center;gap:5px;padding:2.5px 10px;border-radius:999px;font-size:12px;font-weight:600;white-space:nowrap}
.c-green{background:var(--green-bg);color:var(--green)}
.c-amber{background:var(--amber-bg);color:var(--amber)}
.c-red{background:var(--red-bg);color:var(--red)}
.c-blue{background:var(--blue-bg);color:var(--blue)}
.c-violet{background:var(--violet-bg);color:var(--violet)}
.c-mut{background:#EFEFEA;color:var(--ink2)}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.pulse{animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ---------- Dashboard ---------- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi{padding:14px 16px;display:flex;flex-direction:column;gap:2px}
.kpi .v{font-family:'Rubik';font-size:26px;font-weight:800;line-height:1.1}
.kpi .l{color:var(--mut);font-size:12.5px;font-weight:500}
.kpi .t{font-size:12px;font-weight:600}

.live{padding:18px;margin-bottom:14px;overflow:hidden}
.live-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.live-head h2{font-size:16.5px;font-weight:700;display:flex;align-items:center;gap:9px}
.now-clock{font-family:var(--mono);font-size:13px;color:var(--mut)}
.tl{position:relative}
.tl-hours{display:flex;justify-content:space-between;color:var(--mut);font-size:10.5px;font-family:var(--mono);padding:0 2px 6px;border-bottom:1px solid var(--line)}
.tl-rows{position:relative}
.tl-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line)}
.tl-row:last-child{border-bottom:none}
.tl-veh{width:128px;flex:none;font-size:12.5px;font-weight:600;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-track{position:relative;flex:1;height:30px;background:repeating-linear-gradient(to left,transparent,transparent calc(100%/18 - 1px),var(--line) calc(100%/18 - 1px),var(--line) calc(100%/18))}
.tl-bar{
  position:absolute;top:3px;bottom:3px;border-radius:7px;display:flex;align-items:center;
  padding:0 9px;font-size:11.5px;font-weight:600;overflow:hidden;white-space:nowrap;
  background:var(--ink);color:#fff;min-width:54px;
}
.tl-bar.done{background:#C9CDC2;color:#3c4038}
.tl-bar.admin{background:var(--violet)}
.tl-bar.live-bar{background:var(--green);box-shadow:0 0 0 3px var(--green-bg)}
.tl-now{position:absolute;top:-4px;bottom:0;width:2px;background:var(--red);z-index:3}
.tl-now::before{content:'';position:absolute;top:-3px;inset-inline-start:-3px;width:8px;height:8px;border-radius:50%;background:var(--red)}

.split{display:grid;grid-template-columns:1.4fr 1fr;gap:14px}
.panel{padding:16px 18px}
.panel h3{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.panel h3 a{font-size:12.5px;color:var(--mut);font-weight:500;text-decoration:none;cursor:pointer}
.alert-row{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line)}
.alert-row:last-child{border:none;padding-bottom:2px}
.alert-ic{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:none}
.alert-row b{font-size:13.5px;font-weight:600;display:block}
.alert-row span{font-size:12.5px;color:var(--mut)}
.feed-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.feed-row:last-child{border:none}
.feed-t{font-family:var(--mono);font-size:11.5px;color:var(--mut);flex:none;padding-top:2px}

/* ---------- Tables → cards ---------- */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.search{
  flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--card);
  border:1px solid var(--line2);border-radius:999px;padding:8px 14px;
}
.search input{border:none;outline:none;background:none;width:100%;font-size:14px}
.search svg{color:var(--mut);flex:none}
.seg{display:inline-flex;background:var(--card);border:1px solid var(--line2);border-radius:999px;padding:3px}
.seg button{padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600;color:var(--mut)}
.seg button.on{background:var(--ink);color:var(--lime)}
.filt{background:var(--card);border:1px solid var(--line2);border-radius:999px;padding:8px 13px;font-size:13px;font-weight:600;color:var(--ink2)}

.tbl{width:100%;border-collapse:collapse}
.tbl th{
  text-align:start;font-size:11.5px;font-weight:600;color:var(--mut);letter-spacing:.03em;
  padding:11px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);z-index:2;
}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr{transition:background .1s;cursor:pointer}
.tbl tbody tr:hover{background:#FAFAF6}
.tname{font-weight:700;font-size:14px}
.tsub{color:var(--mut);font-size:12px;margin-top:1px}
.scrollx{overflow-x:auto;border-radius:var(--r)}

.cards{display:none;flex-direction:column;gap:10px}
.mcard{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.mcard .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.mcard .meta{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:13px;color:var(--ink2)}
.mcard .meta b{font-weight:600;color:var(--ink)}
.mtimes{display:flex;gap:0;background:var(--paper);border-radius:var(--r-s);overflow:hidden;border:1px solid var(--line)}
.mtimes div{flex:1;text-align:center;padding:7px 4px;border-inline-start:1px solid var(--line)}
.mtimes div:first-child{border-inline-start:none}
.mtimes .l{font-size:10.5px;color:var(--mut);display:block}
.mtimes .v{font-family:var(--mono);font-size:13.5px;font-weight:600}

/* ---------- Week board ---------- */
.board-wrap{overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.board{display:grid;grid-template-columns:repeat(7,minmax(150px,1fr));gap:8px;min-width:1080px}
.bday{display:flex;flex-direction:column;gap:8px}
.bday-h{
  text-align:center;padding:9px 6px;border-radius:var(--r-s);background:var(--card);
  border:1px solid var(--line);font-size:12.5px;color:var(--mut);font-weight:600;
}
.bday-h b{display:block;font-family:'Rubik';font-size:16px;color:var(--ink)}
.bday-h.today{background:var(--ink);border-color:var(--ink)}
.bday-h.today b{color:var(--lime)}
.bday-h.shabat{background:#EFEFE8}
.btask{padding:10px 12px;border-radius:var(--r-s);border:1px solid var(--line);background:var(--card);cursor:pointer;transition:transform .1s,box-shadow .12s;border-inline-start:3px solid var(--ink)}
.btask:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.btask b{font-size:13px;display:block;margin-bottom:2px}
.btask span{font-size:11.5px;color:var(--mut);display:block}
.btask.admin{border-inline-start-color:var(--violet)}
.btask.cancelled{opacity:.55;border-inline-start-color:var(--red)}
.badd{border:1.5px dashed var(--line2);border-radius:var(--r-s);padding:9px;color:var(--mut);font-size:13px;font-weight:600;text-align:center;transition:all .12s}
.badd:hover{border-color:var(--ink);color:var(--ink)}

/* ---------- Week grid (home): vehicles × days ---------- */
.wk-wrap{overflow:auto;border-radius:var(--r);max-height:calc(100dvh - 175px);-webkit-overflow-scrolling:touch}
.wk{display:grid;grid-template-columns:max-content repeat(7,minmax(132px,1fr));min-width:1040px;background:var(--card)}
.wk-hd,.wk-corner,.wk-veh,.wk-cell{border-bottom:1px solid var(--line2);border-inline-end:1px solid var(--line2)}
.wk-hd:last-of-type{border-inline-end:none}
.wk-hd{
  position:sticky;top:0;z-index:5;background:var(--card);text-align:center;padding:9px 6px 10px;
  font-size:12px;color:var(--mut);font-weight:600;
}
.wk-hd b{display:block;font-family:'Rubik';font-size:16.5px;color:var(--ink);letter-spacing:-.01em}
.wk-hd.past{background:#FBF1F0}
.wk-hd.today{background:#D6E8F7;color:#54718C}
.wk-hd.today b{color:#1E3A56}
.wk-veh{
  position:sticky;inset-inline-start:0;z-index:4;background:var(--card);
  padding:10px 12px;display:flex;flex-direction:column;justify-content:center;gap:1px;
}
.wk-veh b{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;white-space:nowrap}
.wk-veh span{font-size:11px;color:var(--mut);width:0;min-width:100%;white-space:normal;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sh-ic{width:12px;height:12px;flex:none;color:var(--ink2)}
.wk-veh .vshield{font-size:9.5px;padding:1px 5px}
.wk-corner{position:sticky;top:0;inset-inline-start:0;z-index:6;background:var(--card);display:flex;align-items:center;padding:0 10px}
.wk-corner input{border:none;outline:none;background:none;flex:1;width:0;min-width:0;font-size:13px}
.wk-cell{padding:5px;display:flex;flex-direction:column;gap:4px;min-height:62px;position:relative;transition:background .12s}
.wk-cell.today-col{background:#F2F8FD}
.wk-cell.past{
  background-image:repeating-linear-gradient(45deg,transparent 0 7px,rgba(14,15,17,.028) 7px 8px);
}
.wk-cell.past:hover{background-color:inherit}
.wk-cell:hover{background:#FAF5EC}
.wk-task{
  border-radius:8px;padding:6px 9px;background:#F4F5EF;border:1px solid var(--line);
  border-inline-start:3px solid var(--ink);cursor:pointer;transition:transform .1s,box-shadow .12s;
}
.wk-task:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.wk-task{user-select:none;-webkit-user-select:none;cursor:grab;position:relative}
/* --- מצב בחירה מרובה --- */
.wk-task .ck{
  display:none;position:absolute;top:5px;inset-inline-end:5px;width:16px;height:16px;
  border:1.5px solid var(--line2);border-radius:5px;background:#fff;place-items:center;color:#fff;z-index:2;
}
body.selmode .wk-task .ck{display:grid}
body.selmode .wk-task{cursor:pointer;padding-inline-end:24px}
body.selmode .wk-add{display:none}
.done-b{
  position:absolute;top:4px;inset-inline-end:5px;color:var(--green);
  display:grid;place-items:center;z-index:2;line-height:0;
}
.wk-task.mini .done-b{top:3px;inset-inline-end:4px}
.wk-task.is-done{cursor:default}
.wk-task.is-done:hover{transform:none;box-shadow:none}
body.selmode .done-b{display:none}
.wk-task.sel{box-shadow:0 0 0 2px var(--lime);background:#FFF3E2}
.wk-task.sel .ck{background:var(--lime);border-color:var(--lime)}
.btn-gho.on-sel{background:var(--ink);color:var(--lime);border-color:var(--ink)}
.drag-ghost span.gbadge{
  position:absolute;top:-9px;inset-inline-start:-9px;width:23px;height:23px;border-radius:50%;
  background:var(--lime);color:var(--lime-ink);display:grid;place-items:center;
  font-size:11.5px;font-weight:800;line-height:1;text-align:center;
  box-shadow:0 3px 10px rgba(0,0,0,.3);
}
.dp{
  position:fixed;z-index:82;display:none;width:272px;
  background:var(--card);border:1px solid var(--line);border-radius:15px;
  box-shadow:0 22px 60px rgba(14,15,17,.28);padding:13px;
}
.dp.open{display:block;animation:fade .15s ease}
.dp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.dp-head b{font-size:14px;font-weight:700}
.dp-nav{width:29px;height:29px;border-radius:9px;background:var(--paper);font-size:16px;font-weight:700;color:var(--ink2);display:grid;place-items:center}
.dp-nav:hover{background:var(--line)}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dp-dow{text-align:center;font-size:10.5px;color:var(--mut);font-weight:700;padding:4px 0}
.dp-day{
  height:32px;border-radius:9px;display:grid;place-items:center;
  font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums;transition:background .1s;
}
.dp-day:hover{background:var(--paper)}
.dp-day.other{color:var(--line2)}
.dp-day.today{box-shadow:inset 0 0 0 1.5px var(--lime);color:var(--ink)}
.dp-day.selected{background:var(--ink);color:var(--lime)}
.dp-day.shabat{color:var(--mut)}
.dp-day.selected.shabat{color:var(--lime)}
.dp-today{
  margin-top:9px;width:100%;background:var(--paper);border:1px solid var(--line2);
  border-radius:999px;padding:7px;font-size:12.5px;font-weight:700;color:var(--ink2);
}
.dp-today:hover{border-color:var(--ink2);color:var(--ink)}
.confirm{
  position:fixed;bottom:152px;left:50%;transform:translateX(-50%) translateY(12px);
  opacity:0;pointer-events:none;transition:opacity .2s,transform .24s;z-index:74;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;
  background:var(--card);border:1px solid var(--line);border-radius:15px;
  box-shadow:0 20px 54px rgba(14,15,17,.3);padding:13px 17px;max-width:min(560px,94vw);
}
.confirm.show{opacity:1;transform:translateX(-50%);pointer-events:auto}
.cf-ic{width:34px;height:34px;border-radius:10px;background:var(--violet-bg);color:var(--violet);display:grid;place-items:center;font-size:17px;font-weight:800;flex:none}
.cf-body{flex:1;min-width:200px}
.cf-body b{display:block;font-size:13.5px}
.cf-body span{font-size:12.5px;color:var(--mut)}
.cf-btns{display:flex;gap:7px}
.cf-yes{background:var(--ink);color:var(--lime);border-radius:999px;padding:8px 16px;font-size:13px;font-weight:700}

/* ---------- Home layout: journal + live side dashboard ---------- */
.home-grid{display:grid;grid-template-columns:minmax(0,1fr) clamp(300px,23vw,392px);gap:16px;align-items:start}
.home-grid.collapsed{grid-template-columns:minmax(0,1fr) 38px}
.home-grid.collapsed .side{display:none}
.side-tab{
  display:none;position:sticky;top:14px;writing-mode:vertical-rl;
  background:var(--card);border:1px solid var(--line);border-radius:11px;box-shadow:var(--shadow);
  padding:16px 9px;font-size:12.5px;font-weight:700;color:var(--ink2);gap:8px;align-items:center;
  transition:border-color .12s;
}
.side-tab:hover{border-color:var(--lime);color:var(--ink)}
.side-tab .dot{background:var(--green)}
.home-grid.collapsed .side-tab{display:flex}
.side-head{display:flex;align-items:center;justify-content:space-between;padding:0 2px}
.side-head b{font-size:13px;font-weight:700;color:var(--ink2)}
.side-x{
  display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--mut);
  border:1px solid var(--line2);border-radius:999px;padding:4px 11px;background:var(--card);
}
.side-x:hover{color:var(--ink);border-color:var(--ink2)}
.side{
  display:flex;flex-direction:column;gap:12px;position:relative;
  overflow-y:auto;overscroll-behavior:contain;padding-bottom:4px;
  scrollbar-width:thin;scrollbar-color:var(--line2) transparent;
}
.side::-webkit-scrollbar{width:5px}
.side::-webkit-scrollbar-thumb{background:var(--line2);border-radius:99px}
.sp{padding:14px 16px}
.sp h3{font-size:13.5px;font-weight:700;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sp h3 .chip{font-size:10.5px;padding:1.5px 8px}
.sp h3 a{font-size:11.5px;color:var(--mut);font-weight:500;cursor:pointer;text-decoration:none}
.sp .feed-row{font-size:12.5px;padding:7px 0}
.sp .feed-t{font-size:10.5px}
.mt-row{padding:9px 0;border-bottom:1px solid var(--line)}
.mt-row:last-child{border:none;padding-bottom:2px}
.mt-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:5px}
.mt-top b{font-size:12.5px;font-weight:700}
.mt-top .num{font-size:12.5px;font-weight:700}
.mt-sub{font-size:10.5px;color:var(--mut)}
.meter{height:6px;border-radius:99px;background:var(--line);overflow:hidden}
.meter i{display:block;height:100%;border-radius:99px;transition:width .4s ease}
.un-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--line)}
.un-row:last-child{border:none;padding-bottom:2px}
.un-row .ava{width:27px;height:27px;font-size:10.5px;background:#EDEEE6;color:var(--ink)}
.un-row b{font-size:12.5px;flex:1}
.un-row .chip{font-size:10px;padding:1.5px 7px}
.un-asn{font-size:11px;font-weight:700;color:var(--ink);background:var(--lime);border-radius:99px;padding:3px 10px;transition:transform .1s}
.un-asn:active{transform:scale(.94)}
@media (max-width:1180px){.home-grid,.home-grid.collapsed{grid-template-columns:minmax(0,1fr)}.home-grid>div{min-width:0;max-width:100%}.home-grid.collapsed .side{display:flex}.side-tab{display:none!important}.side-head{display:none}.side{position:static;flex-direction:row;flex-wrap:wrap}.side .sp{flex:1;min-width:260px}}
@media (max-width:768px){.side{flex-direction:column}}

/* ---------- Vehicles ---------- */
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:12px}
.vcard{padding:16px;display:flex;flex-direction:column;gap:11px}
.vtop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.vname{font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px}
.vshield{font-size:11px;background:var(--ink);color:var(--lime);border-radius:5px;padding:1px 6px;font-weight:700}
.vplate{font-family:var(--mono);font-size:12px;color:var(--mut);margin-top:2px}
.vstats{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.vstat{background:var(--paper);border-radius:var(--r-s);padding:8px 11px}
.vstat .l{font-size:10.5px;color:var(--mut);display:block}
.vstat .v{font-size:13px;font-weight:700;font-family:var(--mono)}
.vbar{height:5px;border-radius:99px;background:var(--line);overflow:hidden}
.vbar i{display:block;height:100%;border-radius:99px}
.vfoot{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--mut)}

/* ---------- Drivers ---------- */
.dlist{display:flex;flex-direction:column}
.drow{display:flex;align-items:center;gap:13px;padding:13px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .1s}
.drow:hover{background:#FAFAF6}
.drow:last-child{border:none}
.drow .ava{flex:none;background:#EDEEE6;color:var(--ink)}
.drow .info{flex:1;min-width:0}
.drow .info b{font-size:14.5px}
.drow .info span{display:block;font-size:12.5px;color:var(--mut)}
.drow .tags{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}

/* ---------- Availability ---------- */
.avwrap{overflow-x:auto}
.avgrid{display:grid;grid-template-columns:130px repeat(7,minmax(86px,1fr));min-width:760px}
.avgrid>div{padding:9px 8px;border-bottom:1px solid var(--line);font-size:12.5px;display:flex;align-items:center;justify-content:center;text-align:center}
.avgrid .hd{font-weight:600;color:var(--mut);font-size:11.5px;background:var(--card);position:sticky;top:0}
.avgrid .nm{justify-content:flex-start;font-weight:600;font-size:13px;position:sticky;inset-inline-start:0;background:var(--card)}
.av{border-radius:7px;padding:4px 8px;font-weight:600;font-size:11.5px;width:100%}
.av-y{background:var(--green-bg);color:var(--green)}
.av-n{background:var(--red-bg);color:var(--red)}
.av-p{background:var(--violet-bg);color:var(--violet)}
.av-t{background:#F2F2EC;color:var(--mut)}
.av-task{background:var(--ink);color:var(--lime)}

/* ---------- Pay ---------- */
.payhead{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.paysum{margin-inline-start:auto;text-align:end}
.paysum .v{font-family:'Rubik';font-size:30px;font-weight:800}
.paysum .l{color:var(--mut);font-size:12.5px}

/* ---------- Detail drawer ---------- */
.scrim{position:fixed;inset:0;background:rgba(14,15,17,.45);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;z-index:61;background:var(--card);
  inset-block:0;inset-inline-end:0;width:min(440px,100%);transform:translateX(-100%);
  transition:transform .26s cubic-bezier(.32,.72,.32,1);display:flex;flex-direction:column;
  box-shadow:-12px 0 40px rgba(14,15,17,.18);
}
html[dir="rtl"] .drawer{transform:translateX(-100%)}
.drawer.open{transform:translateX(0)}
.dr-head{padding:18px 20px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.dr-head h3{font-size:17px;font-weight:800}
.dr-body{padding:18px 20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:16px}
.dr-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.dr-item{background:var(--paper);border-radius:var(--r-s);padding:9px 12px}
.dr-item .l{font-size:11px;color:var(--mut);display:block}
.dr-item .v{font-size:13.5px;font-weight:600}
.steps{display:flex;flex-direction:column;gap:0;position:relative}
.step{display:flex;gap:12px;padding-bottom:18px;position:relative}
.step::before{content:'';position:absolute;inset-inline-start:9px;top:22px;bottom:0;width:2px;background:var(--line)}
.step:last-child::before{display:none}
.step-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--line2);background:var(--card);flex:none;display:grid;place-items:center;z-index:1}
.step.done .step-dot{background:var(--green);border-color:var(--green);color:#fff}
.step.cur .step-dot{border-color:var(--green);box-shadow:0 0 0 4px var(--green-bg)}
.step b{font-size:13.5px;display:block}
.step span{font-size:12px;color:var(--mut)}
.dr-foot{padding:14px 20px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--line);display:flex;gap:8px}
.dr-foot .btn{flex:1;justify-content:center}
.x{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;background:var(--paper)}

/* ---------- Toast ---------- */
.toast{
  position:fixed;bottom:88px;inset-inline:0;margin:auto;width:fit-content;max-width:90%;
  background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;
  z-index:80;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;display:flex;gap:8px;align-items:center;
}
.toast.show{opacity:1;transform:none;pointer-events:auto}
.toast-btn{display:none;background:var(--lime);color:var(--lime-ink);border-radius:999px;padding:4px 14px;font-size:12.5px;font-weight:700;margin-inline-start:4px}
.toast-btn.show{display:inline-block}
.pn-ic{display:inline-flex;margin-inline-start:4px;color:var(--amber);vertical-align:-2px;animation:pulse 1.8s infinite}
.toast .dot{background:var(--lime)}

/* ---------- Mobile nav ---------- */
.mnav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(14,15,17,.97);
  backdrop-filter:blur(14px);padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  border-top:1px solid rgba(255,255,255,.08);
}
.mnav .wrap{display:flex;max-width:520px;margin:auto}
.mnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:#9CA0A8;font-size:10.5px;font-weight:600;padding:5px 2px;border-radius:11px}
.mnav button.on{color:var(--lime)}
.fab{
  display:none;position:fixed;bottom:calc(76px + env(safe-area-inset-bottom));inset-inline-end:18px;z-index:51;
  width:54px;height:54px;border-radius:18px;background:var(--lime);color:var(--ink);
  box-shadow:0 10px 28px -8px rgba(190,110,30,.55);place-items:center;
}

.view{display:none;animation:fade .18s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

@media (max-width:980px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .split{grid-template-columns:1fr}
  .tl-veh{width:92px;font-size:11.5px}
}
@media (max-width:768px){
  /* הדף לא נגלל — רק אזור התוכן. כך התפריט התחתון מקובע באמת בכל דפדפן */
  html,body{height:100%;height:100dvh;overflow:hidden;position:fixed;inset:0;width:100%}
  .shell{height:100%;height:100dvh;display:flex}
  .rail{display:none}
  .main{
    margin:0;flex:1;min-width:0;overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
    padding:14px 12px calc(86px + env(safe-area-inset-bottom));
  }
  /* היומן: גלילה פנימית בלבד — כותרות ימים ועמודת רכבים נשארות קפואות */
  .wk-wrap{height:calc(100dvh - 300px);min-height:400px;max-height:none}
  .side{display:flex;flex-direction:column;gap:12px;position:static;max-height:none;overflow:visible}
  .side .sp{min-width:0}
  .sec-hint{display:flex;align-items:center;gap:8px;color:var(--mut);font-size:12px;font-weight:600;margin:4px 2px -2px}
  .sec-hint::after{content:'';flex:1;height:1px;background:var(--line2)}
  .wk{grid-template-columns:max-content repeat(7,minmax(116px,1fr));min-width:920px}
  .wk-veh{padding:8px 9px}
  .wk-veh b{font-size:11.5px}
  .wk-veh span{font-size:9.5px}
  .wk-hd b{font-size:14px}
  .wk-add{opacity:.55}
  .home-grid{gap:12px}
  .mnav{display:block}
  .fab{display:grid}
  .scrollx .tbl{display:none}
  .cards{display:flex}
  .topbar{align-items:center}
  .topbar .actions .btn-pri{display:none}
  .drawer{inset-inline:0;top:auto;bottom:0;width:100%;max-height:88dvh;border-radius:20px 20px 0 0;transform:translateY(105%)}
  .drawer.open{transform:translateY(0)}
}
</style>

function syncSideHeight(){
  const grid=document.getElementById('homeGrid');if(!grid)return;
  const wrap=grid.querySelector('.wk-wrap'),side=grid.querySelector('.side');
  if(!wrap||!side)return;
  if(window.innerWidth<=1180){side.style.maxHeight='';return}

  const h=wrap.getBoundingClientRect().bottom-side.getBoundingClientRect().top;
  side.style.maxHeight=Math.max(220,h)+'px';
}

  dp.style.top=Math.min(r.bottom+8,window.innerHeight-380)+'px';
  dp.classList.add('open');
}

  const first=new Date(DPS.y,DPS.m,1).getDay();           // 0=ראשון
  const days=new Date(DPS.y,DPS.m+1,0).getDate();
  const prevDays=new Date(DPS.y,DPS.m,0).getDate();
  let cells=dows.map(d=>`<div class="dp-dow">${d}</div>`).join('');
  const iso=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  for(let i=first-1;i>=0;i--)cells+=`<div class="dp-day other">${prevDays-i}</div>`;
  for(let d=1;d<=days;d++){
    const v=iso(DPS.y,DPS.m,d);
    const dow=new Date(DPS.y,DPS.m,d).getDay();
    const cls=['dp-day',v==='2026-06-11'?'today':'',v===DPS.sel?'selected':'',dow===6?'shabat':''].join(' ');
    cells+=`<div class="${cls}" onclick="dpPick('${v}')">${d}</div>`;
  }
  const used=first+days;
  for(let d=1;d<=(7-used%7)%7;d++)cells+=`<div class="dp-day other">${d}</div>`;
  $('#dpGrid').innerHTML=cells;
}
function dpPick(v){
  DPS.sel=v;
  const d=new Date(v+'T00:00:00');
  DPS.y=d.getFullYear();DPS.m=d.getMonth();
  $('#dp').classList.remove('open');
  toast('מעבר לשבוע של '+d.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+' (דמו)');
}

function go(v){

  $('#main').innerHTML=`<div class="view on">${views[v]()}</div>`;
  if(v==='home'){renderWeek('');requestAnimationFrame(syncSideHeight);}
  if(v==='tasks')renderTasks('');
  if(v==='vehicles')renderVeh('');
  window.scrollTo({top:0});$('#main').scrollTo({top:0});
}
let WKQ='';
const WK_EXP=new Set();
function renderWeek(q){
  WKQ=q=(q||'').trim();
  const todayIdx=WK_DAYS.findIndex(d=>d.cls==='today');
  $('#wkrows').innerHTML=WEEK.map((r,ri)=>({r,ri})).filter(o=>!q||o.r.v.includes(q)).map(({r,ri})=>{
    const SH='<svg class="sh-ic" viewBox="0 0 24 24" fill="currentColor" aria-label="משוריין"><path d="M12 2l8 3v6c0 5-3.4 9.4-8 11-4.6-1.6-8-6-8-11V5z"/></svg>';
    const veh=`<div class="wk-veh"><b>${r.arm?SH:''}${r.v.replace(' משוריין','')}</b>${r.loc?`<span>${r.loc}</span>`:''}</div>`;
    const cells=WK_DAYS.map((d,i)=>{
      const arr=r.c[i]||[];
      const past=todayIdx>-1&&i<todayIdx;
      const key=ri+'-'+i;
      const CK='<span class="ck"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.6"><path d="M5 13l4 4L19 7"/></svg></span>';
      const DONE='<span class="done-b" title="בוצעה"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>';
      const chip=(t,si,mini)=>{const isDone=t.done||(past&&!t.cls);
      return`<div class="wk-task ${mini?'mini':''} ${t.cls||''} ${t.sel?'sel':''} ${isDone?'is-done':''}" data-ri="${ri}" data-di="${i}" data-si="${si}" ${mini?`title="${t.n}${t.drv?' · '+t.drv:''}"`:''} onclick="event.stopPropagation();chipClick(this)">
        ${isDone?DONE:''}${CK}<b>${t.n}</b>${!mini&&t.drv?`<span>${t.drv}</span>`:''}</div>`};
      let items;
      if(past&&arr.length>=2){
        /* יום שעבר: 2 משימות בחצי-חצי בגובה סטנדרטי; מעבר לכך — כפתור +N */
        const open=WK_EXP.has(key);
        const shown=open?arr:arr.slice(0,2);
        items=shown.map((t,si)=>chip(t,si,true)).join('');
        if(arr.length>2&&!open)items+=`<button class="wk-more" onclick="event.stopPropagation();WK_EXP.add('${key}');renderWeek(WKQ)">+${arr.length-2} עוד</button>`;
        if(open)items+=`<button class="wk-more" onclick="event.stopPropagation();WK_EXP.delete('${key}');renderWeek(WKQ)">סגור</button>`;
      }else{
        items=arr.map((t,si)=>chip(t,si,false)).join('');
      }
      /* בימים שעברו אין הוספת נסיעה — אין +, וכפתור +N בא במקומו בלי תוספת גובה */
      const addBtn=past?'':`<button class="wk-add" title="שיבוץ ${r.v} ל${d.d}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg></button>`;
      const cellClick=past?'':`onclick="toast('משימה חדשה: ${r.v} · ${d.d} ${d.dt}')"`;
      return`<div class="wk-cell ${i===todayIdx?'today-col':''} ${past?'past':''}" data-ri="${ri}" data-di="${i}" ${cellClick}>
        ${items}${addBtn}
      </div>`;
    }).join('');
    return veh+cells;
  }).join('')||`<div style="grid-column:1/-1;text-align:center;color:var(--mut);padding:34px">לא נמצא רכב בשם הזה</div>`;
}

function seriesPrompt(affected){
  const bySid={};
  affected.forEach(({t,di})=>{if(t&&t.sid)(bySid[t.sid]=bySid[t.sid]||[]).push(+di)});
  Object.keys(bySid).forEach(sid=>{
    const m=SERIES[sid];if(!m)return;
    /* רק אם השינוי נוגע ביום האחרון הנראה — כלומר הרצף אל השבוע הבא לא נשבר */
    if(bySid[sid].includes(m.lastVisibleDay)){
      showConfirm(
        '«'+m.name+'» ממשיכה ברצף גם בשבוע הבא ('+m.contLabel+')',
        'להחיל את השינוי גם על '+m.cont+' הימים הבאים באותו רצף?',
        ()=>toast('השינוי הוחל גם על '+m.contLabel+' · התראות בעוד 15 דק׳',3200)
      );
    }
  });
}
function showConfirm(title,q,onYes){
  $('#cfTitle').textContent=title;$('#cfQ').textContent=q;
  $('#cfYes').onclick=()=>{hideConfirm();onYes()};
  $('#confirm').classList.add('show');
  clearTimeout(window._cf);window._cf=setTimeout(hideConfirm,14000);
}
function hideConfirm(){$('#confirm').classList.remove('show')}

/* ============ בחירה מרובה ופעולות bulk ============ */
let SEL_MODE=false;
function toggleSelMode(){
  SEL_MODE=!SEL_MODE;
  document.body.classList.toggle('selmode',SEL_MODE);
  if(!SEL_MODE)clearSel();
  document.getElementById('selModeBtn')?.classList.toggle('on-sel',SEL_MODE);
  renderWeek(WKQ);updateSelBar();
}
function clearSel(){WEEK.forEach(r=>Object.values(r.c).forEach(a=>a.forEach(t=>t.sel=false)))}
function endSelMode(){if(SEL_MODE)toggleSelMode()}
function selTasks(){
  const out=[];
  WEEK.forEach((r,ri)=>Object.keys(r.c).forEach(di=>r.c[di].forEach(t=>{if(t.sel)out.push({t,ri,di:+di})})));
  return out;
}
function chipClick(el){
  if(DND.moved)return;
  const t=WEEK[+el.dataset.ri].c[+el.dataset.di][+el.dataset.si];
  if(SEL_MODE){t.sel=!t.sel;el.classList.toggle('sel',t.sel);updateSelBar();}
  else openTask(t.cls==='live'?1:3);
}
function updateSelBar(){
  const n=selTasks().length;
  $('#selN').textContent=n;
  $('#selbar').classList.toggle('show',SEL_MODE&&n>0);
  closeSelMenus();
}
function closeSelMenus(){document.querySelectorAll('.sb-menu').forEach(m=>m.classList.remove('open'))}
document.addEventListener('click',e=>{if(!e.target.closest('.sb-wrap'))closeSelMenus()});
function openSelMenu(kind,e){
  e.stopPropagation();
  const m=$('#menu-'+kind),was=m.classList.contains('open');
  closeSelMenus();
  if(was)return;
  if(kind==='drv')m.innerHTML=DRIVERS.map(d=>`<button onclick="bulkDriver('${d.n}')">${d.n}</button>`).join('');
  else m.innerHTML=WEEK.filter(r=>r.v!=='משימת נהיגה').map((r,)=>`<button onclick="bulkVehicle(${WEEK.indexOf(r)})">${r.v.replace(' משוריין','')}${r.arm?' 🛡':''}</button>`).join('');
  m.classList.add('open');
}
function removeByRef(t){
  for(const r of WEEK)for(const k of Object.keys(r.c)){
    const a=r.c[k],i=a.indexOf(t);
    if(i>-1){a.splice(i,1);if(!a.length)delete r.c[k];return}
  }
}
function restoreSnap(snap){
  snap.forEach(({t})=>removeByRef(t));
  snap.forEach(({t,ri,di})=>{(WEEK[ri].c[di]=WEEK[ri].c[di]||[]).push(t)});
  renderWeek(WKQ);updateSelBar();
}
function bulkDriver(name){
  const list=selTasks();if(!list.length)return;
  const snap=list.map(({t,ri,di})=>({t,ri,di,drv:t.drv}));
  list.forEach(({t})=>t.drv=name);
  endSelMode();
  toastA(list.length+' משימות שובצו לנהג '+name+' · התראות בעוד 15 דק׳','בטל',()=>{
    snap.forEach(s=>s.t.drv=s.drv);renderWeek(WKQ);toast('השיבוץ בוטל — לא נשלחו התראות');
  },8000);
  seriesPrompt(list);
}
function bulkVehicle(tri){
  const list=selTasks();if(!list.length)return;
  const snap=list.map(({t,ri,di})=>({t,ri,di}));
  list.forEach(({t})=>removeByRef(t));
  list.forEach(({t,di})=>{(WEEK[tri].c[di]=WEEK[tri].c[di]||[]).push(t)});
  endSelMode();
  toastA(list.length+' משימות הועברו ל'+WEEK[tri].v+' · התראות בעוד 15 דק׳','בטל',()=>{
    restoreSnap(snap);toast('ההעברה בוטלה — לא נשלחו התראות');
  },8000);
  seriesPrompt(list);
}
function bulkDelete(){
  const list=selTasks();if(!list.length)return;
  const snap=list.map(({t,ri,di})=>({t,ri,di}));
  list.forEach(({t})=>removeByRef(t));
  endSelMode();
  toastA(list.length+' משימות נמחקו','בטל מחיקה',()=>{
    restoreSnap(snap);toast('המחיקה בוטלה');
  },8000);
}

/* ============ Drag & Drop ביומן ============ */
const DND={el:null,ghost:null,src:null,over:null,moved:false,timer:null,sx:0,sy:0,active:false,group:null};
document.addEventListener('pointerdown',e=>{
  const t=e.target.closest('.wk-task');
  if(!t||e.button>0)return;
  if(t.classList.contains('is-done'))return; // משימה שהושלמה — לא ניתנת לגרירה
  DND.el=t;DND.moved=false;DND.active=false;DND.sx=e.clientX;DND.sy=e.clientY;
  DND.src={ri:+t.dataset.ri,di:+t.dataset.di,si:+t.dataset.si};
  if(e.pointerType==='touch'){
    // לחיצה ארוכה מתחילה גרירה; תזוזה לפני כן = גלילה רגילה
    DND.timer=setTimeout(()=>startDrag(e.clientX,e.clientY),330);
  }
});
document.addEventListener('pointermove',e=>{
  if(!DND.el)return;
  const dx=Math.abs(e.clientX-DND.sx),dy=Math.abs(e.clientY-DND.sy);
  if(!DND.active){
    if(DND.timer&&(dx>9||dy>9)){clearTimeout(DND.timer);DND.timer=null;DND.el=null;return}
    if(!DND.timer&&(dx>6||dy>6))startDrag(e.clientX,e.clientY); // עכבר
    if(!DND.active)return;
  }
  moveDrag(e.clientX,e.clientY);
},{passive:true});
document.addEventListener('touchmove',e=>{if(DND.active)e.preventDefault()},{passive:false});
document.addEventListener('pointerup',()=>{
  if(DND.timer){clearTimeout(DND.timer);DND.timer=null}
  if(DND.active)endDrag();
  DND.el=null;setTimeout(()=>DND.moved=false,50);
});
function startDrag(x,y){
  if(!DND.el)return;
  DND.active=true;DND.moved=true;
  document.body.classList.add('dragging-now');
  const srcTask=WEEK[DND.src.ri].c[DND.src.di][DND.src.si];
  DND.group=(SEL_MODE&&srcTask&&srcTask.sel)?selTasks():null;
  const g=DND.el.cloneNode(true);
  g.classList.add('drag-ghost');g.classList.remove('dragging');
  if(DND.group&&DND.group.length>1)g.insertAdjacentHTML('beforeend','<span class="gbadge">'+DND.group.length+'</span>');
  document.body.appendChild(g);DND.ghost=g;
  DND.el.classList.add('dragging');
  moveDrag(x,y);
  if(navigator.vibrate)navigator.vibrate(12);
}
function moveDrag(x,y){
  DND.ghost.style.left=x+'px';DND.ghost.style.top=y+'px';
  DND.ghost.style.display='none';
  const cell=document.elementFromPoint(x,y)?.closest('.wk-cell');
  DND.ghost.style.display='';
  if(cell===DND.over)return;
  document.querySelectorAll('.wk-cell.drop-on').forEach(c=>c.classList.remove('drop-on'));
  DND.over=cell||null;
  if(!cell)return;
  if(DND.group&&DND.group.length>1){
    /* תצוגה מקדימה: מדגישים את כל תאי היעד של הקבוצה לפי הדלתא */
    const s=DND.src,tri=+cell.dataset.ri,tdi=+cell.dataset.di;
    const vehChanged=tri!==s.ri,dd=tdi-s.di;
    DND.group.forEach(({ri,di})=>{
      const nri=vehChanged?tri:ri;
      const ndi=Math.min(6,Math.max(0,di+dd));
      document.querySelector(`.wk-cell[data-ri="${nri}"][data-di="${ndi}"]`)?.classList.add('drop-on');
    });
  }else{
    cell.classList.add('drop-on');
  }
}
function endDrag(){
  document.body.classList.remove('dragging-now');
  DND.ghost?.remove();DND.ghost=null;
  DND.el?.classList.remove('dragging');
  const tgt=DND.over;
  document.querySelectorAll('.wk-cell.drop-on').forEach(c=>c.classList.remove('drop-on'));
  DND.over=null;DND.active=false;
  if(!tgt)return;
  const s=DND.src,tri=+tgt.dataset.ri,tdi=+tgt.dataset.di;
  if(tri===s.ri&&tdi===s.di)return;
  /* גרירה קבוצתית: רכב — מוחלף לכולן; יום — הזזה יחסית לפי הדלתא */
  if(DND.group&&DND.group.length>0){
    const list=DND.group,vehChanged=tri!==s.ri,dd=tdi-s.di;
    const snap=list.map(({t,ri,di})=>({t,ri,di}));
    list.forEach(({t})=>removeByRef(t));
    list.forEach(({t,ri,di})=>{
      const nri=vehChanged?tri:ri;
      const ndi=Math.min(6,Math.max(0,di+dd));
      (WEEK[nri].c[ndi]=WEEK[nri].c[ndi]||[]).push(t);
    });
    DND.group=null;
    endSelMode();
    const parts=[];
    if(vehChanged)parts.push('רכב: '+WEEK[tri].v);
    if(dd)parts.push('הזזה של '+Math.abs(dd)+' '+(Math.abs(dd)===1?'יום':'ימים'));
    toastA(list.length+' משימות עודכנו · '+parts.join(' · ')+' · התראות בעוד 15 דק׳','בטל',()=>{
      restoreSnap(snap);toast('השינוי בוטל — לא נשלחו התראות');
    },8000);
    if(vehChanged&&!dd)seriesPrompt(list);
    return;
  }
  const task=WEEK[s.ri].c[s.di].splice(s.si,1)[0];
  if(!WEEK[s.ri].c[s.di].length)delete WEEK[s.ri].c[s.di];
  (WEEK[tri].c[tdi]=WEEK[tri].c[tdi]||[]).push(task);
  const parts=[];
  if(tri!==s.ri)parts.push('רכב: '+WEEK[tri].v);
  if(tdi!==s.di)parts.push('יום: '+WK_DAYS[tdi].d+' '+WK_DAYS[tdi].dt);
  queueDriverNotice(task,s,{ri:tri,di:tdi},parts);
  renderWeek(WKQ);
  if(task.sid&&tri!==s.ri&&tdi===s.di)seriesPrompt([{t:task,di:tdi}]);
}

/* התראת שינוי לנהג נשלחת בדיליי של 15 דק' — חלון ביטול לטעויות גרירה.
   (בדמו: 15 שניות. במערכת אמיתית: שינוי נוסף באותה משימה מאפס את הטיימר) */
function queueDriverNotice(task,from,to,parts){
  if(task._t)clearTimeout(task._t); // שינוי נוסף לפני שנשלחה — הטיימר מתאפס
  task.pn=true;
  task._t=setTimeout(()=>{
    task.pn=false;task._t=null;renderWeek(WKQ);
    toast('התראת שינוי על «'+task.n+'» נשלחה לנהג'+(task.drv?' '+task.drv:''));
  },15000);
  toastA(
    '«'+task.n+'» עודכנה · '+parts.join(' · ')+' · התראה לנהג בעוד 15 דק׳',
    'בטל שינוי',
    ()=>{
      clearTimeout(task._t);task._t=null;task.pn=false;
      const arr=WEEK[to.ri].c[to.di];
      arr.splice(arr.indexOf(task),1);
      if(!arr.length)delete WEEK[to.ri].c[to.di];
      (WEEK[from.ri].c[from.di]=WEEK[from.ri].c[from.di]||[]).splice(from.si,0,task);
      renderWeek(WKQ);
      toast('השינוי בוטל — לא נשלחה התראה לנהג');
    },
    8000);
}
function renderTasks(q){
  q=(q||'').trim();
  const rows=TASKS.filter(t=>!q||[t.name,t.client,t.drv,t.veh].join(' ').includes(q));
  $('#tbody').innerHTML=rows.map(t=>`<tr onclick="openTask(${t.id})">
    <td><span class="tname">${t.name}</span><div class="tsub">${t.client}</div></td>
    <td class="num">${t.day} ${t.date}</td>
    <td>${t.drv}<div class="tsub">${t.veh||'נסיעה מנהלתית'}</div></td>
    <td class="num">${t.s||'—'}</td><td class="num">${t.rel||'—'}</td><td class="num">${t.e||'—'}</td>
    <td class="num">${t.h||'—'}</td>
    <td class="num" style="${t.km>200?'color:var(--red);font-weight:700':''}">${t.km||'—'}</td>
    <td>${stChip(t.st)}</td></tr>`).join('')||'<tr><td colspan="9" style="text-align:center;color:var(--mut);padding:30px">לא נמצאו משימות. נסה חיפוש אחר.</td></tr>';
  $('#tcards').innerHTML=rows.map(t=>`<div class="card mcard" onclick="openTask(${t.id})">
    <div class="row1"><div><span class="tname">${t.name}</span><div class="tsub">${t.client} · ${t.day} ${t.date}</div></div>${stChip(t.st)}</div>
    <div class="meta"><span>🧑 <b>${t.drv}</b></span><span>🚙 <b>${t.veh||'מנהלתית'}</b></span>${t.km?`<span style="${t.km>200?'color:var(--red)':''}">📍 <b>${t.km} ק"מ</b></span>`:''}</div>
    <div class="mtimes">
      <div><span class="l">התחלה</span><span class="v">${t.s||'—'}</span></div>
      <div><span class="l">הסרת אחריות</span><span class="v">${t.rel||'—'}</span></div>
      <div><span class="l">סיום</span><span class="v">${t.e||'—'}</span></div>
      <div><span class="l">שעות</span><span class="v">${t.h||'—'}</span></div>
    </div></div>`).join('');
}
function renderVeh(q){
  q=(q||'').trim();
  $('#vgrid').innerHTML=VEHICLES.filter(v=>!q||(v.n+v.plate).includes(q)).map(v=>{
    const pct=Math.max(4,Math.min(100,v.svc/12000*100));
    const col=v.svc<2000?'var(--red)':v.svc<4000?'var(--amber)':'var(--green)';
    const st=v.st==='task'?'<span class="chip c-blue"><span class="dot"></span>במשימה</span>'
      :v.st==='admin'?'<span class="chip c-violet"><span class="dot"></span>מנהלתית</span>'
      :v.st==='down'?'<span class="chip c-red">מושבת</span>'
      :'<span class="chip c-green"><span class="dot"></span>פנוי</span>';
    return`<div class="card vcard" onclick="toast('כרטיס רכב: ${v.n} (דמו)')">
    <div class="vtop"><div><div class="vname">${v.n} ${v.arm?'<span class="vshield">משוריין</span>':''}</div><div class="vplate">${v.plate}</div></div>${st}</div>
    <div class="vstats">
      <div class="vstat"><span class="l">ק"מ נוכחי</span><span class="v">${v.km.toLocaleString()}</span></div>
      <div class="vstat"><span class="l">תוקף טסט</span><span class="v">${v.test}</span></div>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--mut);margin-bottom:4px">
        <span>ק"מ נותר לטיפול</span><b class="num" style="color:${col}">${v.svc.toLocaleString()}</b></div>
      <div class="vbar"><i style="width:${pct}%;background:${col}"></i></div>
    </div>
    <div class="vfoot"><span>${v.loc}</span>${v.warn?`<span class="chip c-red">🔔 ${v.warn}</span>`:''}</div>
    </div>`}).join('');
}
function openTask(id){
  const t=TASKS.find(x=>x.id===id)||TASKS[0];
  const steps=[
    {n:'שיבוץ אושר ע"י הנהג',s:'אתמול · 21:14',done:1},
    {n:'התחלת משימה',s:`${t.s||'—'} · ק"מ 99,218 · מיקום: ראשל"צ`,done:!!t.s},
    {n:'הסרת אחריות',s:t.rel?`${t.rel} · מיקום: כנסת ישראל`:'טרם דווח',done:!!t.rel},
    {n:'סיום משימה',s:t.e?`${t.e} · ק"מ ${(99218+t.km).toLocaleString()}`:'טרם דווח',done:!!t.e},
  ];
  const curIdx=steps.findIndex(s=>!s.done);
  $('#drawer').innerHTML=`
  <div class="dr-head"><div><h3>${t.name}</h3><div class="tsub">${t.client} · ${t.day} ${t.date}</div></div>
  <button class="x" onclick="closeDrawer()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
  <div class="dr-body">
    <div>${stChip(t.st)}</div>
    <div class="dr-grid">
      <div class="dr-item"><span class="l">נהג</span><span class="v">${t.drv}</span></div>
      <div class="dr-item"><span class="l">רכב</span><span class="v">${t.veh||'מנהלתית'}</span></div>
      <div class="dr-item"><span class="l">סה"כ שעות</span><span class="v num">${t.h||'—'}</span></div>
      <div class="dr-item"><span class="l">סה"כ ק"מ</span><span class="v num" style="${t.km>200?'color:var(--red)':''}">${t.km||'—'}</span></div>
    </div>
    <div><h3 style="font-size:14px;margin-bottom:12px">מהלך המשימה</h3>
    <div class="steps">${steps.map((s,i)=>`<div class="step ${s.done?'done':''} ${i===curIdx?'cur':''}">
      <div class="step-dot">${s.done?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M5 13l4 4L19 7"/></svg>':''}</div>
      <div><b>${s.n}</b><span class="num">${s.s}</span></div></div>`).join('')}</div></div>
  </div>
  <div class="dr-foot">
    <button class="btn btn-gho" onclick="toast('עריכת משימה (דמו)')">עריכה</button>
    <button class="btn btn-gho" onclick="toast('הודעה נשלחה לנהג (דמו)')">הודעה לנהג</button>
    <button class="btn btn-pri" onclick="toast('שכפול משימה (דמו)')">שכפול</button>
  </div>`;
  $('#drawer').classList.add('open');$('#scrim').classList.add('open');
}
function closeDrawer(){$('#drawer').classList.remove('open');$('#scrim').classList.remove('open')}
document.querySelectorAll('#nav button[data-v],#mnav button[data-v]').forEach(b=>b.onclick=()=>go(b.dataset.v));
go('home');
