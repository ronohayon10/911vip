<html lang="he" dir="rtl">

<meta charset="UTF-8">

<title>911VIP · כניסה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Rubik:wght@500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0E0F11;--paper:#F2F2EE;--card:#FFFFFF;--line2:#D6D6CE;--mut:#8A8D92;
  --lime:#E0892F;--green:#1F9D55;--red:#C03A2B;--red-bg:#F9E9E6;
  --mono:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;touch-action:manipulation}
body{
  font-family:'Heebo',sans-serif;color:#fff;
  background:linear-gradient(160deg,#16181C 0%,#0E0F11 70%);
  display:grid;place-items:center;padding:22px;
}
h1{font-family:'Rubik'}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
.box{width:100%;max-width:400px;text-align:center}
.box img{height:64px;margin-bottom:22px;animation:float 4.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.hello{
  background:linear-gradient(100deg,#FFFFFF 20%,var(--lime) 50%,#FFFFFF 80%);
  background-size:220% 100%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:shine 3.6s linear infinite;
}
@keyframes shine{0%{background-position:200% 0}100%{background-position:-20% 0}}
.card,.box h1,.box .sub{animation:rise .55s cubic-bezier(.22,.8,.3,1) both}
.card{animation-delay:.12s}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.box h1{font-size:22px;margin-bottom:4px}
.box .sub{font-size:12.5px;color:#9DA0A6;margin-bottom:30px;font-weight:500}
.card{
  background:var(--card);color:var(--ink);border-radius:24px;padding:26px 22px;
  box-shadow:0 24px 60px rgba(0,0,0,.4);text-align:start;
}
.fld{margin-bottom:15px}
.fld label{display:block;font-size:11.5px;font-weight:800;color:#3A3C40;margin-bottom:7px}
.fld input{
  width:100%;border:1.5px solid var(--line2);border-radius:14px;padding:15px;
  font-size:18px;font-weight:700;outline:none;font-family:var(--mono);
  text-align:center;letter-spacing:.08em;direction:ltr;
}
.fld input:placeholder-shown{direction:rtl;font-family:'Heebo';letter-spacing:0;font-weight:600}
.fld input::placeholder{color:#A9ACB2}
.fld input:focus{border-color:var(--ink)}
.go{
  width:100%;border-radius:16px;padding:16px;font-size:16.5px;font-weight:800;
  background:var(--ink);color:var(--lime);margin-top:4px;
}
.go:disabled{opacity:.5}
.err{
  display:none;background:var(--red-bg);color:var(--red);border-radius:12px;
  padding:10px 13px;font-size:12.5px;font-weight:700;margin-bottom:14px;
}
.err.show{display:block}
.back{font-size:12px;color:var(--mut);font-weight:700;margin-top:14px;width:100%;text-align:center}
.otp-to{font-size:12.5px;color:var(--mut);font-weight:600;margin-bottom:15px}
.otp-to b{color:var(--ink);font-family:var(--mono);direction:ltr;display:inline-block}
</style>
</head>

   מחליפים רק את גוף set/get כך שידברו עם השרת. ============= */
const Store=(()=>{
  const PREFIX='vip_';const mem={};
  function set(key,val){mem[key]=val;try{localStorage.setItem(PREFIX+key,JSON.stringify(val))}catch(e){}return val;}
  function get(key,fallback){if(key in mem)return mem[key];try{const r=localStorage.getItem(PREFIX+key);if(r!=null){mem[key]=JSON.parse(r);return mem[key]}}catch(e){}return(fallback!==undefined?fallback:null);}
  function remove(key){delete mem[key];try{localStorage.removeItem(PREFIX+key)}catch(e){}}
  return{set,get,remove};
})();

(function(){
  const h=+new Intl.DateTimeFormat('en-GB',{timeZone:'Asia/Jerusalem',hour:'2-digit',hour12:false}).format(new Date());
  $('#hello').textContent=h<5?'לילה טוב':h<12?'בוקר טוב':h<18?'צהריים טובים':'ערב טוב';
})();
let CUR=null;
function err(id,msg){const e=$(id);e.textContent=msg;e.classList.add('show')}
function sendOtp(){
  $('#err1').classList.remove('show');
  const p=($('#phone').value||'').replace(/[^\d]/g,'');
  const u=USERS.find(x=>x.phone===p);
  if(!u){err('#err1','המספר אינו רשום במערכת — פנה למנהל');return}
  CUR=u;
  $('#otpTo').textContent=p.replace(/(\d{3})(\d{3})(\d{4})/,'$1-$2-$3');
  $('#step1').style.display='none';$('#step2').style.display='';
  setTimeout(()=>$('#otp').focus(),150);
}
function verify(){
  $('#err2').classList.remove('show');
  if(($('#otp').value||'').trim()!=='911911'){err('#err2','קוד שגוי — נסה שוב');$('#otp').value='';$('#otp').focus();return}
  Store.set('session',{name:CUR.name,role:CUR.role,phone:CUR.phone,at:Date.now()});
  location.replace(CUR.role==='manager'?'index.html':'911vip-driver.html');
}
function back(){$('#step2').style.display='none';$('#step1').style.display='';CUR=null}
$('#phone').addEventListener('keydown',e=>{if(e.key==='Enter')sendOtp()});
$('#otp').addEventListener('keydown',e=>{if(e.key==='Enter')verify()});
/* כבר מחובר עם סשן בתוקף? דלג ישר פנימה · מנהל: חודש · נהג: חצי שנה */
const SESSION_MAX={manager:30*24*60*60*1000,driver:183*24*60*60*1000};
try{
  const s=Store.get('session',null);
  if(s&&s.at&&(Date.now()-s.at)<=(SESSION_MAX[s.role]||0)){
    location.replace(s.role==='manager'?'index.html':'911vip-driver.html');
  }else if(s){Store.remove('session')}
}catch(e){}
</script>
</body>
</html>
